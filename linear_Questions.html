
<!DOCTYPE html>
<html data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
        <link rel="stylesheet" href='./styles/main_style.css'>
        <script type="text/javascript" src="./scripts/dark_mode.js" ></script>
            <link rel="stylesheet" href='./styles/style.css'> 
            <link rel="stylesheet" href='./styles/questions_style.css'> 
            <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/MathJax.js?config=TeX-AMS_HTML-full"></script>
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            TeX: {
                extensions: ['AMSmath.js', 'AMSsymbols.js', 'cancel.js']
            },
            config: ["MMLorHTML.js"],
            jax: ["input/TeX", "output/HTML-CSS", "output/NativeMML"],
            extensions: ["MathMenu.js", "MathZoom.js"]
        });
    </script>
        <title>שאלות - אלגברה לינארית</title>
        <style>
            .hidden { display: none; }
        </style>
      <script type="text/javascript">
        window.onload = function() {
          const subjects = {"ערכים עצמיים וצורת ג'ורדן": [{"question": "<p>ווקטורים עצמיים עם ערכים עצמיים שונים יהיו:</p>", "answer": "<p>בלתי תלויים לינארית.</p>"}, {"question": "<p>הריבוי הגאומטרי של ע\"ע <script type=\"math/tex\">\\lambda<\/script> יהיה:</p>", "answer": "<p>מימד המרחב העצמי של <script type=\"math/tex\">\\lambda<\/script>.</p>"}, {"question": "<p>הערכים העצמיים של אופרטור משולשי?</p>", "answer": "<p>הם הערכים על האלכסון.</p>"}, {"question": "<p>איך ניתן למצוא את סכום ומכפלת הערכים העצמיים?</p>", "answer": "<p>סכום הערכים העצמיים - העקבה. מכפלת הערכים העצמיים - הדטרימיננטה. נכון גם כאשר לא לכסין.</p>"}, {"question": "<p>הריבוי האלגברי של <script type=\"math/tex\">\\left( x-\\lambda \\right)<\/script> בפולינום האופייני יהיה:</p>", "answer": "<p>מימד המרחב העצמי המוכלל.</p>"}, {"question": "<p>מה הקשר בין הריבוי האלגברי לריבוי הגאומטרי?</p>", "answer": "<p>הריבוי האלגברי תמיד גדול או שווה לריבוי הגאומטרי, כאשר הם שווים עבור כל ערך עצמי אז האופרטור לכסין.</p>"}, {"question": "<p>מה מייצג הריבוי האלגברי של <script type=\"math/tex\">\\left( x-\\lambda \\right)<\/script> בפולינום <u>המינימלי</u></p>", "answer": "<p>גודל הבלוק הגדול ביותר בצורת ג'ורדן.</p>"}, {"question": "", "answer": ""}]}
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length){
            location.reload()
            return;
            }
            if (currentQuestionIndex >= currentQuestions.length - 1) {
                document.getElementById('next-question').innerHTML = "לסיים";
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.Hub.Queue(["Typeset",MathJax.Hub,"question"]);
            MathJax.Hub.Queue(["Typeset",MathJax.Hub,"answer"]);
            document.getElementById('question-counter').innerHTML = "שאלה "+ (currentQuestionIndex + 1) +" מתוך "+ currentQuestions.length;
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
      </script>
</head>
<body>
<ul class='top-navigation'>
        <li class="parent-page"> <a href="./linear"> 
         חזרה לספר
         </a></li></ul><div class="content">
    <div id="subject-selection">
        <h1>נושאים:</h1>
    <div class="all-checkboxes-container">
        <label class="checkbox-container">ערכים עצמיים וצורת ג'ורדן<input type="checkbox" name="subject" value="ערכים עצמיים וצורת ג'ורדן" checked="checked"> <span class="checkmark"></span></label>
        </div>
    <button class="quiz-button" onclick="startQuiz()">להתחיל</button>
    </div>
    <div id="quiz-section" class="hidden">
        <h1>שאלות</h1>
        <div class="question-answer-container">
        <div id="question-counter"></div>
        <div id="question"></div>
        <div id="answer" class="hidden"></div>
        </div>
        <button class="quiz-button" id="show-answer" onclick="showAnswer()">הצג תשובה</button>
        <button class="quiz-button" id="next-question" class="hidden" onclick="nextQuestion()">שאלה הבאה</button>
    </div>
    </div>
</body>
</html>
