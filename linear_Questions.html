        <title>שאלות - אלגברה לינארית</title>
        <style>
            .hidden { display: none; }
        </style>
      <script type="text/javascript">
        window.onload = function() {
          const subjects = {"ערכים עצמיים וצורת ג'ורדן": [{"question": "<p>ווקטורים עצמיים עם ערכים עצמיים שונים יהיו:</p>", "answer": "<p>בלתי תלויים לינארית.</p>"}, {"question": "<p>הריבוי הגאומטרי של ע\"ע $\\lambda$ יהיה:</p>", "answer": "<p>מימד המרחב העצמי של $\\lambda$.</p>"}, {"question": "<p>הערכים העצמיים של אופרטור משולשי?</p>", "answer": "<p>הם הערכים על האלכסון.</p>"}, {"question": "<p>איך ניתן למצוא את סכום ומכפלת הערכים העצמיים?</p>", "answer": "<p>סכום הערכים העצמיים - העקבה. מכפלת הערכים העצמיים - הדטרימיננטה. נכון גם כאשר לא לכסין.</p>"}, {"question": "<p>הריבוי האלגברי של $\\left( x-\\lambda \\right)$ בפולינום האופייני יהיה:</p>", "answer": "<p>מימד המרחב העצמי המוכלל.</p>"}, {"question": "<p>מה הקשר בין הריבוי האלגברי לריבוי הגאומטרי?</p>", "answer": "<p>הריבוי האלגברי תמיד גדול או שווה לריבוי הגאומטרי, כאשר הם שווים עבור כל ערך עצמי אז האופרטור לכסין.</p>"}, {"question": "<p>מה מייצג הריבוי האלגברי של $\\left( x-\\lambda \\right)$ בפולינום <u>המינימלי</u></p>", "answer": "<p>גודל הבלוק הגדול ביותר בצורת ג'ורדן.</p>"}, {"question": "", "answer": ""}], "הפיכות": [{"question": "<p>ציין כמה שיותר שקילויות לך שמטריצה ריבועית הפיכה.</p>", "answer": "<p>הביטויים הבאים שקולים:</p>\n<ol>\n<li>\n<p>המטריצה $A$ הפיכה. </p>\n</li>\n<li>\n<p>למערכת $Ax=0$ יש רק את הפתרון הטריוויאלי. </p>\n</li>\n<li>\n<p>הצורה המדורגת מצומצת של $A$ זו מטריצת היחידה </p>\n</li>\n<li>\n<p>המטריצה $A$ היא מכפלה של מטריצות אלמטריות. </p>\n</li>\n<li>\n<p>למשוואה $Ax=b$ יש בדיוק פתרון אחד לכל $b$. </p>\n</li>\n<li>\n<p>הדטרמיננטה שונה מ-0. </p>\n</li>\n<li>\n<p>העמודות של $A$ הם בת\"ל. </p>\n</li>\n<li>\n<p>השורשות של $A$ הם בת\"ל. </p>\n</li>\n<li>\n<p>המרחב השורות של $A$ פורש את כל המרחב. </p>\n</li>\n<li>\n<p>המרחב עמודות של $A$ פורש את המרחב. </p>\n</li>\n<li>\n<p>הדרגה של המטריצה היא $n$. </p>\n</li>\n<li>\n<p>מימד הגרעין יהיה 0. </p>\n</li>\n<li>\n<p>המרחב המאונך לגרעין יהיה המרחב כולו. </p>\n</li>\n<li>\n<p>המימד המאונך לתמונה יהיה $\\{ 0 \\}$. </p>\n</li>\n<li>\n<p>הערך $\\lambda=0$ הוא לא ערך עצמי של $A$. </p>\n</li>\n</ol>"}]}
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length){
            location.reload()
            return;
            }
            if (currentQuestionIndex >= currentQuestions.length - 1) {
                document.getElementById('next-question').innerHTML = "לסיים";
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.typesetPromise(["#question"]).then(() => {
  MathJax.typesetPromise(["#answer"]);
});
            document.getElementById('question-counter').innerHTML = "שאלה "+ (currentQuestionIndex + 1) +" מתוך "+ currentQuestions.length;
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
      </script>
</head>
<body>
<ul class='top-navigation'>
        <li class="parent-page"> <a href="./linear.html"> 
         חזרה לספר
         </a></li></ul><div class="content">
    <div id="subject-selection">
        <h1>נושאים:</h1>
    <div class="all-checkboxes-container">
        <label class="checkbox-container">ערכים עצמיים וצורת ג'ורדן<input type="checkbox" name="subject" value="ערכים עצמיים וצורת ג'ורדן" checked="checked"> <span class="checkmark"></span></label><label class="checkbox-container">הפיכות<input type="checkbox" name="subject" value="הפיכות" checked="checked"> <span class="checkmark"></span></label>
        </div>
    <button class="quiz-button" onclick="startQuiz()">להתחיל</button>
    </div>
    <div id="quiz-section" class="hidden">
        <h1>שאלות</h1>
        <div class="question-answer-container">
        <div id="question-counter"></div>
        <div id="question"></div>
        <div id="answer" class="hidden"></div>
        </div>
        <button class="quiz-button" id="show-answer" onclick="showAnswer()">הצג תשובה</button>
        <button class="quiz-button" id="next-question" class="hidden" onclick="nextQuestion()">שאלה הבאה</button>
    </div>
    </div>
</body>
