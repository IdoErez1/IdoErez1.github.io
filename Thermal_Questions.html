      <script type="text/javascript">
        window.onload = function() {
          const subjects = {"פוטנציאלים תרמודינאמיים": [{"question": "<p>מהם המשתנים הטבעיים הטבעיים של אנרגיה פנימית והביטויי של הדיפרנציאל בעזרתם?</p>", "answer": "<p>$$d U=T d S-P d V$$</p>"}, {"question": "<p>מהו ההגדרה של אנטלפיה? מהם במשתנים הטבעיים ומה הביטוי לדיפרנציאל בעזרתם?</p>", "answer": "<p>$$H=U+PV\\qquad d H=T d S+V d P$$</p>"}, {"question": "<p>בעזרת יחסי מקסוואל למה שווה $\\left( \\frac{\\partial T}{\\partial P} \\right)_{S}$?</p>", "answer": "<p>$$\\left( \\frac{\\partial T}{\\partial P} \\right)_{S}=\\left( \\frac{\\partial V}{\\partial S}  \\right)_{P} $$</p>"}, {"question": "<p>מהו ההגדרה של האנרגיה החופשית של הלמהולדס? מהם במשתנים הטבעיים ומה הביטוי לדיפרנציאל בעזרתם?</p>", "answer": "<p>$$F(T,V)=U-TS\\qquad dF=-SdT-PdV$$</p>"}, {"question": "<p>מהי ההגדרה של האנרגיה החופשית של גיבס? מהם המשנים הטבעיים ומה הביטוי לדיפרנציאל בעזרתם?\n$$G(P,T)=H-TS\\qquad dG=VdP-SdT$$</p>\n<p>מהי משוואת האנרגיה? כלומר ביטוי ל-$\\left( \\frac{\\partial U}{\\partial P} \\right)_{T}$ ול-$\\left( \\frac{\\partial U}{\\partial V} \\right)_{T}$.</p>", "answer": "<p>$$\\begin{gather}\\left({\\frac{\\partial U}{\\partial P}}\\right)_{T}=-\\Biggl[T\\biggl({\\frac{\\partial V}{\\partial T}}\\biggr)_{P}+P\\biggl({\\frac{\\partial V}{\\partial P}}\\biggr)_{T}\\Biggr]  \\\\\\Biggl({\\frac{\\partial U}{\\partial V}}\\Biggr)_{T}=T\\Biggl({\\frac{\\partial P}{\\partial T}}\\Biggr)_{V}-P \\end{gather}$$</p>"}, {"question": "", "answer": ""}], "הגדרות - פוטנציאל כימי ומעברי פאזה": [{"question": "<p>מה ההגדרה של פאזה תרמודינמית?</p>", "answer": "<p>דרך לייחד חומר המתחום במרחב(כלומר נמצא ביחד כגוש) ע\"י התכונות הכימיות והפיזיות שלו. לדוגמא, צפיפות, מוליכות חשמלית, צורה, סידור פנימי של אטומים ועוד. מצבי הצבירה מוצק נוזל וגז הם דוגמאות לפאזות.</p>"}, {"question": "<p>מה ההגדרה של חום כמוס?</p>", "answer": "<p>כמות האנרגיה התרמית הנדרשת כדי להעביר חומר מצב צבירה כאשר הלחץ קבוע.\n$${L}=\\Delta Q_{\\mathrm{rev}}=T_{\\mathrm{c}}(S_{2}-S_{1})$$</p>"}, {"question": "<p>מה ההגדרה של דיאגרמת פאזה?</p>", "answer": "<p>זה גרף של לחץ כפונקציה של טמפרטורה. כל תחום קשיר מייצג פאזה.</p>"}, {"question": "<p>מה ההגדרה של מעבר פאזה מסדר ראשון?</p>", "answer": "<p>כאשר הנפח משתנה, יש קפיצה באנטרופיה וקיים חום כמוס, אבל הפוטנציאל החופשי של גיבס נשאר רציף וזהה. כלומר:\n$$G_{1}=G_{2}\\qquad V_{1}\\neq V_{2}\\qquad L\\neq 0\\qquad S_{1}\\neq S_{2}$$</p>"}, {"question": "<p>מה ההגדרה של מעבר פאזה מסדר שני?</p>", "answer": "<p>הפוטנציאל החופשי של גיבס נשאר רציף, אך אין חום כמוס, אין קפיצה באנטרופיה ואין שינוי בנפח, אבל הנגזרות הם לא רציפות. כלומר:\n$$\\left( \\frac{\\partial S}{\\partial T}  \\right)_{p},\\left( \\frac{\\partial S}{\\partial P}  \\right)_{T},\\left( \\frac{\\partial V}{\\partial T}  \\right)_{P},\\left( \\frac{\\partial V}{\\partial P}  \\right)_{T}$$\nהם לא רציפים. זה אומר כי:\n$$C_{p}=T\\left( \\frac{\\partial S}{\\partial T}  \\right)_{p}\\qquad \\beta=\\frac{1}{V}\\left( \\frac{\\partial V}{\\partial T}  \\right)_{p}\\qquad \\kappa=\\frac{1}{V}\\left( \\frac{\\partial V}{\\partial P}  \\right)_{T}$$\nהם גדלים לא רציפים.</p>"}, {"question": "<p>מה ההגדרה של פוטנציאל כימי?</p>", "answer": "<p>זה יהיה כמה שמשתנה האנרגיה הפנימית שמספר החלקיקים משתנה:\n$$\\mu\\!=\\!\\left({\\frac{\\partial U}{\\partial N}}\\right)_{S,V}$$</p>"}], "הגדרות - פיסיקה סטטיסטית קוונטית": [{"question": "<p>מה ההגדרה של פוגאסיטי - fugacity?</p>", "answer": "<p>$$z=\\mathrm{e}^{\\beta\\mu}$$</p>"}, {"question": "<p>מה ההגדרה של פולילוגוריתם?</p>", "answer": "<p>פונקציה המוגדרת על ידי:\n$$\\operatorname{Li}_{n}(z)=\\sum_{k=1}^{\\infty}{\\frac{z^{k}}{k^{n}}}$$\nכאשר $z$ זה העיגול יחידה הפתוח במישור המרוכב. ההגדרה על המרחב המרוכב כולו נובעת מההמשכה האנליטית.</p>"}, {"question": "<p>מה ההגדרה של גז פרמי?</p>", "answer": "<p>גז של פרמיונים.</p>"}, {"question": "<p>מה ההגדרה של אנרגיית פרמי?</p>", "answer": "<p>רמות האנרגיה מתמלאות בגלל עקרון האיסור של פאולי ללא קשר לטמפרטורה. האנרגיה שהפרמיונים מגיעים עליה באפס המוחלט נקראת אנרגיית פרמי. כלומר:\n$$E_{F}=\\mu(T=0)$$</p>"}, {"question": "<p>מה ההגדרה של פונקציית התפלגות פרמי דיראק?</p>", "answer": "<p>פונקציה:\n$$f(E)=\\frac{1}{\\mathrm{e}^{\\beta(E-\\mu)}+1}$$</p>"}, {"question": "<p>מה ההגדרה של פונקציית התפלגות בוז-אינשטיין?</p>", "answer": "<p>$$f(E)=\\frac{1}{\\mathrm{e}^{\\beta(E-\\mu)}-1}$$</p>"}, {"question": "<p>מה ההגדרה של אופרטור החילוף?</p>", "answer": "<p>עבור שתי חלקיקים זההים אשר נמצאים ב-$\\vec{r}_{1}$ ו-$\\vec{r}_{2}$ בהתאמה ניתן לתאר על ידי פונקציית גל מהצורה $\\psi\\left( \\vec{r}_{1},\\vec{r}_{2} \\right)$. אופרטור החילוף יהיה אופרטור $P$ המקיים:\n$$P_{12}\\psi\\left( \\vec{r}_{1},\\vec{r}_{2} \\right)=\\psi\\left( \\vec{r}_{2},\\vec{r}_{1}  \\right)$$</p>"}], "הגדרות - הגדרות בסיסיות": [{"question": "<p>מה ההגדרה של מערכת תרמודינמית?</p>", "answer": "<p>איזור שמכיל אנרגיה או חומר</p>"}, {"question": "<p>מה ההגדרה של סביבה?</p>", "answer": "<p>איזור אשר מבצע אינטרקציה עם המערכת התרמודינמית</p>"}, {"question": "<p>מה ההגדרה של מערכת פתוחה?</p>", "answer": "<p>מערכת תרמודינמית אשר מחליפה של חלקיקים עם הסביבה.</p>"}, {"question": "<p>מה ההגדרה של מערכת סגורה?</p>", "answer": "<p>מערכת תרמודינמית אשר לא מחליפה חלקיקים עם הסביבה.</p>"}, {"question": "<p>מה ההגדרה של מערכת מבודדת?</p>", "answer": "<p>מערכת תרמודינמית אשר לא מושפעת כלל מהסביבה.</p>"}, {"question": "<p>מה ההגדרה של גז?</p>", "answer": "<p>אוסף חלקיקים אשר מתאימים את עצמם לצורה של כלי שבה הם נמצאים.</p>"}, {"question": "<p>מה ההגדרה של שיווי משקל?</p>", "answer": "<p>בצורה מיקרסוקופית החלקיקים עדיין נעים. אבל בצורה המאקרוסקופי נקבל שהרבה גדלים נשמרים בזמן. גודל שנשמר בזמן למערכת נקרא בשיווי משקל.</p>"}, {"question": "<p>מה ההגדרה של לחץ?</p>", "answer": "<p>הכוח הממוצע שפועל ליחידת שטח. מסומן ע\"י $P$ ומתאור ע\"י:\n$$P= \\frac{F}{A}$$\nובעל יחידות של $\\frac{N}{m^2}=\\frac{kg}{m\\cdot s^2}\\equiv Pa$</p>"}, {"question": "<p>מה ההגדרה של צפיפות?</p>", "answer": "<p>המסה ליחידת נפח. פרופורציונאלי לכמות החלקיקים.</p>"}, {"question": "<p>מה ההגדרה של מגע תרמי?</p>", "answer": "<p>כאשר יש מעבר של חלקיקים בין המערכות.</p>"}, {"question": "<p>מה ההגדרה של חום?</p>", "answer": "<p>האנרגיה המועברת בין המערכות במגע תרמי.</p>"}, {"question": "<p>מה ההגדרה של טמפרטורה - זמנית?</p>", "answer": "<p>גודל המאפיין את המערכת ומשתווה בין שתי מערכות המגיעות לשיווי משקל תרמי.</p>"}, {"question": "<p>מה אומר משפט חוק האפס של תרמודינמיקה?</p>", "answer": "<p>אם $B\\leftrightarrow C$ באותו טמפרטורה ו- $B\\leftrightarrow A$ באותה טמפרטורה אזי $A\\leftrightarrow C$ באותה טמפרטורה.</p>"}, {"question": "<p>מה ההגדרה של 1. מערכת אשר אין מעבר של חומר נקראת מערכת סגורה.?</p>", "answer": "<ol start=\"2\">\n<li>\n<p>מערכת שאין בה מעבר של חום נקראת מערכת אדיאבטית. </p>\n</li>\n<li>\n<p>מערכת שאין בה שינוי בגודל נקראת מערכת איזוכורית. </p>\n</li>\n</ol>"}, {"question": "<p>מה ההגדרה של 1. מערכת שבה הלחץ נשאר קבוע נקראת מערכת איזובארית.?</p>", "answer": "<ol start=\"2\">\n<li>מערכת שבה החום נשאר קבוע נקרא מערכת איזותרמית. </li>\n</ol>"}, {"question": "<p>מה ההגדרה של מול?</p>", "answer": "<p>יחידת מידה חסרת מימדים. שווה למספר אבוגדרו:\n$$1\\;{\\mathrm{mol}}=N_{A}=6.022\\times10^{23}$$\nזהו מספר האטומים ב-12 גרם של פחמן 12.</p>"}, {"question": "<p>מה ההגדרה של קלווין?</p>", "answer": "<p>יחידה למדידה טמפרטורה. מסומנת $^\\circ K$.</p>"}, {"question": "<p>מה ההגדרה של משוואת מצב?</p>", "answer": "<p>משוואה המקשרת בין לחץ, נפח, טמפרטורה וכמות החלקיקים. כלומר משוואה מהצורה $f\\left(p,V,T,N \\right)=0$</p>"}, {"question": "<p>מה אומר משפט משוואת גז אידיאלי?</p>", "answer": "<p>$$pV = Nk_{B}T$$\nכאשר $k$ זה קבוע בולצמן, $N$ מתאר את מספר החלקיקים.</p>"}, {"question": "<p>מה ההגדרה של גז וואן דר וואלס?</p>", "answer": "<p>מודל אלטרנטיבי המתאר גזים מסויימים. משוואת המצב תהיה:\n$$\\left(p+a\\frac{N^{2}}{V^{2}}\\right)\\left(V-N b\\right)\\,=\\,N k_{B}T$$\nכאשר $T$ זה טמפרטורה(בקלווין), $k_{B}$ זה קבוע בולצמן, $N$ זה מספר החלקיקים, $V$ הנפח, $p$ הלחץ ו-$N$ מספר החלקיקים.</p>"}, {"question": "<p>מה ההגדרה של מקדם התפשוטות תרמי לינארי?</p>", "answer": "<p>לנוזל או מוצק יש מקדם התפשטות אורכי $\\alpha$ המוגדר:\n$$\\alpha\\!=\\!{\\frac{1}{L}}\\!\\left({\\frac{d L}{d T}}\\right)$$</p>"}, {"question": "<p>מה ההגדרה של מקדם התפשטות תרמי נפחי?</p>", "answer": "<p>בנוזל או למוצק יש מקדם התפשטות נפחי $\\beta$ המוגדר:\n$$\\beta\\!=\\!{\\frac{1}{V}}\\!\\left({\\frac{d V}{d T}}\\right)$$</p>"}, {"question": "<p>מה ההגדרה של תכונה אינטנסיבית?</p>", "answer": "<p>תכונה שאינה משתנה אם משכפלים את המערכת. דוגמאות לגדלים אינטנסיביום יהיו טמפרטורה וצפיפות</p>"}, {"question": "<p>מה ההגדרה של תכונה אקסטנסיבי?</p>", "answer": "<p>תכונה של המערכת אשר פרופרציונאלי לשיכפול המערכת. כלומר אם נשכפל את מערכת אז נצפה כי גודל אקסטנסיבי יגדל פי 2. דוגמאות זה מסה, נפח ואנטרופיה.</p>"}, {"question": "<p>מה ההגדרה של פונקציות מצב?</p>", "answer": "<p>תכונה אשר תלוייה אך ורק במצב של המערכת ולא איך המערכת הגיעה עליה. דוגמאות לפונקציות מצב הם נפח, אנרגיה פנימית, לחץ ואנטרופיה</p>"}, {"question": "<p>מה ההגדרה של פונקציית מסלול?</p>", "answer": "<p>תכונה אשר תלוייה באיך התהליך התבצעה, ולא רק על ידי המצב שלה ברגע נתון. דוגמאות לפונקציות מסלול הם עבודה וחום.</p>"}, {"question": "<p>מה ההגדרה של דיפרנציאל?</p>", "answer": "<p>אופרטור $d$ המתאר שינוי קטן בגודל.</p>"}, {"question": "<p>מה ההגדרה של דיפרנציאל מדוייק?</p>", "answer": "<p>ביטוי מהצורה:\n$$h(x,y)=M(x,y)dx+N(x,y)dy$$\nנקרא דיפרציאל מדוייק אם קיים פונקציה $f=f(x,y)$ כך ש- $df=h(x,y)$</p>"}, {"question": "<p>מה ההגדרה של דיפרנציאל לא מדוייק?</p>", "answer": "<p>גודל מהצורה $h(x,y)=M(x,y)dx+N(x,y)dy$ אשר אינו דיפרנציאל מדוייק נקרא דיפרנציאל לא מדוייק.</p>"}], "הגדרות - הגישה הסטטיסטית - צברים": [{"question": "<p>מה ההגדרה של צפיפות המצבים?</p>", "answer": "<p>$$g(E)= \\frac{\\Gamma(E)}{V}$$</p>"}, {"question": "<p>מה ההגדרה של הצבר הקנוני?</p>", "answer": "<p>מאגר חום עם אנרגיה $E_{R}$ המחובר למערכת עם אנרגיה $E_{A}$ כך ש-$E_{R}\\gg E_{A}$ והאנרגיה הכוללת $E_{0}=E_{A}+E_{R}$ היא קבועה.</p>"}, {"question": "<p>מה ההגדרה של ניוון?</p>", "answer": "<p>כמות המיקרו מצבים עם רמת אנרגיה $E_{i}$. לכרגע נסמן את זה ב-$g_{i}$.</p>"}, {"question": "<p>מה ההגדרה של פונקצייית החלוקה?</p>", "answer": "<p>הפקטור נרמול של ההסתברות:\n$$Z=\\sum_{i}g_{i}e^{-E_{i}/k_{\\mathrm{{B}}}T}$$\nכאשר:\n$$ P(E_{i})={\\frac{1}{Z}}g_{i}e^{-E_{i}/k_{\\mathrm{B}}T}$$</p>"}, {"question": "<p>מה ההגדרה של מיקרו מצב?</p>", "answer": "<p>ניתן לחלק את המצבים האפשריים של מערכת לאוסף מצבים שווי הסתברות.</p>"}, {"question": "<p>מה ההגדרה של מאקרו מצב?</p>", "answer": "<p>קונפיגורציה כלשהי של המערכת. לא בהכרח שוות הסתברות.</p>"}, {"question": "<p>מה אומר משפט העקרון היסודי של פיזיקה סטטיסטית?</p>", "answer": "<p>כל אחד מהמיקרו מצבים הם שווי הסתברות.</p>"}, {"question": "<p>מה ההגדרה של טמפרטורה?</p>", "answer": "<p>גודל $T$ המוגדר ע\"י המשוואה:\n$${\\frac{1}{k_{\\mathrm{B}}T}}={\\frac{\\mathrm{d}\\ln\\Omega}{\\mathrm{d}E}}$$\nכאשר $k_{B}$ זה קבוע בולצמן, $\\Omega$ זה מספר המיקרומצבים כתלות באנרגיה, ו-$E$ זה האנרגיה.</p>"}, {"question": "<p>מה ההגדרה של חלקיקים ניתנים להבחנה?</p>", "answer": "<p>אם ניתן להחליף שתי חלקיקים ובלי לשנות את המיקרו מצב נקבל כי החלקיקים לא ניתנים להבחנה. כאשר אם החלפה של שתי חליקיקים תשנה את המיקרו מצב חלקיקים אלו יהיו ניתנים להבחנה</p>"}, {"question": "<p>מה ההגדרה של צבר מיקרוקנוני?</p>", "answer": "<p>המערכת המבודדת. זוהי מערכת שבה האנרגיה, מספר החלקיקים והנפח נשארים קבועים.</p>"}, {"question": "<p>מה ההגדרה של הפונקציה הצוברת של מספר המצבים?</p>", "answer": "<p>מספר המיקרו מצבים עד האנרגיה $E$. מסומן ב-$\\Gamma=\\Gamma(E)$.</p>"}, {"question": "<p>מה ההגדרה של צפיפות המצבים?</p>", "answer": "<p>מספר המיקרו מצבים בין אנרגיה $E$ לאנרגיה $E+dE$. מקיים:\n$$\\Omega\\left(N,V,E\\right)=\\Gamma\\left(N,V,E\\right)-\\Gamma\\left(N,V,E-d E\\right)\\equiv g\\left(N,V,E\\right)d E$$\nכאשר צפיפות המצבים היא פונקציה $g$ כך שמתקיים:\n$$g(E)=\\frac{\\partial \\Gamma}{\\partial E} $$</p>"}, {"question": "<p>מה ההגדרה של הצבר הגראנד קנוני?</p>", "answer": "<p>מערכת שיכולה להחליף גם אנרגיה וגם חלקיקים עם אמבט. כאשר נניח כי האמבט גדול משמעותית מהמערכת. כיוון שאנו דורשים שיווי משקל נקבל כי הטמפרטורה של המערכת שווה לטמפרטורה של המאגר($T=T_{R}$) וכן הפוטנציאלים הכימים שווים($\\mu=\\mu_{R}$).</p>"}, {"question": "<p>מה ההגדרה של גראנד פוטנציאל?</p>", "answer": "<p>ההתמרת לג'נדר של ההאנרגיה הפנימית עם הפוטנציאל הכימי והטמפרטורה:\n$$\\Phi[T,\\mu]=U-T S-\\mu N$$</p>"}], "הגדרות - תהליכים ומנועים": [{"question": "<p>מה ההגדרה של מנועה?</p>", "answer": "<p>מערכת הפועלת בצורה מחזורית הממירה אנרגיה לעבודה.</p>"}, {"question": "<p>מה ההגדרה של מנוע קרנו?</p>", "answer": "<p>רכיב אשר מקיים את מחזור קרנו נקרא מנוע קרנו.</p>"}, {"question": "<p>מה ההגדרה של יעילות?</p>", "answer": "<p>הייעוד של מנוע זה להפוך חום לעבודה. לכן היעילות שלו תהיה היחס בין כמות החום שהתקבל לעבודה שהוציא. כלומר:\n$$\\eta = \\left\\lvert  \\frac{W_{out}}{Q_{in}}  \\right\\rvert = \\frac{\\lvert Q_{in} \\rvert -\\lvert Q_{out} \\rvert}{\\lvert Q_{in} \\rvert }=1-\\left\\lvert  \\frac{Q_{out}}{Q_{in}}  \\right\\rvert  $$</p>"}, {"question": "<p>מה ההגדרה של גרף PV?</p>", "answer": "<p>גרף של לחץ כתלות בנפח.</p>"}, {"question": "<p>מה ההגדרה של גרף ST?</p>", "answer": "<p>גרף של טמפרטורה כתלות באנטרופיה.</p>"}, {"question": "<p>מה ההגדרה של תהליך איזותרמי?</p>", "answer": "<p>תהליך שהטמפרטורה בו לא משתנה. כלומר מתקיים $\\Delta T=0$.</p>"}, {"question": "<p>מה ההגדרה של תהליך אדיאבטי?</p>", "answer": "<p>תהליך אשר אין בו זרימה של חום, כלומר מבודד תרמית. זה אומר שמתקיים:\n$$\\;\\bar{}\\mkern-7.5mu dQ=0$$</p>"}, {"question": "<p>מה ההגדרה של תהליך איזוכורי?</p>", "answer": "<p>תהליך שבו הנפח נשאר קבוע</p>"}, {"question": "<p>מה ההגדרה של תהליך איזובארי?</p>", "answer": "<p>תהליך שבו הלחץ נשאר קבוע</p>"}], "הגדרות - חוקי תרמודינמיקה": [{"question": "<p>מה ההגדרה של תהליך הפיכה?</p>", "answer": "<p>תהליך שבו המערכת יכולה לחזור למצב ההתחלתי ללא השפעה חיצונית</p>"}, {"question": "<p>מה ההגדרה של תהליך קווזיסטטי?</p>", "answer": "<p>תהליך שבו בכל שלב המערכת נמצאת בשיווי משקל.</p>"}, {"question": "<p>מה אומר משפט חוק ראשון של תרמודינמיקה?</p>", "answer": "<p>האנרגיה נשמרת, כאשר עבודה וחום הם שתי צורות של אנרגיה</p>"}, {"question": "<p>מה ההגדרה של קיבול חום?</p>", "answer": "<p>קיבול חום $C$ זה למעשה כמות האנרגיה חום($Q$) שנדרש כדי לעלות את הטמפרטורה במעלה אחת. מוגדר:\n$$C(p,T)=\\operatorname*{lim}_{\\Delta T\\rightarrow0}\\frac{\\Delta Q}{\\Delta T}=\\frac{\\mathrm{d}Q}{d T}$$</p>"}, {"question": "<p>מה ההגדרה של קיבול חום סגולי?</p>", "answer": "<p>קיבול חום ליחידת מסה. כלומר:\n$$c=\\frac{1}{m}\\left( \\frac{ đ Q}{d T} \\right)$$</p>"}, {"question": "<p>מה ההגדרה של קיבול חום בנפח קבוע?</p>", "answer": "<p>אם לא משנים את הנפח, זה למעשה כמות האנרגיה שצריך כדי לעלות את הטמפרטורה ביחידה אחת:\n$$C_{V}=\\!\\frac{\\;\\bar{}\\mkern-7.5mu dQ_{V}}{d T}\\!=\\!\\left(\\frac{\\partial U}{\\partial T}\\right)_{V}$$</p>"}, {"question": "<p>מה ההגדרה של קיבול חום בלחץ קבוע?</p>", "answer": "<p>אם לא משנים את הלחץ, זה יהיה כמות האנרגיה הנגדרשת כדי לעלות את הטמפרטורה ביחידה אחת.\n$$C_{P}={\\frac{\\mathrm{\\;\\bar{}\\mkern-7.5mu d}Q_{P}}{d T}}$$</p>"}, {"question": "<p>מה אומר משפט הניסוח של קלווין של החוק השני של תרמודימיקה?</p>", "answer": "<p>לא ייתכן תהליך שהתוצאה היחידה שלו היא המרה מלאה של חום לעבודה.</p>"}, {"question": "<p>מה ההגדרה של אנטרופיה?</p>", "answer": "<p>החום $\\;\\bar{}\\mkern-7.5mu dQ$ העוברת למערכת ע\"י הטמפרטורה. כלומר:\n$$dS = \\frac{\\;\\bar{}\\mkern-7.5mu dQ}{T}$$</p>"}, {"question": "<p>מה ההגדרה של פוטנציאל תרמודינמי?</p>", "answer": "<p>גודל אשר בעזרתו ניתן לתאר את המערכת בצורה מלאה.</p>"}, {"question": "<p>מה ההגדרה של המשתנים הטבעיים של פוטנציאל תרמודינמי?</p>", "answer": "<p>המשתנים עבורו הדיפרנציאל יהיה מורכב מדיפרציאלים מדוייקים, אשר כל אחד מהם אינו תלוי במסלול.</p>"}, {"question": "<p>מה ההגדרה של אנרגיה פנימית?</p>", "answer": "<p>פוטנציאל  המקיים:\n$$\\mathrm{d}U=-p\\mathrm{d}V+T\\mathrm{d}S$$</p>"}, {"question": "<p>מה ההגדרה של אנטלפיה?</p>", "answer": "<p>$$H(S,p)=U+PV$$\nולכן:\n$$\\mathrm{d}H=T\\mathrm{d}S-p\\mathrm{d}V+p\\mathrm{d}V+V\\mathrm{d}p=T\\mathrm{d}S+V\\mathrm{d}p$$</p>"}, {"question": "<p>מה ההגדרה של הפוטנציאל החופשי של הלמהולדס?</p>", "answer": "<p>$$F(T,V)=U-TS$$\nולכן:\n$$\\mathrm{d}F=T\\mathrm{d}S-p\\mathrm{d}V-T\\mathrm{d}S-S\\mathrm{d}T=-S\\mathrm{d}T-p\\mathrm{d}V$$</p>"}, {"question": "<p>מה ההגדרה של הפוטנציאל החופשי של גיבס?</p>", "answer": "<p>$$G(T,p)=H-TS$$\nולכן:\n$$\\mathrm{d}G=T\\mathrm{d}S+V\\mathrm{d}p-T\\mathrm{d}S-S\\mathrm{d}T=-S\\mathrm{d}T+V\\mathrm{d}p$$</p>"}, {"question": "<p>מה ההגדרה של זמניות?</p>", "answer": "<p>נסתכל על מערכת שנמצאת בתוך סביבה עם טמפרטורה $T_{0}$ ולחץ $p_{0}$. נגדיר את הזמינות בתור סך האנרגיה שניתן להוציא מהמערכת. זה יהיה שווה לביטוי הבא:\n$$ A=U+p_{0}V-T_{0}S,$$\nכלומר זה למעשה האנרגיה הפנימית שיש לגוף, ועוד האנרגיה שניתן לקבל מעבודה שהלחץ החיצוני יכול להפעיל על הנפח, פחות החום שניתן לקבל מהשינוי באנטרופיה בגלל התפשטות תרמית בנפח.</p>"}, {"question": "<p>מה אומר משפט חוק שלישי של תרמודינמיקה?</p>", "answer": "<p>האנטרופיה 0 מוגדרת בתור הגבול של מערכת כאשר הטמפרטורה שואפת ל-0.</p>"}]}
          console.log(subjects);
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length){
            location.reload()
            return;
            }
            if (currentQuestionIndex >= currentQuestions.length - 1) {
                document.getElementById('next-question').innerHTML = "לסיים";
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.typesetPromise(["#question"]).then(() => {
  MathJax.typesetPromise(["#answer"]);
});
            document.getElementById('question-counter').innerHTML = "שאלה "+ (currentQuestionIndex + 1) +" מתוך "+ currentQuestions.length;
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
