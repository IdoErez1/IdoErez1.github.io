        window.onload = function() {
          const subjects = {"שאלות - מידת לבג": [{"question": "<div class=\"proposition\">\n<p>לכל פונקציה מדידה $f:X\\to \\left[ 0,\\infty \\right]$ קיימת סדרת פונקציות פשוטות $s_{n}:X\\to \\left[ 0,\\infty \\right)$ המקיימת:</p>\n<ol>\n<li>\n<p>זוהי סדרה עולה של פונקציות פשוטות: \n$$0\\leq s_{1} \\leq s_{2} \\leq \\dots \\leq f$$</p>\n</li>\n<li>\n<p>לכל $x \\in X$ נקבל: \n$$\\lim_{ n \\to \\infty } s_{n}(x)=f(x)$$</p>\n</li>\n</ol>\n</div>", "answer": "<p>קיימים הרבה דרכים לבנות סדרת פונקציות כאלה, למשל אם נסתכל על $\\varphi_{n}:\\left[ 0,\\infty \\right)\\to\\left[ 0,\\infty \\right)$ המוגדרת על ידי:\n$$\\varphi_{n}=\\begin{cases}n  &amp; x\\geq n \\\\2^{-n}\\cdot \\left\\lfloor  2^{n}\\cdot x  \\right\\rfloor  &amp; 0\\leq x &lt; n \\end{cases}$$\nכאשר זוהי סדרה של פונקציות פשוטות כך ש:\n$$s_{n}=\\varphi_{n}\\circ  f$$</p>"}, {"question": "<p>ציין את התכונות הבסיסיות של אינטגרל לבג.</p>", "answer": "<ol>\n<li>\n<p>אם $0\\leq f\\leq g$ אז: \n$$0\\leq \\int _{A}f \\;\\mathrm{d} \\mu \\leq \\int _{A}g \\;\\mathrm{d} \\mu $$</p>\n</li>\n<li>\n<p>אם $0\\leq f$ ו-$A\\subseteq B$ נקבל: \n$$\\int _{A}f \\;\\mathrm{d} \\mu \\leq \\int _{B} f\\;\\mathrm{d} \\mu  $$</p>\n</li>\n<li>\n<p>אם $0\\leq f$ ו-$0\\leq c$ קבוע אז: \n$$\\int _{A} c\\cdot f  \\;\\mathrm{d} \\mu= c \\int _{A}f \\;\\mathrm{d} \\mu  $$</p>\n</li>\n<li>\n<p>אם $f|_{E}\\equiv 0$ אז: \n$$\\int _{E}f \\;\\mathrm{d} \\mu=0 $$\nגם אם $\\mu(E)=\\infty$.</p>\n</li>\n<li>\n<p>אם $\\mu(E)=0$ אז $\\int _{E}f \\;\\mathrm{d} \\mu=0$ (גם אם $\\int _{E}f \\;\\mathrm{d} \\mu \\equiv \\infty$). </p>\n</li>\n<li>\n<p>אם $0\\leq f$ אזי: \n$$\\int _{E}f \\;\\mathrm{d} \\mu=\\int _{X}f \\cdot \\mathbb{1} _{E} \\;\\mathrm{d} \\mu  $$</p>\n</li>\n</ol>"}, {"question": "<div class=\"proposition\">\n<p>תהי $f_{n}:X\\to \\mathbb{C}$ סדרה של פונקציות מדודות המגדרות כמעט-תמיד אם:\n$$\\sum_{i=1}^{\\infty} \\int  \\lvert f_{n} \\rvert  \\;\\mathrm{d} \\mu &lt; \\infty $$\nאזי:\n$$f(x)=\\sum_{i=1}^{\\infty} f_{n}(x)$$\nמוגדרת כמעט תמיד וב-$L^{1}\\left( \\mu \\right)$ מתקיים:\n$$\\int f \\;\\mathrm{d} \\mu = \\sum_{i=1}^{\\infty} \\int f_{n} \\;\\mathrm{d} \\mu  $$</p>\n</div>", "answer": "<p>ראשית נניח ש-$f_{n}$ מוגדרת על $X\\supseteq S_{n}$ כך ש-$\\mu(S_{n}^{c})=0$ אזי $\\varphi=\\sum_{i=1}^{\\infty}\\lvert f_{n} \\rvert$ מוגדרת על $S=\\bigcap_{n}S_{n}$ כך ש-$\\mu(S^{c})=\\mu\\left( \\bigcup_{n}S_{n}^{c} \\right)=0$. מהטענה שהוכחנו עבור פונקציות אי שליליות:\n$$\\int \\varphi \\;\\mathrm{d} \\mu =\\sum_{i=1}^{\\infty} \\int \\lvert f_{n} \\rvert  \\;\\mathrm{d} \\mu &lt; \\infty $$\nבפרט $\\varphi&lt; \\infty$ מתקיים $\\mu$- כמעט תמיד וכן $\\varphi \\in L^{1}\\left( \\mu \\right)$. ולכן מתקיים $\\mu$-כמעט תמיד שלכל $x \\in X$ מתקיים $\\sum_{i=1}^{\\infty}f_{n}(x)$ מתכנס בהחלט. ולכן מתכנס ב-$\\mathbb{C}$ ולכן $f$ מוגדרת $\\mu$-כמעט תמיד. נסמן $g_{k}=\\sum_{i=1}^{k}f_{n}$ ונבחין כי:\n$$\\lvert g_{k} \\rvert \\leq \\sum_{i=1}^{k} \\lvert f_{n} \\rvert \\leq \\varphi$$\nממשפט ההתכנסות הנשלטת. עבור $g_{k}\\to f$ נסיק כי $f \\in L^{1}\\left( \\mu \\right)$ ו-\n$$\\int f \\;\\mathrm{d} \\mu = \\lim_{ k \\to \\infty } \\int g_{k} \\;\\mathrm{d} \\mu=\\lim_{ n \\to \\infty } \\sum_{n=1}^{k} \\int  f_{n} \\;\\mathrm{d} \\mu = \\sum_{n=1}^{N} \\int f_{n} \\;\\mathrm{d} \\mu    $$</p>"}, {"question": "<div class=\"lemma\">\n<ol>\n<li>\n<p>פונקציה $f:X\\to\\left[ 0,\\infty \\right]$ מדידה אם: \n$$\\int f \\;\\mathrm{d} \\mu \\implies f\\underset{\\mu}{=} 0$$</p>\n</li>\n<li>\n<p>אם $f:X\\to \\mathbb{C}$ מדידה ולכל $E \\in \\mathcal{A}$ אשר מקיים $\\int _{E}f \\;\\mathrm{d} \\mu=0$ אזי $f\\underset{\\mu}{=} 0$. </p>\n</li>\n</ol>\n</div>", "answer": "<ol>\n<li>\n<p>ההנחה $\\int  f  \\;\\mathrm{d} \\mu=0$ גוררת ש: \n$$\\mu\\left( \\left\\{  x \\in X\\quad f(x)\\geq \\frac{1}{n}  \\right\\} \\right)=0$$\nולכל $n$ מתקיים $f=0$ כמעט תמיד.</p>\n</li>\n<li>\n<p>נסמן $f=a^{+}-a^{-}+iv^{+}-iv^{-}$ נתבונן ב: \n$$E=\\left\\{  u^{+}&gt; 0  \\right\\}$$\nונשים לב כי:\n$$0=\\mathrm{Re}\\int_{E} f \\;\\mathrm{d} \\mu  = \\int _{E}u \\;\\mathrm{d} \\mu = \\int _{X}u^{+} \\;\\mathrm{d} \\mu  $$\nכאשר השיוויון הראשון נובע מההנחה ש-$\\int _{E}f \\;\\mathrm{d} \\mu=0$ לכל $E \\in \\mathcal{A}$. לען מסעיף א נקבל:\n$$u^{+}=u^{-}=v^{+}=v^{-}=0$$</p>\n</li>\n</ol>"}, {"question": "<div class=\"proposition\">\n<p>נניח ש-$\\infty&gt; \\mu(X)$ ותהי $f:X\\to \\mathbb{C}$ ב-$L^{1}\\left( \\mu \\right)$. נגדיר את המידה של $f$ על קבוצה מדידה  $E \\in \\mathcal{A}$ עם $\\mu(E)&gt; 0$ להיות:\n$$A_{E}(f)=\\frac{1}{\\mu(E)}\\int _E f \\;\\mathrm{d} \\mu $$\nאם $\\Omega$ קבוצה סגורה ולכל $E \\in \\mathcal{A}$ מתקיים ש-$$A_{E}(f)\\in \\Omega$$ אזי $f(x) \\in \\Omega$ עבור $\\mu$ כמעט תמיד.</p>\n</div>", "answer": "<p>נסמן ב-$\\overline{B}_{\\alpha}\\left( \\alpha \\right)\\subseteq \\mathbb{C}$ את הכדור הסגור ברדיוס $r$ סביב $\\alpha$ ב-$\\mathbb{C}$. מאחר ש-$\\Omega^{c}$ פתוחה, הרי שהינה איחוד בן מנייה של כדורים סגורים. לכן מספיק להראות שעבור כל $\\overline{B}_{r}\\left( \\alpha \\right)\\subseteq \\Omega^{c}$:\n$$\\mu\\left( f^{-1}\\left( \\overline{B} _{r}\\left( \\alpha  \\right) \\right) \\right)=0$$\nנניח בשלילה שקיים $\\Omega^{c}\\supseteq \\overline{B}_{r}\\left( \\alpha \\right)$ עם $E=f^{-1}\\left( \\overline{B}_{r}\\left( \\alpha \\right) \\right)$ ממידה חיובית. אזי:\n$$\\left\\lvert  A_{\\varepsilon}(f)-\\alpha  \\right\\rvert =\\left\\lvert  \\frac{1}{\\mu(E)}\\int _{E}f \\;\\mathrm{d} \\mu -\\frac{1}{\\mu(E)}\\int _{E}\\alpha \\;\\mathrm{d} \\mu \\right\\rvert=\\frac{1}{\\mu(E)}   \\left\\lvert  \\int f-\\alpha \\;\\mathrm{d} \\mu   \\right\\rvert \\leq \\frac{1}{\\mu(E)}\\int _{E}\\left\\lvert  f-\\alpha  \\right\\rvert  \\;\\mathrm{d} \\mu \\leq r$$\nולכן $A_{E}(f)\\in \\overline{B}_{r}\\left( \\alpha \\right) \\subseteq \\Omega^{c}$ בסתירה להנחה.</p>"}, {"question": "<p>יהיו $f,g:X\\to\\left[ 0,\\infty \\right]$ מדידות. אזי:\n$$\\int (f+g) \\;\\mathrm{d} \\mu = \\int f \\;\\mathrm{d} \\mu+\\int  g \\;\\mathrm{d} \\mu   $$</p>", "answer": "<p>האסטרטגיה תהיה להוכיח את הטענה עבור פונקציות פשוטות ומשם להסיק את הטענה לכל פונקציה מדידה בעזרת משפט ההתכנסות המונוטונית.\nיהיו $s,t :X\\to \\left[ 0,\\infty \\right)$ פונקציות פשוטות כלשהן. נגדיר:\n$$t=\\sum_{j=1}^{m} B_{j}\\mathbb{1} _{B_{j}}\\qquad s=\\sum_{i=1}^{n} \\alpha_{i}\\mathbb{1} _{A_{i}}$$\nכש-$\\{ A_{i} \\}$ ו-$\\{ B_{i} \\}$ חלוקות של $X$. כעת כיוון שהסכום $s+t$ פונקצייה פשוטה נקבל:\n$$\\int (s+t) \\;\\mathrm{d} \\mu = \\sum_{i,j} \\left( \\alpha_{i}+\\beta_{j} \\right)\\cdot\\left( A_{i}\\cap B_{j} \\right)=\\sum_{i}\\alpha_{i}\\overbrace{ \\sum_{j}\\mu\\left( A_{i}\\cap B_{j} \\right) }^{ =\\mu(A_{i}) }  +\\sum_{j}B_{j}\\overbrace{ \\sum_{i}\\mu\\left( A_{i}\\cap B_{j} \\right) }^{ =\\mu(B_{j}) }=\\int s \\;\\mathrm{d} \\mu +\\int t \\;\\mathrm{d} \\mu $$\nיהיו $f,g$ מדידות יהיו $s_{n}\\to f$ ו-$t_{n}\\to g$ סדרות עולות של פונקציות פשוטות, אזי $s_{n}+t_{n}\\to f+g$ וממשפט ההתכנסות המונוטונית:\n$$\\int (f+g) \\;\\mathrm{d} \\mu = \\lim_{n\\to \\infty} \\int  s_{n}\\;\\mathrm{d}\\mu + \\int t \\;\\mathrm{d} \\mu =\\int f \\;\\mathrm{d} \\mu+\\int g \\;\\mathrm{d} \\mu  $$</p>"}, {"question": "<p>בהנתן מרחב מידה $\\left( X,\\mathcal{ A, \\mu} \\right)$ נגדיר פונקציית מדידה $h:X\\to \\left[ 0,\\infty \\right)$. הפונקציית מידה $\\nu:\\mathcal{A}\\to \\left[ 0,\\infty \\right]$ המוגדרת על ידי:\n$$\\nu(E)=\\int _{X}h \\;\\mathrm{d} \\mu $$\nהינה מידה על $\\left( X,\\mathcal{A} \\right)$. נסמן במקרה זה $\\mathrm{d}\\nu=h\\cdot \\mathrm{d\\mu}$. מעבר לכך לכל $g:X\\to\\left[ 0,\\infty \\right]$ מדידה נגדיר:\n$$\\int g \\;\\mathrm{d} \\nu = \\int g \\cdot h \\;\\mathrm{d} \\mu  $$</p>", "answer": "<p>ראשית ש-$\\nu\\left( \\varnothing \\right)=0$ לכן אם $E_{1},E_{2},\\dots$ סדרה כלשהי של קבוצות מדידות זרות עם איחוד $E=\\bigcup_{n}E_{n}$. מתקיים ש:\n$$\\nu(E)=\\int _{E}h \\;\\mathrm{d} \\mu = \\int _{X}h\\cdot \\mathbb{1} _{E} \\;\\mathrm{d} \\mu = \\int h \\sum_{n=1}^{\\infty} \\mathbb{1}_{E_{n}} \\;\\mathrm{d} \\mu   = \\sum_{n=1}^{\\infty} \\nu(E_{n})$$\nכאשר השתמשנו בזה ש-$\\mathbb{1}_{E}=\\sum_{n=1}^{\\infty}\\mathbb{1}_{E_{n}}$ ובטענה הקודמת. קיבלנו כי $\\nu$ מידה על $\\left( X,\\mathcal{ A} \\right)$. קל להשתכנע כי $(*)$ מתקיימת עבור פונקציות פשוטות. לכן עבור $g$ מדידה נקח $S_{n}\\to g$ סדרה עולה של פונקציות פשוטות ונקבל ממשפט ההתכנסות המונוטונית על מרחב המידה $\\left( X,\\mathcal{A},\\nu \\right)$ כי:\n$$\\int g \\;\\mathrm{d} \\nu =\\lim_{ n \\to \\infty } \\int s_{n} \\;\\mathrm{d} \\nu = \\lim_{ n \\to \\infty } \\int s_{n}h \\;\\mathrm{d} \\mu $$\nכעת כיוון ש-$s_{n}\\cdot h \\to g\\cdot h$ סדרה עולה נקבל כי:\n$$\\lim_{ n \\to \\infty } \\int s_{n}h \\;\\mathrm{d} \\mu=\\int g\\cdot h \\;\\mathrm{d} \\mu \\implies \\int g \\;\\mathrm{d} \\nu=\\int g\\cdot h \\;\\mathrm{d} \\mu  $$</p>"}, {"question": "<p>ציין תנאי שקול לכך שפונקציה מרוכבת תהיה מדידה.</p>", "answer": "<p>פונקציה $f:X\\to \\mathbb{C}$ מדידה אם\"ם $u,v:X\\to \\mathbb{R}$ מדידות אם\"ם $u^{+},u^{-},v^{+},v^{-}:X\\to \\left[ 0,\\infty \\right)$ מדידות.</p>"}, {"question": "<div class=\"proposition\">\n<p>תהי $f \\in L^{1}\\left( \\mu \\right)$ אזי:\n$$\\left\\lvert  \\int f \\;\\mathrm{d} \\mu   \\right\\rvert \\leq \\int \\lvert f \\rvert  \\;\\mathrm{d} \\mu $$</p>\n</div>", "answer": "<p>אנו יודעים כי $\\int f \\;\\mathrm{d} \\mu \\in \\mathbb{C}$. ולכן קיים $\\alpha \\in \\mathbb{C}$ עם $\\left\\lvert  \\alpha  \\right\\rvert=1$ שעבורו:\n$$\\alpha \\int f \\;\\mathrm{d} \\mu = \\left\\lvert  \\int f \\;\\mathrm{d} \\mu   \\right\\rvert  $$\nולכן:\n$$\\left\\lvert  \\int f \\;\\mathrm{d} \\mu   \\right\\rvert =\\alpha \\int f \\;\\mathrm{d} \\mu = \\overbrace{ \\int \\alpha f\\;\\mathrm{d} \\mu }^{ \\text{Real} }  =\\int \\mathrm{Re}\\left( \\alpha \\cdot f \\right) \\;\\mathrm{d} \\mu + i \\int \\mathrm{Im}\\left( \\alpha \\cdot f \\right) \\;\\mathrm{d} \\mu  $$\nוכיוון שיש לנו פונקציה ממשית שמוצגת על ידי צירוף לינארי של מספר ממשי ומרוכב, נדרש שהחלק המרוכב מתאפס, ולכן:\n$$\\int \\mathrm{Im}\\left( \\alpha \\cdot f \\right) \\;\\mathrm{d} \\mu=0 $$\nכאשר:\n$$\\int \\mathrm{Re}\\left( \\alpha \\cdot f \\right) \\;\\mathrm{d} \\mu \\leq \\int \\left\\lvert  \\mathrm{Re}\\left( \\alpha \\cdot f \\right)  \\right\\rvert  \\;\\mathrm{d} \\mu \\leq \\int  \\left\\lvert  \\alpha \\cdot f  \\right\\rvert  \\;\\mathrm{d} \\mu = \\int \\lvert f \\rvert  \\;\\mathrm{d} \\mu   $$\nכאשר השתמשנו בזה ש-$\\left\\lvert  \\alpha  \\right\\rvert=1$</p>"}], "מידת לבג": [{"question": "<p>מה ההגדרה של התכנסות נקודתית כמעט תמיד?</p>", "answer": "<p>יהי $\\left( X,\\mathcal{A},\\mu \\right)$ מרחב מידה ו-$f_{n},f:X\\to \\mathbb{R}$ פונקציות מדידות. נגדיר $f_{n}\\to f$ נקודתית כמעט תמיד אם כמעט לכל $x \\in X$ מתקיים:\n$$f(x)=\\lim_{ n \\to \\infty } f_{n}(x)$$</p>"}, {"question": "<p>מה ההגדרה של התכנסות ב-$L^{1}$?</p>", "answer": "<p>יהי $\\left( X,\\mathcal{A},\\mu \\right)$ מרחב מידה ו-$f_{n},f :X\\to \\mathbb{R}$ פונקציות מדידות. אזי אם:\n$$\\int \\lvert f_{n}-f \\rvert  \\;\\mathrm{d} \\mu\\to 0 $$\nנגיד שהסדרה $f_{n}$ מתכנסת ל-$f$ ב-$L^{1}$.</p>"}, {"question": "<p>מה ההגדרה של התכנסות במידה?</p>", "answer": "<p>יהי $\\left( X,\\mathcal{A},\\mu \\right)$ מרחב מידה ו-$f_{n},f:X\\to \\mathbb{R}$ פונקציות מדידות. אם לכל $\\varepsilon&gt; 0$ מתקיים:\n$$\\mu\\left( \\left\\{  x\\mid \\lvert f_{n}(x)-f(x) \\rvert \\geq \\varepsilon  \\right\\} \\right)\\to 0$$\nנאמר ש-$f_{n}\\to f$ במידה.</p>"}, {"question": "<p>מה ההגדרה של אינטגרבילות של פונקציות מרוכבת?</p>", "answer": "<p>נאמר שפונקציה מדידה $f:X\\to \\mathbb{C}$ אינטגרבילית(או סכימה) אם:\n$$\\int \\lvert f \\rvert  \\;\\mathrm{d} \\mu &lt; \\infty $$\nנגדיר:\n$$L^{1}\\left( \\mu \\right):= \\left\\{  f:X\\to \\mathbb{C} \\mid \\int  \\lvert f \\rvert  \\;\\mathrm{d} \\mu &lt; \\infty   \\right\\}$$</p>"}, {"question": "<p>מה ההגדרה של אינטגרל של פונקציה מרוכבת?</p>", "answer": "<p>עבור $f\\in L^{1}\\left( \\mu \\right)$ נגדיר:\n$$\\int f \\;\\mathrm{d} \\mu := \\left( \\int u^{+} \\;\\mathrm{d} \\mu -\\int u^{-} \\;\\mathrm{d} \\mu  \\right)+ i\\left( \\int v^{+} \\;\\mathrm{d} \\mu -\\int v^{-} \\;\\mathrm{d} \\mu  \\right)$$</p>"}, {"question": "<p>מה אומר משפט ההתכנסות הנשלטת - Dominated Convergence?</p>", "answer": "<p>תהי $f_{n}:X\\to \\mathbb{C}$ סדרה של פונקציות מדידות נניח שקיימת פונקציה $g \\in L^{1}\\left( \\mu \\right)$ כך שלכל $n$ מתקיים:\n$$\\lvert f_{n} \\rvert \\leq g$$\n(כאשר זה יהיה הנשלטות - $g$ שולטת על $f_{n}$). וכן נניח כי $f_{n}\\to f$ נקודתית. אזי:\n$$\\int \\lvert f-f_{n} \\rvert  \\;\\mathrm{d} \\mu \\xrightarrow{} 0 $$\nובפרט:\n$$\\int f \\;\\mathrm{d} \\mu = \\lim_{ n \\to \\infty } \\int f_{n} \\;\\mathrm{d} \\mu  $$</p>"}, {"question": "<p>מה ההגדרה של $\\mu$ כמעט תמיד?</p>", "answer": "<p>במרחב מידה $\\left( X,\\mathcal{A},\\mu \\right)$ נאמר שכונה $P$ מתקיימת $\\mu$-כמעט תמיד($\\mu$-כת) אם קיימת קבוצה $N \\in \\mathcal{A}$ עם $\\mu(N)=0$ כך ש-$P$ מתקיימת לכל $x \\in X\\setminus N$.</p>"}, {"question": "<p>מה ההגדרה של פונקציות שוות כמעט תמיד?</p>", "answer": "<p>פונקציות אשר שוות פרט לקבוצה במידה אפס. אם $f \\underset{\\mu}{=} g$ אז $\\mu\\left( \\left\\{  f\\neq g  \\right\\} \\right)=0$.</p>"}, {"question": "<p>מה ההגדרה של קבוצה ממידה אפס?</p>", "answer": "<p>קבוצה אשר המידה שלה שווה ל-0.</p>"}, {"question": "<p>מה ההגדרה של קבוצה מקו-מידה אפס?</p>", "answer": "<p>קבוצה אשר המשלים שלה הוא קבוצה ממידה אפס.</p>"}, {"question": "<p>מה ההגדרה של פונקציה פשוטה?</p>", "answer": "<p>פונקציה $s:X\\to \\mathbb{C}$ על מרחב מדיד $\\left( X,\\mathcal{A} \\right)$ נקראת פשוטה אם היא מדידה ובעלת תמונה סופית. כלומר:\n$$\\lvert s(X) \\rvert &lt;\\infty$$\nבאופן שקול ניתן לומר שקיימים קבועים $\\alpha_{1},\\dots,\\alpha_{k}\\in \\mathbb{C}$ וקבוצות מדידות $E_{1},\\dots,E_{k}\\in \\mathcal{A}$ כך ש:\n$$s=\\sum_{i=1}^{k}\\alpha_{i}\\mathbb{1} _{E_{i}}$$</p>"}, {"question": "<p>מה ההגדרה של אינטגרל של פונקציה פשוטה?</p>", "answer": "<p>על המרחב מידה $\\left( X,\\mathcal{A},\\mu \\right)$ האינטגרל של פונקציה פשוטה $s:X\\to \\left[ 0,\\infty \\right)$ מוגדר להיות:\n$$s=\\sum_{i=1}^{k} \\alpha_{i}\\mathbb{1} _{E_{i}}$$\nמעל קבוצה מדידה $A\\in \\mathcal{A}$ מוגדר להיות:\n$$\\int_{A} s\\;\\mathrm{d}\\mu:= \\sum_{i=1}^{k} \\alpha_{i}\\mu\\left( A\\cap E_{i} \\right)$$</p>"}, {"question": "<p>מה ההגדרה של אינטגרל לבג?</p>", "answer": "<p>תהי $f:X\\to \\left[ 0,\\infty \\right]$ פונקציה מדידה. נגדיר את האינטגרל לבג שלה ביחס ל-$\\mu$ מעל קבוצה מדידה $A \\in \\mathcal{ A}$ להיות:\n$$\\int _{A}f \\;\\mathrm{d} \\mu := \\sup _{0\\leq s \\leq f} \\int _{A}s \\;\\mathrm{d} \\mu $$</p>"}, {"question": "<p>מה ההגדרה של התכנסות נקודתית?</p>", "answer": "<p>יהי $\\left( X,\\mathcal{A},\\mu \\right)$ מרחב מידה ו-$f_{n},f:X\\to \\mathbb{R}$ פונקציות מדידות. נגדיר $f_{n}\\to f$ נקודתית אם לכל $x \\in X$ מתקיים:\n$$f(x)=\\lim_{ n \\to \\infty } f_{n}(x)$$</p>"}, {"question": "<p>מה אומר משפט ההתכנסות המונוטונית?</p>", "answer": "<p>תהי $\\left\\{  f_{n}:X\\to \\left[ 0,\\infty \\right]  \\right\\}$ סדרה עולה:\n$$0\\leq f_{1} \\leq f_{2} \\leq \\dots$$\nשל פונקציות מדידות. אזי:\n$$f=\\lim_{ n \\to \\infty } f_{n}\\quad \\left( =\\sup _{n}f_{n} \\right)$$\nמקיימת:\n$$\\int_{A}f \\;\\mathrm{d}\\mu = \\lim_{ n \\to \\infty } \\int_{A}f_{n}\\;\\mathrm{d}\\mu$$</p>"}, {"question": "<p>מה אומר משפט הלמה של פאטו - Fatou?</p>", "answer": "<p>תהי $f_{n}:X\\to \\left[ 0,\\infty \\right]$ סדרה של פונקציות מדידות. אזי:\n$$\\int \\liminf_{ n \\to \\infty }  f_{n}\\;\\mathrm{d} \\mu \\leq \\liminf_{ n \\to \\infty } \\int f_{n} \\;\\mathrm{d} \\mu   $$</p>"}], "שאלות - מרחבי Lᵖ": [{"question": "<p>ציין תנאי שקול לקמירות.</p>", "answer": "<p>$$\\frac{\\varphi(t)-\\varphi(s)}{t-s}\\leq \\frac{\\varphi(u)-\\varphi(t)}{u-t}$$</p>"}, {"question": "<p>הוכח את הטענה הבאה:\nלכל $1\\leq p\\leq \\infty$ מתקיים כי $L^{p}$ מרחב נורמי שלם(שלם כמרחב מטרי ביחס ל-$d(x,y)=\\lVert x-y \\rVert_{p}$).</p>\n<div class=\"proof\">\n<p>נתחיל מהמקרה של $1\\leq p&lt; \\infty$. תהי $(f_{n})\\subseteq L^{p}$ סדרת קושי כלשהי. נבחר תת סדרה $f_{n_{k}}$ המקיימת:\n$$\\forall k \\in \\mathbb{N}\\quad \\lVert f_{n_{k+1}}-f_{n_{k}} \\rVert _{p}&lt;2^{-k}$$\nנגדיר:\n$$g_{k}= \\sum_{i=1}^{k} \\lvert f_{n_{i+1}}-f_{n_{i}} \\rvert $$\nאזי $g_{k}\\in L^{p}$. נסמן $g=\\sum_{i=1}^{\\infty} \\lvert f_{n_{i+1}}-f_{n_{i}} \\rvert$. נבחין כי $0\\leq g_{1}\\leq g_{2}\\leq \\dots$. ו-$g=\\lim_{ k \\to \\infty }g_{k}$ לכן ממשפט ההתכנסות המונוטונית:\n$$\\lVert g \\rVert _{p}^{p}=\\int g^{p} \\;\\mathrm{d} \\mu = \\lim_{ k \\to \\infty } \\int g_{k}^{p} \\;\\mathrm{d} \\mu &lt; 1  $$\nכי מאי שיוויון מינקובסקי:\n$$\\lVert g_{k} \\rVert_{p}\\leq \\sum_{i=1}^{k}\\lVert f_{n_{i+1}}-f_{n_{i}} \\rVert_{p} &lt; 1$$\nמכך ש-$\\lVert g \\rVert_{p}$ נובע ש-$g(x)&lt;\\infty$ מתקיים $\\mu$ כמעט תמיד כלומר הטור $\\sum_{i=1}^{\\infty} (f_{n_{i+1}}-f_{n_{i}})$ מתכנס בהחלט $\\mu$-כמעט תמיד. נגדיר \n$$f=f_{n_{1}} + \\sum_{i=1}^{\\infty}  (f_{n_{i+1}}-f_{n_{i}})$$\nונסיק כי $f \\in L^{p}$. מוגדר $\\mu$-כמעט תמיד. נקבע $f=0$ היכן שאיננו מוגדר נבחין כי:\n$$f(x)=\\lim_{ i \\to \\infty } f_{n_{i}}(x)$$\nמתקיים $\\mu$ כמעט תמיד. מהלמה של פאטו(Fatou) עבור כל $m \\in \\mathbb{N}$:\n$$\\int \\lvert f_{m}-f\\rvert^{p}  \\;\\mathrm{d} \\mu \\leq \\liminf_{ i \\to \\infty } \\int \\lvert f_{m}-f_{n_{i}} \\rvert ^{p} \\;\\mathrm{d} \\mu = \\liminf  \\lVert f_{m}-f_{n_{i}} \\rVert _{p}^{p}$$</p>\n</div>\n<p>מאחר ש-$(f_{n})$ סדרת קושי, הרי שלכל $0&lt;\\varepsilon$ קיים $N$ כך שלכל $m,n &gt; N$ מתקיים:\n$$\\lVert f_{m}-f_{n} \\rVert _{p}&lt;\\varepsilon$$\nבפרט עבור $m&gt; N$:\n$$\\lVert f_{m}-f \\rVert _{p}^{p}\\leq \\liminf_{i\\to \\infty} \\lVert f_{m}-f_{n_{i}} \\rVert _{p}^{p}&lt;\\varepsilon^{p} $$\nולכן\n$$\\lVert f \\rVert _{p}\\leq \\lVert f_{m} \\rVert _{p}+\\lVert f_{m}-f \\rVert_{p}&lt; \\infty$$\nכלומר $f \\in L^{p}$. יתר על כן הראנו ש-$\\lVert f_{m}-f \\rVert\\xrightarrow{m\\to \\infty} 0$.\nעבור $p=\\infty$ ניקח סדרת קושי $(f_{n})\\subseteq L^{\\infty}\\left( \\mu \\right)$. נסמן:\n$$A_{n}=\\left\\{  x\\mid \\lvert f_{n}(x) \\rvert &gt;\\lVert f_{n} \\rVert _{\\infty}  \\right\\}\\qquad B_{n,k}=\\left\\{  x \\mid \\lvert f_{n}(x)-f_{k}(x) \\rvert &gt; \\lVert f_{n}-f_{k} \\rVert _{\\infty}  \\right\\}$$\nכאשר:\n$$\\mu\\left( \\underbrace{ \\bigcup_{n}A_{n}\\cup \\bigcup_{n,k}B_{n,k}  }_{ E }\\right)=0$$\nמכיוון שעל  $X \\setminus E$ מתקיים ש-$f_{n}$ מתכנס במ\"ש.\nבפרט $f(x)=\\lim_{ n \\to \\infty }f_{n(x)}$ מוגדר $\\mu$ כמעט תמיד וחסום על ידי $\\lim_{ n \\to \\infty }\\lVert f_{n} \\rVert_{\\infty}$ כלומר $f \\in L^{\\infty}$ ומתקיים:\n$$\\lVert f-f_{n} \\rVert _{\\infty}\\xrightarrow{n\\to \\infty} 0$$</p>\n<p>הוכח את הטענה הבאה:\nיהי $S$ אוסף כל הפונקציות הפשוטות $S:X\\to \\mathbb{C}$ המקיימות:\n$$\\mu\\left( \\left\\{  x\\mid s(x)\\neq 0  \\right\\} \\right)&lt; \\infty$$\nאזי לכל $1\\leq p &lt; \\infty$ הקבוצה $S$ צפופה ב-$L^{p}\\left( \\mu \\right)$.</p>", "answer": "<p>ראשי מאחר שלכל $s \\in S$ התמונה $s(X)$ סופית(המשמעות של להיות פונקציה פשוטה) הרי שיחד עם $\\mu\\left( \\left\\{  s\\neq 0  \\right\\} \\right)&lt;\\infty$ נסיק כי $S\\subseteq L^{p}\\left( \\mu \\right)$ לכל $1\\leq p\\leq \\infty$. תהי $f \\in L^{p}\\left( \\mu \\right)$ כלשהי. ניקח את הסדרה:\n$$0\\leq s_{1} \\leq s_{2} \\leq s_{3} \\leq \\dots \\leq f$$\nפשוטות שבנינו בעבר. אכן מהתנאי $0\\leq s_{n}\\leq f$ נסיק כי $\\mu\\left( \\left\\{  s_{n}\\neq 0  \\right\\} \\right)$.\nנניח בשלילה $s_{n}\\in S$. נסמן:\n$$c=\\min \\left\\{  \\alpha&gt; 0\\mid \\mu\\left( \\left\\{  s_{n}=\\alpha  \\right\\} \\right)=\\infty  \\right\\}$$\nאזי:\n$$\\int f^{p} \\;\\mathrm{d} \\mu \\geq \\int  s_{n}^{p} \\;\\mathrm{d} \\mu \\geq c^{p}\\mu\\left( \\{ s_{n}=c \\} \\right)=\\infty $$\nבסתירה לכך ש-$f \\in L^{p}\\left( \\mu \\right)$. נזכר ש-$s_{n}\\to f$ נקודתית ולכן $\\lvert f-s_{n} \\rvert^{p}\\xrightarrow{n\\to \\infty}0$. כמו כן $\\lvert f-s_{n} \\rvert^{p}\\leq f^{p}\\in L^{1}\\left( \\mu \\right)$ ולכן אנחנו מתקיימים את התנאים של משפט ההתכנסות בנשלטת. ולכן:\n$$\\lVert f -s_{n}\\rVert _{p}^{p}= \\int \\lvert f-s_{n} \\rvert ^{p} \\;\\mathrm{d} \\mu \\xrightarrow{n\\to \\infty}0\\implies L^{p}\\left( \\mu \\right)=\\overline{S}  $$</p>"}, {"question": "<p>הוכח את הטענה הבאה: קירוב על ידי פונקציות רציפות\nיהי $X$ מרחב האוסדורף קומפקטית מקומית ותהי $\\mu$ מידת רדין על $X$.\nלכל $1\\leq p&lt;\\infty$ הקבוצה $C_{c}(X)$ צפופה ב-$L^{p}\\left( \\mu \\right)$.</p>", "answer": "<p>ראשית, מאחר ש-$\\mu$ מידת רדון, הרי ש-$C_{c}(X)\\leq L^{p}\\left( \\mu \\right)$. מספיק להראות ש-$S\\subseteq \\overline{C_{c}(X})$. תהי $s \\in S$ כלשהי. ממשפט Lusin הרי שלכל $0&lt; \\varepsilon$ קיימת $g \\in C_{c}(X)$ המקיימת:\n$$\\mu\\left( \\left\\{  s \\neq g  \\right\\} \\right)&lt; \\varepsilon$$\nיתר על כן נוכל לדרש\n$$\\sup_{x \\in X}\\lvert g \\rvert\\leq \\sup_{x \\in X}\\lvert s \\rvert=M$$\nכאשר נבחין כי מכך נובע ש-$\\lvert g-s \\rvert\\leq 2M$. לכן:\n$$\\lVert g-s \\rVert _{p}^{p}=\\int \\lvert g-s \\rvert ^{p} \\;\\mathrm{d} \\mu=\\cancelto{ 0 }{ \\int_{\\{ g=s \\}} \\lvert g-s \\rvert ^{p} \\;\\mathrm{d} \\mu }  + \\int _{\\left\\{  g\\neq s  \\right\\}}\\lvert g-s \\rvert ^{p} \\;\\mathrm{d} \\mu \\leq 2M\\varepsilon$$</p>"}, {"question": "<p>הוכח את הלמה הבאה:\nפונקציונאל לינארי $\\phi:\\mathcal{H}\\to \\mathbb{C}$ הינו רציף אם\"ם הינו חסום.</p>", "answer": "<p>אם $\\phi$ חסום הרי הינו שלכל $x,y \\in \\mathcal{H}$ מתקיים:\n$$\\left\\lvert  \\phi(x)-\\phi(y)  \\right\\rvert =\\left\\lvert  \\phi(x-y)  \\right\\rvert \\leq \\left\\lVert  \\phi  \\right\\rVert _{\\mathrm{op}}\\cdot \\lVert x-y \\rVert $$\nולכן $\\phi$ רציף(אפילו ליפשיץ).\nעבור הכיוון השני, אם $\\phi$ רציף הרי שקיים $0&lt; \\delta$ כך שלכל $\\lVert x \\rVert&lt; \\delta$ מתקיים $\\left\\lvert  \\phi(x)  \\right\\rvert&lt;1$ ולכל $\\lVert x \\rVert\\leq \\frac{\\delta}{2}$ מתקיים $\\left\\lvert  \\phi(x)  \\right\\rvert&lt;1$. \nולכן $\\lVert x \\rVert\\leq 1$ מתקיים $\\left\\lvert  \\phi(x)  \\right\\rvert&lt; \\frac{2}{\\delta}$ ולכן $\\left\\lVert  \\phi  \\right\\rVert_{\\mathrm{op}}\\leq \\frac{2}{\\delta}$. נסמן:\n$$\\mathcal{H}^{*}=\\left\\{  \\phi \\mid \\mathcal{H}\\to \\mathbb{C}   \\text{ is a bounded linear functional}\\right\\}$$\nהמרחב הדואלי של $\\mathcal{H}$.</p>"}, {"question": "<p>הוכח את הטענה הבאה:\nאם $\\mu$ סופית אז $\\mu\\ll \\nu$ שקול לכך שלכל $\\varepsilon&gt;0$ קיים $\\delta&gt; 0$ כך ש-$\\nu(A)&lt;\\varepsilon$ גורר $\\mu(A)&lt;\\delta$.</p>", "answer": "<p>נניח שלכל $\\varepsilon&gt;0$ קיים $\\delta&gt; 0$ כך ש-$\\nu(A)&lt;\\varepsilon$ גורר $\\mu(A)&lt;\\delta$. ונניח כי $\\nu(A)=0$ נקבל:\n$$\\forall \\delta&gt;0\\quad \\nu(A)&lt;\\delta\\implies \\forall\\varepsilon&gt;0\\quad  \\mu(A)&lt;\\varepsilon\\implies \\mu(A)=0$$\nנניח $\\mu\\ll \\nu$. נניח בשלילה שקיים $\\varepsilon&gt;0$ כך שלכל $n \\in \\mathbb{N}$ יש $A_{n}$ עם $\\nu(A_{n})&lt;2^{-n}$ כך ש-$\\mu(A_{n})\\geq \\varepsilon$. ולפי בורל קנטלי:\n$$\\nu(A)=\\nu\\left( \\bigcap_{k=1}^{\\infty}\\bigcup_{n=k}^{\\infty} A_{n} \\right)$$\nכמו כן מתקיים:\n$$\\mu\\left( \\bigcap_{m=1}^{\\infty}\\bigcup_{n=m}^{\\infty}A_{n} \\right)=\\mu\\left( \\operatorname*{lim}\\operatorname*{sup}A_{n} \\right)\\geq\\operatorname*{lim}\\operatorname*{sup}\\mu(A_{n})\\geq\\epsilon $$</p>"}, {"question": "<p>הוכח את הטענה הבאה:\nיהי $\\left( X,\\mathcal{M} \\right)$ מרחב מידה, ו-$\\mu,\\nu$ מדידות. אזי $\\mu \\perp \\nu$ אם\"ם:\n$$ \\forall\\varepsilon&gt; 0 \\quad \\exists A \\quad  \\mu(A)&lt;\\varepsilon \\quad \\nu(A^{c})&lt;\\varepsilon$$</p>", "answer": "<p>אם $\\mu \\perp \\nu$ אז קיימת קבוצה $A$ כך ש-$\\mu(A)=0$ ו-$\\nu(A^{c})=0$.\nנוכיח כעת את הכיוון השני. עבור $\\varepsilon=2^{-n}$ נבחר $A_{n}$. נגדיר:\n$$A=\\limsup_{ n \\to \\infty } (A_{n})$$\nוכן נקבל $\\nu(A)=0$. מצד שני:\n$$\\nu\\left( A^{c}  \\right)=\\nu\\left( \\liminf_{ n \\to \\infty } A_{n} \\right)\\leq \\liminf_{ n \\to \\infty } \\nu(A_{n})=0$$</p>"}, {"question": "<p>הוכח את הלמה הבאה:\nתהי $\\mu$ מידה $\\sigma$ סופית על $\\left( X,\\mathcal{A} \\right)$ אזי קיימת מידה סופית $\\nu$ כך ש-$\\nu \\sim \\mu$(המידות שקולות - כלומר גם מתקיים $\\nu\\ll \\mu$ וגם $\\mu\\ll \\nu$).</p>", "answer": "<p>יהי $\\mu$ מידה $\\sigma$ סופית, עם $X=\\bigcup_{n=1}^{\\infty}A_{n}$ כאשר $\\mu(A_{n})\\ll \\infty$ לכל $n$. נגדיר:\n$$w(x)=\\sum_{n=1}^{\\infty}\\frac{2^{-n}}{1+\\mu(A_{n})}\\mathbb{1} _{A_{n}}(x).$$\nכאשר כל גורם הוא חיובי וחסום על ידי $2^{-n}$ . לכן הטור מתכנס ממבחן ההשוואה לטורים אי שליליים. לכן $0&lt;w(x)\\leq 1$ לכל $x \\in X$.\nנגדיר פונקציה סופית $\\nu$ על ידי:\n$$d\\nu=w\\,d\\mu\\quad(\\nu(E)=\\int_{E}w\\,d\\mu\\,\\mathrm{for~all}\\,\\,E\\in{\\mathcal{A}}).$$\nזו תהיה מידה סופית כיוון שמתקיים:\n$$\\nu(X)=\\int_{X}w\\,d\\mu=\\sum_{n=1}^{\\infty}{\\frac{2^{-n}}{1+\\mu(A_{n})}}\\mu(A_{n})\\leq\\sum_{n=1}^{\\infty}2^{-n}=1$$\nנשים לב כעת לשקילות:\n- אם $\\mu(E)=0$ אז $\\nu(E)=\\int _{E}w \\;\\mathrm{d} \\mu=0$ ולכן $\\nu\\ll \\mu$.\n- אם $\\nu(E)=0$ כיוון ש-$w(x)&gt; 0$ לכל $x$ האינטגרל $\\int _{E}w \\;\\mathrm{d} \\mu=0$ גורר $\\mu(E)=0$ ולכן $\\mu\\ll \\nu$.</p>"}], "הוכחות טענות": [{"question": "<div class=\"lemma\">\n<p>יהיו $f,g:X\\to\\left[ 0,\\infty \\right]$ מדידות. אזי:\n$$\\int (f+g) \\;\\mathrm{d} \\mu = \\int f \\;\\mathrm{d} \\mu+\\int  g \\;\\mathrm{d} \\mu   $$</p>\n</div>", "answer": "<p>האסטרטגיה תהיה להוכיח את הטענה עבור פונקציות פשוטות ומשם להסיק את הטענה לכל פונקציה מדידה בעזרת משפט ההתכנסות המונוטונית.\nיהיו $s,t :X\\to \\left[ 0,\\infty \\right)$ פונקציות פשוטות כלשהן. נגדיר:\n$$t=\\sum_{j=1}^{m} B_{j}\\mathbb{1} _{B_{j}}\\qquad s=\\sum_{i=1}^{n} \\alpha_{i}\\mathbb{1} _{A_{i}}$$\nכש-$\\{ A_{i} \\}$ ו-$\\{ B_{i} \\}$ חלוקות של $X$. כעת כיוון שהסכום $s+t$ פונקצייה פשוטה נקבל:\n$$\\int (s+t) \\;\\mathrm{d} \\mu = \\sum_{i,j} \\left( \\alpha_{i}+\\beta_{j} \\right)\\cdot\\left( A_{i}\\cap B_{j} \\right)=\\sum_{i}\\alpha_{i}\\overbrace{ \\sum_{j}\\mu\\left( A_{i}\\cap B_{j} \\right) }^{ =\\mu(A_{i}) }  +\\sum_{j}B_{j}\\overbrace{ \\sum_{i}\\mu\\left( A_{i}\\cap B_{j} \\right) }^{ =\\mu(B_{j}) }=\\int s \\;\\mathrm{d} \\mu +\\int t \\;\\mathrm{d} \\mu $$\nיהיו $f,g$ מדידות יהיו $s_{n}\\to f$ ו-$t_{n}\\to g$ סדרות עולות של פונקציות פשוטות, אזי $s_{n}+t_{n}\\to f+g$ וממשפט ההתכנסות המונוטונית:\n$$\\int (f+g) \\;\\mathrm{d} \\mu = \\lim_{n\\to \\infty} \\int  s_{n}\\;\\mathrm{d}\\mu + \\int t \\;\\mathrm{d} \\mu =\\int f \\;\\mathrm{d} \\mu+\\int g \\;\\mathrm{d} \\mu  $$</p>"}, {"question": "<p>לכל פונקציה מדידה $f:X\\to \\left[ 0,\\infty \\right]$ קיימת סדרת פונקציות פשוטות $s_{n}:X\\to \\left[ 0,\\infty \\right)$ המקיימת:</p>\n<ol>\n<li>\n<p>זוהי סדרה עולה של פונקציות פשוטות: \n$$0\\leq s_{1} \\leq s_{2} \\leq \\dots \\leq f$$</p>\n</li>\n<li>\n<p>לכל $x \\in X$ נקבל: \n$$\\lim_{ n \\to \\infty } s_{n}(x)=f(x)$$</p>\n</li>\n</ol>", "answer": "<div class=\"example\">\n<p>נסתכל על $\\varphi_{n}:\\left[ 0,\\infty \\right)\\to\\left[ 0,\\infty \\right)$ המוגדרת על ידי:\n$$\\varphi_{n}=\\begin{cases}n  &amp; x\\geq n \\\\2^{-n}\\cdot \\left\\lfloor  2^{n}\\cdot x  \\right\\rfloor  &amp; 0\\leq x &lt; n \\end{cases}$$\nכאשר זוהי סדרה של פונקציות פשוטות כך ש:\n$$s_{n}=\\varphi_{n}\\circ  f$$</p>\n</div>"}, {"question": "<div class=\"proposition\">\n<p>תהי $f \\in L^{1}\\left( \\mu \\right)$ אזי:\n$$\\left\\lvert  \\int f \\;\\mathrm{d} \\mu   \\right\\rvert \\leq \\int \\lvert f \\rvert  \\;\\mathrm{d} \\mu $$</p>\n</div>", "answer": "<p>אנו יודעים כי $\\int f \\;\\mathrm{d} \\mu \\in \\mathbb{C}$. ולכן קיים $\\alpha \\in \\mathbb{C}$ עם $\\left\\lvert  \\alpha  \\right\\rvert=1$ שעבורו:\n$$\\alpha \\int f \\;\\mathrm{d} \\mu = \\left\\lvert  \\int f \\;\\mathrm{d} \\mu   \\right\\rvert  $$\nולכן:\n$$\\left\\lvert  \\int f \\;\\mathrm{d} \\mu   \\right\\rvert =\\alpha \\int f \\;\\mathrm{d} \\mu = \\overbrace{ \\int \\alpha f\\;\\mathrm{d} \\mu }^{ \\text{Real} }  =\\int \\mathrm{Re}\\left( \\alpha \\cdot f \\right) \\;\\mathrm{d} \\mu + i \\int \\mathrm{Im}\\left( \\alpha \\cdot f \\right) \\;\\mathrm{d} \\mu  $$\nוכיוון שיש לנו פונקציה ממשית שמוצגת על ידי צירוף לינארי של מספר ממשי ומרוכב, נדרש שהחלק המרוכב מתאפס, ולכן:\n$$\\int \\mathrm{Im}\\left( \\alpha \\cdot f \\right) \\;\\mathrm{d} \\mu=0 $$\nכאשר:\n$$\\int \\mathrm{Re}\\left( \\alpha \\cdot f \\right) \\;\\mathrm{d} \\mu \\leq \\int \\left\\lvert  \\mathrm{Re}\\left( \\alpha \\cdot f \\right)  \\right\\rvert  \\;\\mathrm{d} \\mu \\leq \\int  \\left\\lvert  \\alpha \\cdot f  \\right\\rvert  \\;\\mathrm{d} \\mu = \\int \\lvert f \\rvert  \\;\\mathrm{d} \\mu   $$\nכאשר השתמשנו בזה ש-$\\left\\lvert  \\alpha  \\right\\rvert=1$</p>"}, {"question": "<div class=\"proposition\">\n<p>נניח ש-$\\infty&gt; \\mu(X)$ ותהי $f:X\\to \\mathbb{C}$ ב-$L^{1}\\left( \\mu \\right)$. נגדיר את הממוצע של $f$ על קבוצה מדידה  $E \\in \\mathcal{A}$ עם $\\mu(E)&gt; 0$ להיות:\n$$A_{E}(f)=\\frac{1}{\\mu(E)}\\int _E f \\;\\mathrm{d} \\mu $$\nאם $\\Omega$ קבוצה סגורה ולכל $E \\in \\mathcal{A}$ מתקיים ש-\n$$A_{E}(f)\\in \\Omega$$\nאזי $f(x) \\in \\Omega$ עבור $\\mu$ כמעט תמיד.</p>\n</div>", "answer": "<p>נסמן ב-$\\overline{B}_{\\alpha}\\left( \\alpha \\right)\\subseteq \\mathbb{C}$ את הכדור הסגור ברדיוס $r$ סביב $\\alpha$ ב-$\\mathbb{C}$. מאחר ש-$\\Omega^{c}$ פתוחה, הרי שהינה איחוד בן מנייה של כדורים סגורים. לכן מספיק להראות שעבור כל $\\overline{B}_{r}\\left( \\alpha \\right)\\subseteq \\Omega^{c}$:\n$$\\mu\\left( f^{-1}\\left( \\overline{B} _{r}\\left( \\alpha  \\right) \\right) \\right)=0$$\nנניח בשלילה שקיים $\\Omega^{c}\\supseteq \\overline{B}_{r}\\left( \\alpha \\right)$ עם $E=f^{-1}\\left( \\overline{B}_{r}\\left( \\alpha \\right) \\right)$ ממידה חיובית. אזי:\n$$\\left\\lvert  A_{\\varepsilon}(f)-\\alpha  \\right\\rvert =\\left\\lvert  \\frac{1}{\\mu(E)}\\int _{E}f \\;\\mathrm{d} \\mu -\\frac{1}{\\mu(E)}\\int _{E}\\alpha \\;\\mathrm{d} \\mu \\right\\rvert=\\frac{1}{\\mu(E)}   \\left\\lvert  \\int f-\\alpha \\;\\mathrm{d} \\mu   \\right\\rvert \\leq \\frac{1}{\\mu(E)}\\int _{E}\\left\\lvert  f-\\alpha  \\right\\rvert  \\;\\mathrm{d} \\mu \\leq r$$\nולכן $A_{E}(f)\\in \\overline{B}_{r}\\left( \\alpha \\right) \\subseteq \\Omega^{c}$ בסתירה להנחה.</p>"}, {"question": "<div class=\"proposition\">\n<p>תהי $f_{n}:X\\to \\mathbb{C}$ סדרה של פונקציות מדודות המגדרות כמעט-תמיד עם:\n$$\\sum_{i=1}^{\\infty} \\int  \\lvert f_{n} \\rvert  \\;\\mathrm{d} \\mu &lt; \\infty $$\nאזי:\n$$f(x)=\\sum_{i=1}^{\\infty} f_{n}(x)$$\nמוגדרת כמעט תמיד וב-$L^{1}\\left( \\mu \\right)$ מתקיים:\n$$\\int f \\;\\mathrm{d} \\mu = \\sum_{i=1}^{\\infty} \\int f_{n} \\;\\mathrm{d} \\mu  $$</p>\n</div>", "answer": "<p>ראשית נניח ש-$f_{n}$ מוגדרת על $X\\supseteq S_{n}$ כך ש-$\\mu(S_{n}^{c})=0$ אזי $\\varphi=\\sum_{i=1}^{\\infty}\\lvert f_{n} \\rvert$ מוגדרת על $S=\\bigcap_{n}S_{n}$ כך ש-$\\mu(S^{c})=\\mu\\left( \\bigcup_{n}S_{n}^{c} \\right)=0$. מהטענה שהוכחנו עבור פונקציות אי שלליות:\n$$\\int \\varphi \\;\\mathrm{d} \\mu =\\sum_{i=1}^{\\infty} \\int \\lvert f_{n} \\rvert  \\;\\mathrm{d} \\mu &lt; \\infty $$\nבפרט $\\varphi&lt; \\infty$ מתקיים $\\mu$- כמעט תמיד וכן $\\varphi \\in L^{1}\\left( \\mu \\right)$. ולכן מתקיים $\\mu$-כמעט תמיד שלכל $x \\in X$ מתקיים $\\sum_{i=1}^{\\infty}f_{n}(x)$ מתכנס בהחלט. ולכן מתכנס ב-$\\mathbb{C}$ ולכן $f$ מוגדרת $\\mu$-כמעט תמיד. נסמן $g_{k}=\\sum_{i=1}^{k}f_{n}$ ונבחין כי:\n$$\\lvert g_{k} \\rvert \\leq \\sum_{i=1}^{k} \\lvert f_{n} \\rvert \\leq \\varphi$$\nממשפט ההתכנסות הנשלטת. עבור $g_{k}\\to f$ נסיק כי $f \\in L^{1}\\left( \\mu \\right)$ ו-\n$$\\int f \\;\\mathrm{d} \\mu = \\lim_{ k \\to \\infty } \\int g_{k} \\;\\mathrm{d} \\mu=\\lim_{ n \\to \\infty } \\sum_{n=1}^{k} \\int  f_{n} \\;\\mathrm{d} \\mu = \\sum_{n=1}^{N} \\int f_{n} \\;\\mathrm{d} \\mu    $$</p>"}, {"question": "<div class=\"lemma\">\n<ol>\n<li>\n<p>פונקציה $f:X\\to\\left[ 0,\\infty \\right]$ מדידה אם: \n$$\\int f \\;\\mathrm{d} \\mu=0 \\implies f\\underset{\\mu}{=} 0$$</p>\n</li>\n<li>\n<p>אם $f:X\\to \\mathbb{C}$ מדידה ולכל $E \\in \\mathcal{A}$ אשר מקיים $\\int _{E}f \\;\\mathrm{d} \\mu=0$ אזי $f\\underset{\\mu}{=} 0$. </p>\n</li>\n</ol>\n</div>", "answer": "<ol>\n<li>\n<p>ההנחה $\\int  f  \\;\\mathrm{d} \\mu=0$ גוררת ש: \n$$\\mu\\left( \\left\\{  x \\in X\\quad f(x)\\geq \\frac{1}{n}  \\right\\} \\right)=0$$\nולכל $n$ מתקיים $f=0$ כמעט תמיד.</p>\n</li>\n<li>\n<p>נסמן $f=a^{+}-a^{-}+iv^{+}-iv^{-}$ נתבונן ב: \n$$E=\\left\\{  u^{+}&gt; 0  \\right\\}$$\nונשים לב כי:\n$$0=\\mathrm{Re}\\int_{E} f \\;\\mathrm{d} \\mu  = \\int _{E}u \\;\\mathrm{d} \\mu = \\int _{X}u^{+} \\;\\mathrm{d} \\mu  $$\nכאשר השיוון הראשון נובע מההנחה ש-$\\int _{E}f \\;\\mathrm{d} \\mu=0$ לכל $E \\in \\mathcal{A}$. לען מסעיף א נקבל:\n$$u^{+}=u^{-}=v^{+}=v^{-}=0$$</p>\n</li>\n</ol>"}], "מרחבי Lᵖ": [{"question": "<p>מה ההגדרה של מרחב הילברט?</p>", "answer": "<p>מרחב מכפלה פנימי נקרא מרחב הילברט אם הוא שלם ביחס למטריקה המושרית מהמכפלה הפנימית(כלומר $d(x,y)=\\lVert x-y \\rVert=\\sqrt{ \\langle x-y,x-y \\rangle }$)</p>"}, {"question": "<p>מה ההגדרה של קבוצה קמורה במרחב הילברט?</p>", "answer": "<p>קבוצה $D \\subseteq \\mathcal{H}$ נקראת קבומרה אם לכל $x,y \\in D$ ולכל $\\alpha \\in[0,1]$ מתקיים:\n$$\\alpha x+\\left( 1-\\alpha \\right)y \\in D$$</p>"}, {"question": "<p>מה ההגדרה של מרחב מאונך?</p>", "answer": "<p>בהנתן $Y\\subseteq H$ נגדיר:\n$$Y^{\\perp}= \\left\\{  x \\in \\mathcal{H} \\mid \\forall y \\in Y\\quad \\langle x,y \\rangle =0 \\right\\}$$</p>"}, {"question": "<p>מה אומר משפט ההטלה האורתוגונלית?</p>", "answer": "<p>יהי $V\\subseteq \\mathcal{H}$ תת מרחב סגור. אזי לכל $u\\in \\mathcal{H}$ קיימת הצגה יחידה בתור $u=v+w$  כך ש-$v \\in V$ ו-$w \\in V^{\\perp}$.</p>"}, {"question": "<p>מה ההגדרה של נורמה אופרטורית?</p>", "answer": "<p>בהנתן פונקציונאל לינארי $\\phi:\\mathcal{H}\\to \\mathbb{C}$ נגדיר את הנורמה האופרטורית שלו בתור:\n$$\\left\\lVert  \\phi  \\right\\rVert _{\\mathrm{op}} := \\sup _{x \\in \\mathcal{H}} \\frac{\\left\\lvert  \\phi(x)  \\right\\rvert }{\\lVert x \\rVert }=\\sup _{x \\in \\mathcal{H}, \\lVert x \\rVert =1} \\left\\lvert  \\phi(x)  \\right\\rvert $$\nכלומר התמונה של ספרת היחידה ב-$\\mathcal{H}$ ורואים מה המרחק הכי גדול שמתקבל. נאמר ש-$\\phi$ <u>חסום</u> אם הנורמה האופרטורית שלו סופית.</p>"}, {"question": "<p>מה אומר משפט ההצגה של Frechet-Riesz?</p>", "answer": "<p>ההעתקה $\\Phi:\\mathcal{H}\\to \\mathcal{H}^{*}$ שולחת כל $h \\in \\mathcal{H}$ לפונקציונאל $\\phi_{h}(z)=\\langle z,h \\rangle$ אז העתקה זו הינה איזומורפיזם צמוד לינארי ואיזומטריה בין $\\mathcal{H} \\cong \\mathcal{H}^{*}$.</p>"}, {"question": "<p>מה ההגדרה של פונקציה קמורה?</p>", "answer": "<p>פונקציה $\\varphi:(a,b)\\to \\mathbb{R}$ אשר מקיימת לכל $a\\leq s,t \\leq b$ ולכל $\\lambda \\in (0,1)$ מתקיים:\n$$\\varphi\\left( \\lambda s+\\left( 1-\\lambda \\right)t \\right)\\leq \\lambda \\varphi(s)+\\left( 1-\\lambda \\right)\\varphi(t)$$</p>"}, {"question": "<p>מה אומר משפט אי-שיוויון ג'נסון?</p>", "answer": "<p>יהי $\\left( X,\\mathcal{A},\\mu \\right)$ מרחב הסתברות. תהי $\\varphi:(a,b)\\to \\mathbb{R}$ קמורה ו-$f:X\\to (a,b)$ מדידה. אזי:\n$$\\varphi\\left( \\int _{X} \\;\\mathrm{d} \\mu  \\right)\\leq \\int _{X} \\varphi \\circ  f \\;\\mathrm{d} \\mu $$</p>"}, {"question": "<p>מה ההגדרה של חזקות צמודות?</p>", "answer": "<p>זוג מספרים $1\\leq p,q\\leq \\infty$ נקראים חזקות צמודות אם:\n$$\\frac{1}{p}+\\frac{1}{q}=1$$\nכאשר $\\frac{1}{\\infty}=0$.</p>"}, {"question": "<p>מה ההגדרה של נורמת $p$ של $f$?</p>", "answer": "<p>לכל $f:X\\to \\mathbb{C}$ מדידה ולכל $1\\leq p \\leq \\infty$ נגדיר:\n$$\\lVert f \\rVert _{p} := \\left[ \\int  \\lvert f \\rvert ^{p} \\;\\mathrm{d} \\mu  \\right]^{1/p}$$\nונקרא לזה נורמת ה-$p$ של $f$. עבור $p=\\infty$:\n$$\\lVert f \\rVert _{\\infty}=\\text{ess-sup}\\left( \\lvert f \\rvert  \\right):= \\inf \\left\\{  \\alpha \\geq 0 \\mid \\mu\\left( \\left\\{  x\\mid \\lvert f(x) \\rvert &gt;\\alpha  \\right\\} \\right)=0  \\right\\}$$</p>"}, {"question": "<p>מה ההגדרה של מרחב בנך?</p>", "answer": "<p>מרחב נורמי שלם נקרא מרחב באנך.</p>"}, {"question": "<p>מה ההגדרה של רציפות בהחלט?</p>", "answer": "<p>נאמר ש-$\\mu\\ll \\nu$  ונאמר ש-$\\mu$ <u>רציפה בהחלט</u> ביחס ל-$\\nu$ אם:\n$$\\nu(A)=0\\implies \\mu(A)=0$$</p>"}, {"question": "<p>מה ההגדרה של מידה סינגולארית?</p>", "answer": "<p>נאמר ש-$\\mu \\perp \\nu$ אם קיימות $A,B$ כך ש-$A\\sqcup B$ ו-$\\mu(A)=0$ וגם $\\nu(B)=0$.</p>"}, {"question": "<p>מה אומר משפט Lebesgue-Radon-Nikodym?</p>", "answer": "<p>אם $\\mu$ ו-$\\nu$ מידות $\\sigma$ סופיות על $\\left( X,\\mathcal{A} \\right)$ אזי קיים צמד מידות יחיד $\\nu_{a},\\nu_{s}$ המקיים:</p>\n<ol>\n<li>\n<p>המידה $\\nu=\\nu_{a}+\\nu_{b}$ כך ש-$\\nu_{a}\\ll \\mu$ ו-$\\nu_{s}\\perp \\mu$. </p>\n</li>\n<li>\n<p>קיימת פונקציה מדידה $h:x\\to \\left[ 0,\\infty \\right)$ עבורה $d\\nu_{a}=hd\\mu$. יתר על כן אם $X=\\bigcup_{n}A_{n}$ עם $\\nu(A_{n})\\ll \\infty$ לכל $n$ אזי $h\\cdot \\mathbb{1}_{A_{n}}\\in L^{1}\\left( \\mu \\right)$ לכל $n$. בפרט אם $\\nu$ מידה סופית אז $h \\in L^{1}\\left( \\mu \\right)$. </p>\n</li>\n</ol>"}], "מרחבים מדידים": [{"question": "<p>מה ההגדרה של מידה?</p>", "answer": "<p>מידה על מרחב מדיד $\\left( X,\\mathcal{A} \\right)$ הינה פונקציה $\\mu:A\\to \\left[ 0,\\infty \\right]$ אשר $\\sigma$-אדיטיבית. כלומר לכל סדרת קבוצות זרות ומדידות $A_{1},A_{2},\\dots \\in \\mathcal{A}$ כך ש\n$$\\mu\\left( \\bigsqcup_{n} A_{n} \\right)=\\sum_{n=1}^{\\infty}\\mu(A_{n})$$\nבנוסף נניח ש-$\\mu$ איננה קבועה $\\infty$ (כלומר קיימת איזשהי $A \\in \\mathcal{ A}$ כך ש-$\\mu(A)&lt; \\infty$).</p>"}, {"question": "<p>מה ההגדרה של מידה שלמה?</p>", "answer": "<p>מידה $\\mu$ היא שלמה אם לכל $\\mu(N)=0$ נקבל:\n$$\\mathcal{P}\\left({N} \\right) \\subseteq \\mathrm{dom}\\left( \\mu \\right) $$\nכלומר אם קבוצה היא ממידה אפס אז כל התתי קבוצות שלה יהיו מדידות, ופרט נקבל מונוטונית המידה וחיוביות המידה כי כל תתי קבוצות של קבוצה ממידה אפס יהיו ממידה אפס.</p>"}, {"question": "<p>מה ההגדרה של $\\sigma$ אלגברה?</p>", "answer": "<p>בהנתן קבוצה כלשהי, $X$ ה-$\\sigma$-אלגברה מעל $X$ הינו אוסף $\\mathcal{A}\\subseteq 2^{X}=\\mathcal{P}(X)$ של תתי קבוצות של $X$ המקיימת את האקסימות הבאות:</p>\n<ol>\n<li>\n<p>הקבוצה כולה נמצאת - $X \\in \\mathcal{A}$. </p>\n</li>\n<li>\n<p>אם $E \\in \\mathcal{A}$ אזי $E^{c} \\in \\mathcal{A}$. </p>\n</li>\n<li>\n<p>בהנתן אוסף בן מנייה $E_{1}, E_{2},\\dots, \\in \\mathcal{A}$ אזי: \n$$\\bigcup_{n}E_{n}\\in \\mathcal{A}$$</p>\n</li>\n</ol>"}, {"question": "<p>מה ההגדרה של מרחב מדיד וקבוצות מדידות?</p>", "answer": "<p>הצמד $(X,\\mathcal{A})$ נקרא <u>מרחב מדיד</u> כאשר קבוצות $E \\in \\mathcal{A}$ נקראות <u>קבוצות מדידות</u>.</p>"}, {"question": "<p>מה ההגדרה של העתקות מדידות?</p>", "answer": "<p>בהנתן שני מרחבים מדידים $(X,\\mathcal{A})$ ו-$\\left( Y,\\mathcal{C} \\right)$ פונקציה $f:X\\to Y$ תקרא מדידה אם המקום של כל קבוצה מדידה הוא מדיד. כלומר:\n$$\\forall E \\in e\\qquad f^{-1}(E)\\in \\mathcal{A}$$</p>"}, {"question": "<p>מה ההגדרה של פונקציה מדידה?</p>", "answer": "<p>בהנתן שני מרחבים מדידים $(X,\\mathcal{A})$ ו-$(Y,e)$ פונקציה $f:X\\to Y$ נקראת מדידה אם לכל $E \\in e$ מקיימת:\n$$f^{-1} (E) \\in \\mathcal{A}$$</p>"}, {"question": "<p>מה ההגדרה של גבול עליון ותחתון של סדרת קבוצות?</p>", "answer": "<p>יהי $(A_{n})\\subseteq \\Sigma$ סדרה של קבוצות במרחב מידה $\\left( X,\\Sigma,\\mu \\right)$. נגדיר:\n$$\\operatorname*{lim}\\operatorname*{inf}A_{n}=\\bigcup_{n=1}^{\\infty}\\bigcap_{k=n}^{\\infty}A_{k},\\,\\operatorname*{lim}\\operatorname*{sup}A_{n}=\\bigcap_{n=1}^{\\infty}\\bigcup_{k=n}^{\\infty}A_{k}$$\nכאשר$\\inf A_n$ זה האיברים ששייכים לכל $A_n$ עבור $n$ מספיק גדול</p>"}, {"question": "<p>מה אומר משפט הלמה של בורל קנטלי?</p>", "answer": "<p>יהי $\\left( X,\\mathcal{B},\\mu \\right)$ מרחב מידה. אזי אם $\\{ A_{n} \\}_{n=1}^{\\infty}\\subseteq \\mathcal{B}$ מקיים:\n$$\\sum_{n=1}^{\\infty}\\mu\\left(A_{n}\\right)&lt;\\infty$$\nאזי:\n$$\\mu\\left(\\limsup_{n\\to\\infty}A_{n}\\right)=\\mu\\left( \\bigcap_{n=1}^{\\infty}\\bigcup_{k=n}^{\\infty}A_{k} \\right)=0$$</p>"}, {"question": "<p>מה ההגדרה של פונקציית מדידת בורל?</p>", "answer": "<p>יהי $X\\subseteq \\mathbb{R}$ פונקציה $f:X\\to \\mathbb{R}$ נקראת מדידת בורל אם $f^{-1}(B)$ היא קבוצת בורל לכל קבוצת בורל $B\\subseteq \\mathbb{R}$.</p>"}, {"question": "<p>מה ההגדרה של טופולוגיה?</p>", "answer": "<p>טופולוגיה על קבוצה $X$ זה אוסף של תתי קבוצות $\\tau \\subseteq 2^{X}$ המקיים:</p>\n<ol>\n<li>\n<p>הקבוצה הריקה והקבוצה כולה בפנים </p>\n</li>\n<li>\n<p>לכל אוסף $\\left\\{  U_{\\alpha}  \\right\\}_{\\alpha}\\subseteq \\tau$ גם $\\cup_{\\alpha}U_{\\alpha}\\in \\tau$. </p>\n</li>\n<li>\n<p>לכל אוסף סופי $U_{1},U_{2},\\dots,U_{n}\\in \\tau$ גם $\\cap_{i=1}^{N}U_{i}$. \nהצמד $\\left( X,\\tau \\right)$ נקרא מרחב טופולוגי וקבוצות $U \\in \\tau$ נקראות פתוחות.</p>\n</li>\n</ol>"}, {"question": "<p>מה ההגדרה של קבוצה סגורה?</p>", "answer": "<p>קבוצה שהמשלים שלה פתוחה.</p>"}, {"question": "<p>מה ההגדרה של סגור של קבוצה?</p>", "answer": "<p>יהי $A\\subseteq X$ קבוצה. נגדיר את הסגור שלה להיות:\n$$\\overline{A} = \\left\\{   x \\in X \\mid \\forall x \\in U \\in \\tau \\quad U \\cap A \\neq \\varnothing  \\right\\}$$\nבאופן שקול $\\overline{A}$ הינה הקבוצה הסגורה הקטנה ביותר המכילה את $A$.</p>"}, {"question": "<p>מה ההגדרה של רציפות?</p>", "answer": "<p>בהינתן שני מרחבים טופולוגיים $\\left( X,\\tau_{X} \\right)$ ו-$\\left( Y,\\tau_{Y} \\right)$ פונקציה $f:X\\to Y$ תקרא רציפה אם המקור של כל קבוצה פתוחה ב-$Y$ הוא פתוח ב-$X$. או בסימנים:\n$$f^{-1} (U) \\in \\tau_{X}$$\nלכל $U \\in \\tau_{Y}$</p>"}, {"question": "<p>מה ההגדרה של הומאומורפיזם?</p>", "answer": "<p>שני מרחבים יקראו הומאומורפיים אם קיימת פונקציה $\\varphi:X\\to Y$ רציפה חח\"ע ועל ובעלת הופכי רציף.</p>"}, {"question": "<p>מה ההגדרה של קומפקטיות?</p>", "answer": "<p>לכל כיסוי בפתוח קיים כיסוי סופי.</p>"}, {"question": "<p>מה ההגדרה של קבוצה צפופה?</p>", "answer": "<p>קבוצה $D\\leq X$ נקראת צפופה(ב-$X$) אם $\\overline{D}=X$.</p>"}, {"question": "<p>מה ההגדרה של ספרבילי?</p>", "answer": "<p>מרחב נקרא ספרבילי אם קיימת בו תת קבוצה בת מנייה צפופה.</p>"}, {"question": "<p>מה ההגדרה של בסיס לטופולוגיה?</p>", "answer": "<p>בסיס לטופולוגיה $\\tau$ הינו אוסף $\\varepsilon \\subseteq \\tau$ כך שכל קבוצה פתוחה ב-$\\tau$ היא איחוד(כלשהו) של איברי $\\varepsilon$.</p>"}, {"question": "<p>מה ההגדרה של אקסיומת המנייה השנייה?</p>", "answer": "<p>מרחב טופולוגי מקיים את אקסיומת המנייה השנייה אם יש לו בסיס בן מנייה.</p>"}, {"question": "<p>מה ההגדרה של מרחב האוסדורף?</p>", "answer": "<p>מרחב טופולוגי נקרא האוסדורף אם לכל $x,y \\in X$ שונות קיימות $U,V \\in \\tau$ כך ש-$x \\in U$, $y \\in U$, $U\\cap V = \\varnothing$.</p>"}, {"question": "<p>מה ההגדרה של קומפקטי מקומי?</p>", "answer": "<p>מרחב נקרא קומפקטי מקומית אם לכל $x \\in X$ קיים $x \\in V \\in \\tau$ כך ש-$\\overline{V}$ קופמקטי.</p>"}, {"question": "<p>מה ההגדרה של סיגמה קומפקטי?</p>", "answer": "<p>מרחב נקרא $\\sigma$-קומפקטי אם $X$ הוא איחוד בן מנייה של קומפקטיות.</p>"}, {"question": "<p>מה אומר משפט המטריזציה של Urysohn?</p>", "answer": "<p>אם $X$ מרחב האוסדורף קומפקטי מקומי ובעל אקסיומת המנייה השנייה אזי הוא מטריזבילי כלומר קיימת מטריקה על $X$ כך שהטפולוגיה היא בדיוק הקבוצות הפתוחות.</p>"}, {"question": "<p>מה ההגדרה של סיגמא אלגברה בורל?</p>", "answer": "<p>יהי $\\left( X,\\tau \\right)$ מרחב טופולוגי. ה-$\\sigma$ אלגברה בורל על $\\left( X,\\tau \\right)$ הינה $\\sigma\\left( \\tau \\right)$. כלומר האוסף ה$\\sigma$-אלגברה הקטן ביותר אשר מכיל את $X$. איבר ב-$\\sigma\\left( \\tau \\right)$ לעיתים נקרא קבוצת בורל.</p>"}, {"question": "", "answer": ""}], "שאלות - מרחבים מדידים": [{"question": "<p>ציין תכונות בסיסיות של $\\sigma$ אלגברה.</p>", "answer": "<ol>\n<li>\n<p>הקבוצה הריקה $\\varnothing \\in \\mathcal{A}$. </p>\n</li>\n<li>\n<p>בהנתן $\\mathcal{A}_{1},\\dots.,\\mathcal{A}_{n} \\in \\mathcal{A}$ גם $\\mathcal{A}_{1}\\cup\\dots \\cup \\mathcal{A}_{n}\\in \\mathcal{A}$ יהיה מדיד. </p>\n</li>\n<li>\n<p>בהנתן $A,B \\in \\mathcal{A}$ אזי: \n$$B\\setminus A = B \\cap A^{c}=\\left( B^{c}\\cup A\\right)^{c}\\in \\mathcal{A}$$</p>\n</li>\n<li>\n<p>בהנתן ${A}_{1},{A}_{2},\\dots \\in \\mathcal{A}$ וגם: \n$$\\bigcap_{n=1}^{\\infty} {A}_{n}\\in \\mathcal{A}$$</p>\n</li>\n</ol>"}, {"question": "<p>ציין תכונות של המקור.</p>", "answer": "<p>יהי $f:X\\to Y$ פונקציה. אזי:</p>\n<ol>\n<li>\n<p>לכל $A\\subseteq Y$ מתקיים: \n$$f^{-1}\\left( Y\\setminus  A \\right)= X\\setminus  f^{-1}(A)$$</p>\n</li>\n<li>\n<p>לכל סדרת תתי חבורות $\\mathcal{A}$ מתקיים: \n$$f^{-1}\\left( \\bigcup_{A \\in \\mathcal{A} }A \\right)=\\bigcup_{A \\in \\mathcal{A} }f^{-1}(A)$$</p>\n</li>\n<li>\n<p>לכל סדרת תתי חבורות $\\mathcal{A}$ מתקיים: \n$$f^{-1}\\left( \\bigcap_{A \\in \\mathcal{A} }A  \\right)=\\bigcap_{A \\in \\mathcal{A} }f^{-1}(A)$$</p>\n</li>\n</ol>"}, {"question": "<p>הוכח כי את הטענה הבאה:\nיהי $(X,\\mathcal{A})$ מרחב מדיד ותהי $f: X\\to Y$ פונקציה כלשהי. האוסף:\n$$\\Omega=\\left\\{  E\\subseteq Y \\mid f^{-1}(E) \\in \\mathcal{A}  \\right\\}$$\nהינו $\\sigma$-אלגברה.</p>", "answer": "<p>ראשית $Y \\in \\Omega$. בהנתן $\\mathcal{A}, E_{1},E_{2},\\dots \\in \\Omega$ נבחין כי:\n$$f^{-1}(\\mathcal{A}^{c})=(f^{-1}(\\mathcal{A}))^{2}\\qquad f^{-1}\\left( \\bigcup_{k=1}^{\\infty} E_{n} \\right)=\\bigcup_{n=1}^{\\infty }f^{-1}(E_{n})$$\nולכן $\\mathcal{A}^{c},\\bigcup_{n}E_{n}\\in \\Omega$. ולכן $\\Omega$ תהיה $\\sigma$-אלגברה.</p>"}, {"question": "<p>הוכח את הטענה הבאה:\nבהנתן אוסף כלשהו $$F \\subseteq 2^{X}$$ קיימת $\\sigma$-אלגברה קטנה ביותר מעל $X$ המכילה את $F$. כלומר קיימת $\\sigma$ אגברה מעל $X$ אשר נסמנה $\\sigma(F)$ אשר מוכלת בתוך כל $\\sigma$ אלגברה המכילה את $F$ ומוכלת בכל $\\sigma$ אלגברה המכילה את $F$. $\\sigma(F)$ מכונה ה-$\\sigma$ אלגברה הנוצרת על ידי $F$.</p>", "answer": "<p>נגדיר ב-$\\Omega$ את קבוצת כל התתי קבוצות $e \\in\\mathcal{P}(X)$ כך ש-$e$ סיגמא אלגברה מעל $X$ שמכילה את $F$.\nראשית $\\Omega \\neq \\varnothing$ כי $2^{X} \\in \\Omega$. נגדיר \n$$\\sigma(F):= \\bigcap_{e \\in \\Omega}e$$\nכמובן ש-$\\sigma(F)\\subseteq e$ לכל $e \\in \\Omega$ ולכן נותר להוכיח כי $\\sigma(F)$ היא $\\sigma$-אלגברה. בהנתן $E_{1},\\dots \\in e$.\nלכל $e \\in \\Omega$ ולכן לכל $e \\in \\Omega$:\n$$\\bigcup_{n=1}^{\\infty}E_{n}\\in e$$\nבפרט:\n$$\\bigcup_{n=1}^{\\infty}E_{n}\\in \\sigma(F)$$\nבאופן דומה נראה את תכונות $(1)$ ו-$(2)$.</p>"}, {"question": "<p>הוכח את הטענה הבאה:\nפונקציה $f:X\\to \\left[ -\\infty,\\infty \\right]$ (עם $(X,\\mathcal{A})$) מדידה אם\"ם המקור של כל קרן, כלומר:\n$$f^{-1}\\left( \\left( a,\\infty \\right] \\right)$$\nמדידה לכל $\\alpha \\in \\mathbb{R}$.</p>", "answer": "<p>כיוון אחד מיידי, כי אם $f$ מדידה בפרט:\n$$\\mathcal{A} \\ni f^{-1}\\left( \\left( \\alpha,\\infty \\right] \\right)$$\nבכיוון השני - נשים לכ שמספיק להראות שכל הקבוצות מהצורה $(*)$ יש להם מקור מדיד. כי אז אם $U\\subseteq \\left[ -\\infty,\\infty \\right]$ אזי:\n$$U=\\bigcup_{n=1}^{\\infty} I_{n}$$\nכשכל $I_{n}$ היא ביטוי מהצורה $(*)$ ולכן:\n$$f^{-1}(U)=\\bigcup_{n=1}^{\\infty} f^{-1}(I_{n}) \\in \\mathcal{A}$$\nולכן מהטענה הקומת $f$ מדידה. בהנתן $\\beta \\in \\mathbb{R}$ אז:\n$$f^{-1}\\left( \\left[ -\\infty,\\beta \\right) \\right)=\\bigcup _{n=1}^{\\infty}f^{-1}\\left( \\left[ -\\infty,\\beta-\\frac{1}{n} \\right] \\right)=\\bigcup_{n=1}^{\\infty}\\left( f^{-1}\\left( \\left( \\beta-\\frac{1}{n},\\infty \\right] \\right) \\right)^{C}\\in \\mathcal{A}$$\nבהנתן $-\\infty&lt;\\alpha&lt;\\beta&lt;\\infty$:\n$$f^{-1}\\left( \\left( \\alpha,\\beta \\right) \\right)=f^{-1}\\left( \\left[ -\\infty,\\beta \\right) \\right)\\cap f^{-1}\\left( \\left( \\alpha,\\infty \\right] \\right)$$</p>"}, {"question": "<p>הוכח את הטענה הבאה:\nבהנתן סדרת פונקציות מדידות:\n$$f_{n}:X\\to \\left[ -\\infty,\\infty \\right]$$\nנקבל:\n$$\\inf_{n}f_{n},\\quad \\sup _{n}f_{n}, \\quad \\lim_{ n \\to \\infty } \\inf_{n}f_{n},\\quad \\lim_{ n \\to \\infty } \\sup _{n}f_{n} $$\nכאשר הכוונה הוא גבול נקודתי.</p>", "answer": "<p>נסמן $g=\\sup_{n}f_{n}$. מספיק להראות:\n$$g^{-1}\\left( \\left( \\alpha,\\infty \\right] \\right)$$\nהוא מדיד לכל $\\alpha \\in \\mathbb{R}$. אכן:\n$$g^{-1}\\left( \\left( \\alpha,\\infty \\right] \\right)= \\bigcup_{n=1}^{\\infty}f_{n}^{-1}\\left( \\left( \\alpha,\\infty \\right] \\right)$$\nמהטענה המקבילה לזו עבור $\\left[ -\\infty,\\beta \\right)$ נסיק ש-$\\inf_{n}f_{n}$ מדיד. מכאן ש:\n$$\\lim_{ n \\to \\infty } \\sup f_{n}=\\inf_{k} \\sup _{n\\geq k}f_{n}$$\nמדיד.</p>"}], "משפט ההצגה של ריס": [{"question": "<p>מה ההגדרה של תומך טופוליגי?</p>", "answer": "<p>בהנתן פונקציה רציפה $f:X\\to \\mathbb{C}$ נגדיר את התומך הטופולוגי של $f$ להיות:\n$$\\mathrm{supp}(f):= \\left\\{  f\\neq 0  \\right\\}$$\nנסמן ב-$C_{c}(X)$ את מרחב הפונקציות הרציפות בעלות תומך קומפקטי.</p>"}, {"question": "<p>מה אומר משפט הלמה של Urysohn?</p>", "answer": "<p>אם $X$ מרחב טופולוגי האוסדורף קומפקטי מקומית ו-$k\\subseteq V$ קומפקטית בתוך פתוחה אזי קיימת פונקציה $f\\in C_{c}(x)$ המקיימת:\n$$k \\prec f \\prec V$$</p>"}, {"question": "<p>מה אומר משפט ההצגה של ריס Riesz?</p>", "answer": "<p>יהי $X$ מרחב האוסדורף קומפקטי מקומית ופונקציונל לינארי חיובי ו-$\\Lambda:C_{c}(X)\\to \\mathbb{C}$ קיימת $\\sigma$-אלגברה $\\mu$ על $X$ המכילה את $\\sigma$-אלגברת בורל ומידה יחידה $\\mu$ על $m$ המקיימת:</p>\n<ol>\n<li>\n<p>$$\\forall f \\in C_{c}(X)\\qquad \\Lambda f=\\int f \\;\\mathrm{d} \\mu $$</p>\n</li>\n<li>\n<p>לכל קבוצה קומפקטית $k\\leq X$  נקבל $\\mu(k)&lt; \\infty$. </p>\n</li>\n<li>\n<p>רגולריות חיצונית: לכל $E \\in m$: \n$$\\mu(E)=\\inf \\left\\{  \\mu(V) \\mid E\\subseteq V \\text{ is open} \\right\\}$$</p>\n</li>\n<li>\n<p>רגולריות פנימית: לכל $E \\subseteq m$ פתוחה או בעלת מידה סופית $\\mu(E)&lt;\\infty$ מתקיים: \n$$\\mu(E)= \\sup \\left\\{  \\mu(k)\\mid k\\subseteq E\\text{ is compact}  \\right\\}$$</p>\n</li>\n<li>\n<p>הקבוצה $m$ תהיה $\\sigma$-אלגברה  שלמה ביחס ל-$\\mu$. </p>\n</li>\n</ol>"}, {"question": "<p>מה אומר משפט Lusin?</p>", "answer": "<p>יהי $X$ מרחב האוסדורף קומפקטי מקומית ותהי $\\mu$ מידת רדון על $X$. תהי $f:X\\to \\mathbb{C}$ מדידה כך ש:\n$$A\\supseteq\\left\\{  x\\mid f(x)\\neq 0  \\right\\}$$\nממידה סופית, כלומר $\\mu(A)&lt;\\infty$ אזי לכל $\\varepsilon&gt; 0$ קיימת פונקציה רציפה עם תומך קומפקטי $g \\in C_{c}(X)$ עם:\n$$\\mu\\left( \\left\\{  x\\mid f(x)\\neq g(x)  \\right\\} \\right)&lt; \\varepsilon$$\nבנוסף ניתן לבחור $g$ כך ש:\n$$\\sup _{x \\in X}\\lvert g(x) \\rvert \\leq \\sup _{x \\in X} \\lvert f(x) \\rvert $$</p>"}, {"question": "<p>מה אומר משפט אגורוף?</p>", "answer": "<p>יהי $\\left( X,\\mathcal{M},\\mu \\right)$ מרחב מידה סופית. ונניח כי $f_{n}:X\\to \\mathbb{R}$ מתכנסת כמעט תמיד ל-$f:X\\to \\mathbb{R}$. אזי לכל $\\varepsilon&gt; 0$ קיימת $E \\in \\mathcal{ M}$ כך ש-$\\mu(E)&lt; \\varepsilon$ כך ש-$f_{n}\\to f$ במ\"ש ב-$E^{c}$.</p>"}, {"question": "<p>מה ההגדרה של מידה $T$ אינווריאטנית?</p>", "answer": "<p>מידת בורל $\\mu$ על $X$ נקראת $T$-אינווריאנטית אם $T_{*}\\mu = \\mu$. כאשר:\n$$\\left( T_{*}\\mu \\right)=\\mu(T^{-1}A)$$</p>"}, {"question": "<p>מה ההגדרה של רגולריות פנימית וחיצונית?</p>", "answer": "<p>במרחב מידה $\\left( X,\\mathcal{M},\\mu \\right)$ המכילה את בורל(כדי שיהיה אפשר לדבר על קבוצות פתוחות קומפקטיות).</p>\n<ol>\n<li>\n<p>קבוצה $E$ נקראת רגולארית חיצונית אם: \n$$\\mu(E)=\\inf \\left\\{  \\mu(V)\\mid E \\subseteq V \\text{ is open}  \\right\\}$$</p>\n</li>\n<li>\n<p>קבוצה $E$ נקראת רגולרית פינימית אם: \n$$\\mu(E)=\\sup  \\left\\{  \\mu(K)\\mid K \\subseteq E \\text{ is compact}  \\right\\}$$</p>\n</li>\n</ol>"}, {"question": "<p>מה ההגדרה של מידת רדון?</p>", "answer": "<p>במרחב מידה $\\left( X,\\mathcal{M},\\mu \\right)$ המכיל את בורל מידה $\\mu$ נקראת מידת רדון אם:</p>\n<ol>\n<li>\n<p>לכל $K$ קומפקטי מתקיים $\\mu(K)&lt;\\infty$. </p>\n</li>\n<li>\n<p>לכל $E \\in \\mathcal{M}$ רגולריות חיצונית(ביחס ל-$\\mu$). </p>\n</li>\n<li>\n<p>כל הקבוצות הפתוחות או אלו ממידה סופית הן רגולריות פנימית. </p>\n</li>\n</ol>"}, {"question": "<p>מה ההגדרה של מרחב סיגמא קומפקטי?</p>", "answer": "<p>מרחב טופולוגי $X$ נקרא $\\sigma$-קומפקטי אם $X=\\bigcup_{n}K_{n}$ כש-$K_{n}$ קופקטיות.</p>"}, {"question": "<p>מה ההגדרה של מרחב סיגמא סופי?</p>", "answer": "<p>מרחב מידה $\\left( X,\\mathcal{M},\\mu \\right)$ נקרא $\\sigma$-סופי אם $X=\\bigcup_{n}A_{n}$ כש-$\\mu(A_{n})&lt;\\infty$ לכל $n \\in \\mathbb{N}$.</p>"}, {"question": "<p>מה ההגדרה של מידת הסתברות?</p>", "answer": "<p>מידה על קבוצה $X$ אשר מקיימת $\\mu(X)=1$.</p>"}, {"question": "<p>מה ההגדרה של התכנסות חלשה-$*$?</p>", "answer": "<p>יהי $X$ מרחב האוסדורף קומפקטי מקומית. ויהיו $\\mu,\\mu_{n}$ מידות רדון. נאמר ש-$\\mu_{n}$ מתכנסת חלש-$*$ ל-$\\mu$ ונסמן:\n$$\\mu_{n}\\overset{*}{\\rightharpoonup} \\mu$$\nאם מתקיים:\n$$\\forall f \\in C_{c}\\qquad  \\int f \\;\\mathrm{d} \\mu_{n}\\xrightarrow{n\\to \\infty} \\int f \\;\\mathrm{d} \\mu  $$</p>"}, {"question": "", "answer": ""}], "הוכחות מרכזיות": [{"question": "<p>משפט ההתכנסות המונוטונית אומר כי:\nתהי $\\left\\{  f_{n}:X\\to \\left[ 0,\\infty \\right]  \\right\\}$ סדרה עולה:\n$$0\\leq f_{1} \\leq f_{2} \\leq \\dots$$\nשל פונקציות מדידות. אזי:\n$$f=\\lim_{ n \\to \\infty } f_{n}\\quad \\left( =\\sup _{n}f_{n} \\right)$$\nמקיימת:\n$$\\int_{A}f \\;\\mathrm{d}\\mu = \\lim_{ n \\to \\infty } \\int_{A}f_{n}\\;\\mathrm{d}\\mu$$\nהוכח את המשפט.</p>", "answer": "<p>נסמן $\\alpha=\\int _{A} f_{n} \\;\\mathrm{d} \\mu$. נוכיח כי $\\alpha$ שווה ל-$\\int _{A}f \\;\\mathrm{d} \\mu$ על ידי להראות שתי אי שיוויונות חלשים.</p>\n<ol>\n<li>\n<p>נראה $\\alpha \\leq \\int_{A} f \\;\\mathrm{d} \\mu$ בצורה הבאה: \nלכל $n\\in \\mathbb{N}$ נשים לב כי:\n$$f_{n}\\leq \\sup _{n}f_{n}=f$$\nולכן ממונוטוניות האינטגרל:\n$$\\int f_{n} \\;\\mathrm{d} \\mu \\leq \\int f \\;\\mathrm{d} \\mu $$\nוכעת משימור אי שיוויון חלש בין גבולות נקבל:\n$$\\lim_{ n \\to \\infty } \\int f_{n} \\;\\mathrm{d} \\mu=\\alpha \\leq \\int f \\;\\mathrm{d} \\mu  $$</p>\n</li>\n<li>\n<p>נגדיר את הקבוצה: \n$$E_{n}=\\left\\{  x \\in X\\mid f_{n}(x)\\geq c\\cdot s(x)  \\right\\}$$\nכאשר נשים לב כי כל $E_{n}$ יהיה מדיד.</p>\n</li>\n<li>\n<p>נשים לב כי מתקיים: \n$$E_{1} \\subseteq E_{2} \\subseteq E_{3} \\subseteq\\dots \\qquad X=\\bigcup_{n}E_{n}$$\nכדי לראות זאת נניח $x \\in X$. מספיק להראות כי קיים $n \\in \\mathbb{N}$ כך ש-$x \\in E_{n}$.\nאם $f(x)=0$ אזי $x \\in E_{1}$. אם $f(x)&gt; 0$ אזי כיוון ש-$c&lt;1$:\n$$cs(x)&lt;f(x)=\\sup_{n} f_{n}(x)\\implies \\forall \\varepsilon&gt;0 \\quad \\exists n \\quad f(x)-f_{n}(x)&lt;\\varepsilon$$\nובפרט עבור $\\varepsilon=f(x)-cs(x)&gt;0$ נקבל $n \\in \\mathbb{N}$ כך ש:\n$$f(x)-f_{n}(x)&lt;f(x)-cs(x)\\implies cs(x)&gt; f_{n}(x)$$\nולכן $x \\in E_{n}$ עבור $n$ מספיק גדול.</p>\n</li>\n<li>\n<p>כיוון שלכל $E_{n}$ נקבל $E_{n}\\subseteq  X$: \n$$\\int_{E_{n}}  c s(x) \\;\\mathrm{d} \\mu \\leq\\int_{E_{n}} f_{n} \\;\\mathrm{d} \\mu \\leq \\int _{X} f_{n}\\;\\mathrm{d} x  $$\nכאשר השתמשנו בכך שבתחום $E_{n}$ מתקיים $cs(x)\\leq f_{n}$ ומונוטוניות האינטגרל.</p>\n</li>\n<li>\n<p>אם ניקח את הגבול $n\\to \\infty$ נקבל משימור אי שיוויון חלש בין גבולות: \n$$\\alpha = \\lim_{ n \\to \\infty } \\int _{X}f_{n} \\;\\mathrm{d} \\mu \\geq \\lim_{ n \\to \\infty } \\int _{E_{n}}f_{n} \\;\\mathrm{d} \\mu \\geq \\lim_{ n \\to \\infty } \\int _{E_{n}}c\\cdot s \\;\\mathrm{d} \\mu=c\\cdot \\lim_{ n \\to \\infty } \\int _{E_{n}}s \\;\\mathrm{d} \\mu   $$</p>\n</li>\n<li>\n<p>נראה $\\lim_{ n \\to \\infty }\\int _{E_{n}}s \\;\\mathrm{d} \\mu=\\int _{X}s \\;\\mathrm{d} \\mu$ בצורה הבאה: \nנסמן $s=\\sum_{i=1}^{k}\\alpha_{i}\\mathbb{1}_{A_{i}}$ כש-$\\left\\{  A_{1},\\dots,A_{k}  \\right\\}$ חלוקה של $X$. כאשר כעת מתקיים:\n$$\\int _{E_{n}}s \\;\\mathrm{d} \\mu = \\sum_{i=1}^{k}  \\alpha_{i}\\mu\\left( A_{i}\\cap E_{n} \\right) $$\nמאחר שלכל $1\\leq i \\leq k$ נקבל:\n$$A_{i}\\cap E_{1}\\subseteq A_{i}\\cap E_{2}\\subseteq A_{i}\\cap E_{3}\\subseteq \\dots$$\nכאשר נקבל:\n$$\\bigcup_{n}A_{i}\\cap E_{n}=A_{i}$$\nולכן מרציפות של מידה של סדרות עולות נקבל:\n$$\\mu\\left( A_{i}\\cap E_{n} \\right)\\xrightarrow{n\\to \\infty} \\mu(A_{i})$$\nולכן:\n$$\\int _{E_{n}} s\\;\\mathrm{d} \\mu \\xrightarrow{n\\to\\infty } \\sum_{i=1}^{k}\\alpha_{i}\\mu(A_{i})=\\int _{X}s \\;\\mathrm{d} \\mu  $$</p>\n</li>\n<li>\n<p>משלבים 5 ו-6 נסיק כי: \n$$\\alpha \\geq c \\cdot \\int _{X} s  \\;\\mathrm{d} \\mu $$</p>\n</li>\n<li>\n<p>מאחר ש-$0\\leq s\\leq f$ פשוטה שרירותית ו-$0&lt; c &lt; 1$ שרירותי נסיק ש: \n$$\\alpha \\geq \\sup_{n}  \\int_{X} s \\;\\mathrm{d} \\mu =\\int _{X}f \\;\\mathrm{d} \\mu$$\nוכיוון שיש לנו אי שוייונות בשתי כיוונים הוכחנו את הטענה.</p>\n</li>\n</ol>"}, {"question": "<p>משפט ההתכנסות הנשלטת אומר כי:\nתהי $f_{n}:X\\to \\mathbb{C}$ סדרה של פונקציות מדידות נניח שקיימת פונקציה $g \\in L^{1}\\left( \\mu \\right)$ כך שלכל $n$ מתקיים:\n$$\\lvert f_{n} \\rvert \\leq g$$\n(כאשר זה יהיה הנשלטות - $g$ שולטת על $f_{n}$). וכן נניח כי $f_{n}\\to f$ נקודתית. אזי:\n$$\\int \\lvert f-f_{n} \\rvert  \\;\\mathrm{d} \\mu \\xrightarrow{} 0 $$\nובפרט:\n$$\\int f \\;\\mathrm{d} \\mu = \\lim_{ n \\to \\infty } \\int f_{n} \\;\\mathrm{d} \\mu  $$\nהוכח את המשפט.</p>", "answer": "<ol>\n<li>\n<p>נבחין כי $\\lvert f \\rvert\\leq g$ ולכן $f \\in L^{1}\\left( \\mu \\right)$. כמו כן: \n$$\\lvert f-f_{n} \\rvert \\leq \\lvert f \\rvert +\\lvert f_{n} \\rvert \\leq g+g = 2g$$</p>\n</li>\n<li>\n<p>נגדיר: \n$$h_{n}=2g-\\lvert f-f_{n} \\rvert $$\nכאשר נשים לב כי $h_{n}$ מתכנסת נקודתית ל-$2g$.</p>\n</li>\n<li>\n<p>בפרט מתקיים: \n$$\\liminf_{ n \\to \\infty } h_{n}(x)=2g(x) $$</p>\n</li>\n<li>\n<p>מהלמה של פאטו עבור $h_{n}(x)$ נקבל: \n$$\\int2g\\,\\mathrm{d}\\mu=\\int\\operatorname*{lim}_{n\\to\\infty}\\operatorname*{inf}h_{n}(x)\\operatorname{d}\\!\\mu\\leq\\operatorname*{lim}_{n\\to\\infty}\\operatorname*{inf}\\int h_{n}(x)\\operatorname{d}\\!\\mu$$</p>\n</li>\n<li>\n<p>בעזרת הזהות $\\liminf(-a_{n})=-\\limsup(a_{n})$ נקבל: \n$$\\int 2g \\;\\mathrm{d} \\mu \\leq \\liminf_{ n \\to \\infty }  \\int\\left( 2g-\\lvert f-f_{n} \\rvert  \\right)\\;\\mathrm{d}\\mu=\\int 2g \\;\\mathrm{d} \\mu - \\limsup_{ n \\to \\infty }  \\int \\lvert f-f_{n} \\rvert  \\;\\mathrm{d} \\mu $$</p>\n</li>\n<li>\n<p>בגלל ש-$g \\in L^{1}\\left( \\mu \\right)$ אי שלילית הרי ש-$\\int 2g \\;\\mathrm{d} \\mu&lt; \\infty$ ולכן ניתן להחסירו ולקבל: \n$$\\limsup_{ n \\to \\infty }\\int \\lvert f-f_{n} \\rvert  \\;\\mathrm{d} \\mu =0  $$</p>\n</li>\n<li>\n<p>כיוון ש-$\\int\\lvert f-f_{n} \\rvert\\mathrm{d}\\mu\\to 0$ בפרט מתקיים: \n$$\\left\\lvert  \\int f \\;\\mathrm{d} \\mu -\\int f_{n} \\;\\mathrm{d} \\mu   \\right\\rvert =\\left\\lvert  \\int f-f_{n} \\;\\mathrm{d} \\mu   \\right\\rvert \\leq \\int \\lvert f-f_{n} \\rvert  \\;\\mathrm{d} \\mu \\xrightarrow{n\\to \\infty} 0 $$</p>\n</li>\n</ol>"}, {"question": "<p>הלמה של פאטו אומר כי:\nתהי $f_{n}:X\\to \\left[ 0,\\infty \\right]$ סדרה של פונקציות מדידות. אזי:\n$$\\int \\liminf_{ n \\to \\infty }  f_{n}\\;\\mathrm{d} \\mu \\leq \\liminf_{ n \\to \\infty } \\int f_{n} \\;\\mathrm{d} \\mu   $$\nהוכח את המשפט.</p>", "answer": "<p>נסמן:\n$$g_{k}=\\inf_{n\\geq k}f_{n}$$\nאזי $g_{1}\\leq g_{2}\\leq g_{2} \\leq \\dots$ ונקבל:\n$$\\lim_{ k \\to \\infty } g_{k}=\\liminf_{ n \\to \\infty } f_{n} $$\nאזי ממשפט ההתכנסות המונוטונית נקבל:\n$$\\int \\liminf_{ n \\to \\infty } f_{n} \\;\\mathrm{d} \\mu = \\lim_{ k \\to \\infty } \\int g_{k} \\;\\mathrm{d} \\mu  $$\nמצד שני לכל $k$ נקבל $g_{k}\\leq f_{k}$ ולכן $\\int g_{k} \\;\\mathrm{d} \\mu \\leq \\int f_{k} \\;\\mathrm{d} \\mu$ וזה גורר כי:\n$$\\lim_{ k \\to \\infty } \\int g_{k} \\;\\mathrm{d} \\mu \\leq \\liminf_{ k \\to \\infty }   \\int f_{k} \\;\\mathrm{d} \\mu $$</p>"}, {"question": "<p>משפט לוסין אומר:\nיהי $X$ מרחב האסדורף קומפקטי מקומית ותהי $\\mu$ מידת רדון על $X$. תהי $f:X\\to \\mathbb{C}$ פונקציה מדידה כך שהקבוצה $\\left\\{  x\\mid f(x)\\neq 0  \\right\\}\\subseteq A$ כאשר $A$ קבוצה בעלת מידה סופי($\\mu(A)&lt;\\infty$). אזי לכל $\\varepsilon&gt; 0$ קיימת פונקציה רציפה עם תומך קמופקטי $g \\in C_{c}(X)$ כך ש:\n$$\\mu\\left( \\left\\{  x\\mid g(x)\\neq f(x)  \\right\\} \\right)&lt;\\varepsilon$$ \nכאשר בנוסף ניתן לבחור את $g$ כך ש:\n$$\\sup _{x \\in X}\\lvert g(x) \\rvert \\leq \\sup _{x \\in X} \\lvert f(x) \\rvert $$\nהוכח את המשפט</p>", "answer": "<p>נראה ראשית את המקרה הפשוט - עבור $A$ קומפקטית ו-$0\\leq f\\leq 1$.</p>\n<ol>\n<li>\n<p>נקרב את $f$ על ידי פונקציות פשוטות המוגדרות על ידי: \n$$S_{n}(x)=2^{-n}\\lfloor2^{n}f(x)\\rfloor$$\nכאשר $n\\to \\infty$ נקבל $S_{n}(x)\\to f(x)$.</p>\n</li>\n<li>\n<p>נגדיר $t_{n}=S_{n}-S_{n-1}$ כאשר ניתן לכתב כל $t_{n}$ על ידי $t_{n}(x)=2^{-n}\\mathbb{1}_{T_{n}}(x)$ כאשר $\\mathbb{1}_{T_{n}}$ היא הפונקציה המציינת של הקבוצה: \n$$T_{n}=\\{x\\mid\\exists k\\quad k\\cdot2^{-(n-1)}+2^{-n}\\leq f(x)&lt;(k+1)2^{-(n-1)}\\}$$\nובפרט כיוון שטור טלסקופי מתקיים:\n$$\\lim_{ n \\to \\infty } t_{n}=\\lim_{ n \\to \\infty } S_{n}=f(x)$$</p>\n</li>\n<li>\n<p>מרגולריות נמצא קבוצות קופמקטיות $K_{n}$ וקבוצות פתוחות $V_{n}$ כך שלכל $T_{n}$ מתקיים: \n$$K_{n}\\subseteq T_{n}\\subseteq V_{n}\\qquad \\mu\\left( V_{n}\\setminus  K_{n} \\right)&lt; 2^{-n}\\varepsilon$$</p>\n</li>\n<li>\n<p>מהלמה של אוריסון נמצא פונקציות רציפות $h_{n}$ כך שמתקיים: \n$$\\begin{gather}\\forall x \\quad 0\\leq h_{n}(x)\\leq 1  \\\\\\forall x \\in K_{n}\\quad h_{n}(x)=1 \\\\\\forall x \\not  \\in V_{n} \\quad h_{n}(x)=0 \\end{gather}$$\nונגדיר את הפונקציה הרציפה $g$ שלנו על ידי:\n$$g(x)=\\sum_{n=1}^{\\infty}2^{-n}h_{n}(x)$$\nכיוון ש-$h_{n}(x)\\leq 1$ נקבל כי הטור מתכנס במידה שווה(ממבחן ה-$M$ של וורשטרס למשל) ולכן משמר רציפות ו-$g(x)$ תהיה רציפה.</p>\n</li>\n<li>\n<p>נשים לב כי כיוון שמתקיים $K_{n}\\subseteq T_{n}$ נקבל כי בתחום זה $\\mathbb{1}_{T_{n}}(x)=1$ ולכן $h_{n}(x)=1$ ונקבל $t_{n}=2^{-n}h_{n}(x)$ בתחום $V_{n}\\setminus K_{n}$ ולכן $f(x)=g(x)$ פרט לאיחוד של הקבוצות האלו $\\bigcup_{n}\\left( V_{n}\\setminus K_{n} \\right)$. המידה של האיחוד הזה חסום על ידי: \n$$\\mu \\left( \\bigcup_{n}\\left( V_{n}\\setminus K_{n} \\right) \\right)\\leq\\sum_{n=1}^{\\infty}\\mu\\left( V_{n}\\setminus K_{n} \\right)&lt;\\sum_{n=1}^{\\infty}2^{-n}\\varepsilon=\\varepsilon$$</p>\n</li>\n<li>\n<p>כעת אם $A$ לא קומפקטית נמצא תת קבוצה קומפקטית $K$ של $A$ כך ש-$\\mu\\left( A\\setminus K \\right)&lt;\\delta$. כעת עבור $K$ כיוון שקומפקטית מהטענה נקבל $g:K\\to \\mathbb{C}$ רציפה כך שלכל $x \\in K$ מתקיים $\\mu\\left( \\left\\{  x\\mid f|_{K}(x)\\neq g(x)  \\right\\} \\right)&lt;\\varepsilon-\\delta$. נגדיר $\\tilde{g}:A\\to \\mathbb{C}$ על ידי: \n$$\\tilde{g}(x)=\\begin{cases}g(x) &amp;  x \\in K \\\\0  &amp; \\text{else} \\end{cases}$$\nונקבל:\n$$\\begin{gather}\\mu\\left( \\left\\{  x \\in A\\mid f(x)\\neq \\tilde{g}(x)  \\right\\} \\right)\\leq\\mu\\left( A\\setminus  K \\sqcup \\left\\{  x \\in K\\mid f|_{K}(x)\\neq g(x)  \\right\\} \\right)\\leq\\\\ \\leq \\mu\\left( A\\setminus  K \\right)+\\mu\\left( \\left\\{  x \\in K\\mid f|_{K}(x)\\neq g(x)  \\right\\} \\right)&lt; \\delta+\\varepsilon-\\delta=\\varepsilon  \\end{gather}$$</p>\n</li>\n<li>\n<p>כאשר $f$ איננה חסומה נסמן $B_{n}=\\left\\{  \\lvert f \\rvert&gt;n  \\right\\}$. מאחר ש-$\\mu(A)&lt; \\infty$ ו-$\\bigcap_{n}B_{n}=\\varnothing$ הרי שמרציפות יורדת של $\\mu$ עבור הסדרה: \n$$A \\supseteq B_{1} \\supseteq \\dots \\supseteq B_{n}\\supseteq \\dots$$\nנסיק ש-$\\mu(B_{n})\\to 0$ ולכן ניתן \"להתעלם\" מקבוצה קטנה של x-ים עליה $f$ איננה חסומה.</p>\n</li>\n<li>\n<p>עבור התנאי: \n$$\\sup _{x \\in X}\\lvert g(x) \\rvert \\leq \\sup _{x \\in X} \\lvert f(x) \\rvert $$\nכיוון שאנחנו יכולים להניח ש-$f$ לא חסום(מהסעיף הקודם עד כדי קבוצה ממידה אפס) נגדיר:\n$$\\varphi = \\begin{cases} z  &amp;   \\lvert z \\rvert\\leq R \\\\\\frac{z}{\\lvert z \\rvert }R &amp; \\lvert z \\rvert &gt; R  \\end{cases}$$\nכש-$R=\\sup\\lvert f \\rvert&lt;\\infty$.</p>\n</li>\n</ol>"}, {"question": "<p>הוכח את אי שיוויון ג'נסון:\nיהי $\\left( X,\\mathcal{A},\\mu \\right)$ מרחב הסתברות. תהי $\\varphi:(a,b)\\to \\mathbb{R}$ קמורה ו-$f:X\\to (a,b)$ מדידה. אזי:\n$$\\varphi\\left( \\int _{X} \\;\\mathrm{d} \\mu  \\right)\\leq \\int _{X} \\varphi \\circ  f \\;\\mathrm{d} \\mu $$</p>", "answer": "<p>נסמן $T=\\int f \\;\\mathrm{d} \\mu$. אזי $T \\in (a,b)$. נסמן:\n$$\\beta = \\sup_{S&lt; T} \\frac{\\varphi(T)-\\varphi(s)}{T-S}$$\nאזי לכל $S&lt; T$ מההגדרה מתקיים:\n$$\\varphi(T)-\\varphi(S)\\leq \\beta(T-S)\\implies \\varphi(S)\\geq \\varphi(T)+\\beta(S-T)$$\nעבור $T&lt;S$ מאחר ש-$\\varphi$ קמורה הרי ש:\n$$\\varphi(S)-\\varphi(T)\\geq \\beta(S-T)$$\nמכאן שלכל $s \\in (a,b)$ נקבל:\n$$\\varphi(S)\\geq \\varphi(T)+\\varphi(S-T)$$\nולכן גם לכל $x \\in X$:\n$$\\varphi(f(x)) \\geq \\varphi(T)+\\beta(f(x)-T)$$\nנבצע אינטגרציה על $X$ ביחס ל-$\\mu$ ונקבל:\n$$\\int \\varphi \\circ f \\;\\mathrm{d} \\mu \\geq \\underbrace{ \\int  \\varphi(T)\\;\\mathrm{d} \\mu }_{ \\varphi(T) }+\\beta\\left( \\underbrace{ \\int f \\;\\mathrm{d} \\mu }_{ T }-\\underbrace{ \\int T \\;\\mathrm{d} \\mu }_{ T } \\right)=\\varphi(T)$$</p>"}], "שאלות - משפט ההצגה של ריס": []}
          console.log(subjects);
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length){
            location.reload()
            return;
            }
            if (currentQuestionIndex >= currentQuestions.length - 1) {
                document.getElementById('next-question').innerHTML = "לסיים";
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.typesetPromise(["#question"]).then(() => {
  MathJax.typesetPromise(["#answer"]);
});
            document.getElementById('question-counter').innerHTML = "שאלה "+ (currentQuestionIndex + 1) +" מתוך "+ currentQuestions.length;
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
