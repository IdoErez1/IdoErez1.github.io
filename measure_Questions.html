      <script type="text/javascript">
        window.onload = function() {
          const subjects = {"התכנסיות": [{"question": "<p>מהם השלבים המרכזיים בהוכחה של משפט ההתכנסות המונוטוני?</p>", "answer": "<p>המשפט אומר כי אם יש לי רצף</p>"}], "מרחבים מדידים": [{"question": "<p>מהו טופולוגיה? מהו מרחב טופולוגי?</p>", "answer": "<p>אוסף $\\tau$ של תתי קבוצות של $X$ נקרא טופולוגיה אם מקיים את התכונות הבאות:</p>\n<ol>\n<li>\n<p>מתקיים $\\varnothing\\in \\tau$ וגם $X \\in \\tau$ </p>\n</li>\n<li>\n<p>אם $V_{i}\\in \\tau$ עבור $i=1,\\dots ,n$ נקבל: \n$$V_{1} \\cap V_{2} \\cap \\dots \\cap V_{n}\\in \\tau$$</p>\n</li>\n<li>\n<p>אם $\\left\\{  V_{\\alpha}  \\right\\}$ היא אוסף שרירותי של איברים ב-$\\tau$ אזי $\\bigcup_{\\alpha}V_{\\alpha}\\in \\tau$, \nכאשר אם $\\tau$ טופלוגיה אז $X$ נקרא מרחב טופלוגי והאיברים של $\\tau$ נקראים הקבוצות הפתוחות.</p>\n</li>\n</ol>"}, {"question": "<p>מהו $\\sigma$-אלגברה ומהי קבוצה מדידה</p>", "answer": "<p>בהנתן קבוצה כלשהי, $X$ ה-$\\sigma$-אלגברה מעל $X$ הינו אוסף $A\\subseteq 2^{X}=\\mathcal{P}(X)$ של תתי קבוצות של $X$ המקיימת את האקסימות הבאות:</p>\n<ol>\n<li>\n<p>הקבוצה כולה נמצאת - $X \\in A$. </p>\n</li>\n<li>\n<p>אם $E \\in A$ אזי $E^{c} \\in A$. </p>\n</li>\n<li>\n<p>בהנתן אוסף בן מנייה $E_{1}, E_{2},\\dots, \\in A$ אזי: \n$$\\bigcup_{n}E_{n}\\in A$$\nכאשר הקבוצה $E \\in A$ נקראת קבוצה מדידה.</p>\n</li>\n</ol>"}, {"question": "<p>מהו סיגמת אלגברה בורל</p>", "answer": "<p>עבור מרחב טופולוגי $\\left( X,\\tau \\right)$ הסיגמת אלגברת בורל תהיה $\\sigma\\left( \\tau \\right)$, כלומר אוסף התתי קבוצות הקטן ביותר אשר $\\sigma$-אלגברה. זה יהיה שווה ל\n$$\\sigma(F):= \\bigcap_{e \\in \\Omega}e$$</p>"}, {"question": "<p>מהי פונקציה מדידה?</p>", "answer": "<p>יהי $\\left( X,\\Sigma \\right),(Y,T)$ מרחבים מדידים. פונקציה $f:X\\to Y$ נקראת מדידה אם לכל $E\\in T$ התמונה ההופכית של $E$ תחת $f$ הוא ב-$\\Sigma$. כלומר לכל $E \\in T$ מתקיים:\n$$f^{-1}(E):=\\{x\\in X\\mid f(x)\\in E\\}\\in\\Sigma.$$</p>"}, {"question": "", "answer": ""}], "אינטגרל לבג": [{"question": "<p>מהי פונקציה פשוטה?</p>", "answer": "<p>פונקציה מרוכבת $s$ על מרחב מדיד $X$ שהטווח שלה מכיל מספר סופי של נקודות נקראת פונקציה פשטוה. כלומר אם נגדיר:\n$$A_{i}=\\{x\\colon s(x)=\\alpha_{i}\\}$$\nניתן לכתוב פונקציה כזו בצורה:\n$$s=\\sum_{i=1}^{n}\\alpha_{i}\\chi_{A i}$$</p>"}, {"question": "<p>מהו ההגדרה של אינטגרל לבג?</p>", "answer": "<p>יהי $s:X\\to \\left[ 0,\\infty \\right)$ פונקציה פשוטה מדידה מהצורה:\n$$s=\\sum_{i=1}^{n}\\alpha_{i}\\chi_{A i}$$\nכאשר $\\alpha_{1},\\dots,\\alpha_{n}$ ערכים שונים של $s$. אם $E \\in \\mathcal{M}$ נגדיר:\n$$\\int_{E}s\\,d\\mu=\\sum_{i=1}^{n}\\alpha_{i}\\,\\mu(A_{i}\\cap E)$$\nכאשר אנחנו משתמשים במוסכמה $0\\cdot \\infty=0$. למשל אם $\\alpha_{i}=0$ ו-$\\mu\\left( A_{i}\\cap E \\right)=\\infty$ אז הערך בסכימה יהיה 0. אם $f:X\\to \\left[ 0,\\infty \\right]$ פונקציה מדידה ו-$E \\in \\mathcal{M}$ נגדיר:\n$$\\int_{E}f\\,d\\mu=\\mathrm{sup}\\int_{E}s\\,d\\mu$$\nכלומר זהו הסופרמום על כל הפונקציות הפשוטות המדידות $s$ כך ש-$0\\leq s\\leq f$.</p>"}, {"question": "<p>מהו משפט ההתכנסות המונוטוני(MCT)?</p>", "answer": "<p>יהיו $\\{ f_{n} \\}$ סדרה של מרחבים ממדדים של $X$. נניח כי מתקיים:</p>\n<ol>\n<li>\n<p>לכל $x \\in X$ מתקיים $0\\leq f_{1}(x)\\leq f_{2}(x)\\leq\\dots \\leq \\infty$ לכל $x \\in X$. </p>\n</li>\n<li>\n<p>לכל $x \\in X$ מתקיים $f_{n}(x)\\to f(x)$ כאשר $n\\to \\infty$. \nאזי $f$ הוא מדיד ומתקיים:\n$$\\int_{X}f_{n}\\;d\\mu\\to\\int_{X}f\\,d\\mu\\qquad a s\\ n\\to\\infty$$</p>\n</li>\n</ol>"}, {"question": "<p>מהם השלבים המרכזיים בהוכחה של משפט ההתכנסות המונטוני?</p>", "answer": "<ol>\n<li>\n<p>נניח $\\{ f_{n} \\}$ היא סדרה לא יורדת אי שלילית של פונקציות מדידות כך ש- $f_{n}\\nearrow f$ נקודתית </p>\n</li>\n<li>\n<p>מהמונטוניות של $f_{n}$ נראה כי $\\int f_{n} \\;\\mathrm{d} \\mu \\leq \\int f \\;\\mathrm{d} \\mu$. </p>\n</li>\n<li>\n<p>נגדיר סדרה $g_{k}=\\sup_{1\\leq n\\leq k}f_{k}$ </p>\n</li>\n<li>\n<p>נראה כי $\\int g_{k} \\;\\mathrm{d} \\mu=\\int f_{k} \\;\\mathrm{d} \\mu$ וכאשר $k\\to \\infty$ נקבל כי מתכנס ל-$\\int f \\;\\mathrm{d} \\mu$. </p>\n</li>\n<li>\n<p>נשתמש בהגדרה של אינטגרל לבג בתור סופרמום של פונקציות פשוטות כדי לקבל שיוויון. </p>\n</li>\n</ol>"}, {"question": "<p>מהו משפט ההתכנסות השולטת?</p>", "answer": ""}]}
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length){
            location.reload()
            return;
            }
            if (currentQuestionIndex >= currentQuestions.length - 1) {
                document.getElementById('next-question').innerHTML = "לסיים";
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.typesetPromise(["#question"]).then(() => {
  MathJax.typesetPromise(["#answer"]);
});
            document.getElementById('question-counter').innerHTML = "שאלה "+ (currentQuestionIndex + 1) +" מתוך "+ currentQuestions.length;
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
      </script>
</head>
<body>
<ul class='top-navigation'>

         חזרה לספר
         </a></li></ul><div class="content">
    <div id="subject-selection">
        <h1>נושאים:</h1>
    <div class="all-checkboxes-container">
        <label class="checkbox-container">התכנסיות<input type="checkbox" name="subject" value="התכנסיות" checked="checked"> <span class="checkmark"></span></label><label class="checkbox-container">מרחבים מדידים<input type="checkbox" name="subject" value="מרחבים מדידים" checked="checked"> <span class="checkmark"></span></label><label class="checkbox-container">אינטגרל לבג<input type="checkbox" name="subject" value="אינטגרל לבג" checked="checked"> <span class="checkmark"></span></label>
        </div>
    <button class="quiz-button" onclick="startQuiz()">להתחיל</button>
    </div>
    <div id="quiz-section" class="hidden">
        <h1>שאלות</h1>
        <div class="question-answer-container">
        <div id="question-counter"></div>
        <div id="question"></div>
        <div id="answer" class="hidden"></div>
        </div>
        <button class="quiz-button" id="show-answer" onclick="showAnswer()">הצג תשובה</button>
        <button class="quiz-button" id="next-question" class="hidden" onclick="nextQuestion()">שאלה הבאה</button>
    </div>
    </div>
</body>
