      <script type="text/javascript">
        window.onload = function() {
          const subjects = {"תורת הקבוצות האקסיומטית": [{"question": "<h1>תורת הקבוצות האקסיומטית</h1>\n<p>מה אומר אקסימת ההרחבה?</p>", "answer": "<p><strong>אקסיומת ההרחבה:</strong> אם לשתי קבוצות <script type=\"math/tex\">A,B<\/script> יש את אותם איברים, אז הם שווים</p>"}, {"question": "<p>מה אומר אקסיומת הקבוצה הריקה?</p>", "answer": "<p><strong>אקסיומת הקבוצה הריקה:</strong> קיים קבוצה ללא איברים, אשר נסמן ב-<script type=\"math/tex\">\\varnothing<\/script>.</p>"}, {"question": "<p>מה אומר אקסיומת הזוג הלא סדור?</p>", "answer": "<p><strong>אקסיומת הזוג הלא סדור:</strong> עבור קבוצות <script type=\"math/tex\">A,B<\/script> קיים קבוצה <script type=\"math/tex\">\\{ A,B \\}<\/script> המכיל את האיברים <script type=\"math/tex\">A,B<\/script> כאיברים היחידים שלו. בפרט קיים קבוצה שמכיל את <script type=\"math/tex\">A<\/script> בלבד.</p>"}, {"question": "<p>מה אומר אקסיומת קבוצת החזקה?</p>", "answer": "<p><strong>אקסיומת קבוצות החזקה:</strong> לכל קבוצה <script type=\"math/tex\">A<\/script> קיים קבוצה <script type=\"math/tex\">\\mathcal{P}(A)<\/script> שכל איבריו הם תתי הקבוצות של <script type=\"math/tex\">A<\/script>.</p>"}, {"question": "<p>מה אומר אקסיומת האיחוד?</p>", "answer": "<p><strong>אקסיומת האיחוד:</strong> לכל קבוצה <script type=\"math/tex\">A<\/script>, קיים קבוצה אשר נסמן ב-<script type=\"math/tex\">\\cup A<\/script> אשר נקראת האיחוד של <script type=\"math/tex\">A<\/script>, והאיברים שלה הם כל האיברים של <script type=\"math/tex\">A<\/script>.</p>"}, {"question": "<p>מה אומר אקסיומת האינסוף?</p>", "answer": "<p><strong>אקסיומת האינסוף:</strong> קיים קבוצה אינסופית, בפרט קיים קבוצה <script type=\"math/tex\">Z<\/script> שמכילה את <script type=\"math/tex\">\\varnothing<\/script> ומתקיימת אם <script type=\"math/tex\">A \\in Z<\/script> אז <script type=\"math/tex\">\\cup \\left\\{  A,\\{ A \\}  \\right\\}\\in Z<\/script>.</p>"}, {"question": "<p>מה אומר אקסיומת ההפרדה?</p>", "answer": "<p><strong>אקסיומת ההפרדה:</strong> לכל קבוצה <script type=\"math/tex\">A<\/script> עם תכונה נתונה, קיימת קבוצה שמכילה את האיברים של <script type=\"math/tex\">A<\/script>\n<strong>אקסיומת (סכמת) ההפרדה:</strong> לכל תכונה <script type=\"math/tex\">p(x)<\/script> וקבוצה <script type=\"math/tex\">A<\/script> קיימת קבוצה <script type=\"math/tex\">\\left\\{  x \\in A \\mid p(x)  \\right\\}<\/script>.</p>"}, {"question": "<p>מה אומר אקסיומת(סכמת) ההחלפה?</p>", "answer": "<p><strong>אקסיומת (סכמת) ההחלפה:</strong> לכל פונקציה מוגדרת היטב עם תחום <script type=\"math/tex\">A<\/script> קיים קבוצה שכל איבריה הם הערכים כל הערכים של הפונקציה.</p>"}, {"question": "<p>מה אומר אקסיומת היסוד?</p>", "answer": "<p><strong>אקסיומת היסוד:</strong> לכל קבוצה לא ריקה <script type=\"math/tex\">A<\/script> קיים איבר מינימלי תחת היחס <script type=\"math/tex\">\\in<\/script>.</p>"}, {"question": "<p>הוכח בעזרת ZF כי לכל קבוצה <script type=\"math/tex\">A<\/script> גם <script type=\"math/tex\">A\\cup \\{ A \\}<\/script> היא קבוצה.</p>", "answer": "<p>ראשית מאקסיומת הזוג הלא סדור נקבל כי <script type=\"math/tex\">\\{ A,A \\}<\/script> היא קבוצה. כאשר מאקסיומת ההיקפיות נקבל כי:\n<script type=\"math/tex; mode=display\">\\left( x \\in \\{ A,A \\}\\iff x = A \\iff x \\in \\{  A \\}\\right)\\implies\\left( \\{ A,A \\}=\\{ A \\} \\right)<\/script>\nולכן קיים היחידון <script type=\"math/tex\">A<\/script>. כעת מאקסיומת הזוג הלא סדור נקבל כי <script type=\"math/tex\">\\left\\{  A,\\{ A \\}  \\right\\}<\/script> היא קבוצה וכעת מאקסיומת האיחוד <script type=\"math/tex\">\\cup \\left\\{  A,\\{ A \\}  \\right\\}<\/script> היא קבוצה. כאשר מתקיים:\n<script type=\"math/tex; mode=display\">\\cup \\left\\{  A,\\{ A \\}  \\right\\}=\\left\\{  x\\mid x \\in A \\lor x \\in \\{  A \\}  \\right\\}=\\left\\{  x \\mid x \\in A\\cup \\{ A \\}  \\right\\}=A\\cup \\{  A \\}<\/script>\n</p>"}, {"question": "<p>הוכח בעזרת ZF כי עבור קבוצות <script type=\"math/tex\">A,B<\/script> קיימת הקבוצה של המכפלה הקרטזית <script type=\"math/tex\">A\\times B<\/script>.</p>", "answer": "<p>מאקסיומת הזוג הלא סדור נקבל כי <script type=\"math/tex\">\\{ A,B \\}<\/script> קבוצה ומאקסיומת האיחוד נקבל כי <script type=\"math/tex\">A\\cup B<\/script> היא קבוצה. כעת מאקסיומת קבוצת החזקה נקבל כי <script type=\"math/tex\">\\mathcal{P}\\left( A\\cup B \\right)<\/script> קבוצה וכעת יש לנו את הקבוצה של כל האיברים מהצורה <script type=\"math/tex\">\\{ a \\},\\{ b \\},\\{ a,b \\}<\/script> עבור <script type=\"math/tex\">a\\in A,b \\in B<\/script>. ניקח את קבוצת החזקה <script type=\"math/tex\">\\mathcal{P}\\left( \\mathcal{P}\\left( A\\cup B \\right) \\right)<\/script> ובעזרת אקסיומת ההפרדה נדרוש שיהיה מהצורה <script type=\"math/tex\">\\left\\{  \\{ a \\},\\{ a,b \\}  \\right\\}<\/script>.</p>"}, {"question": "<p>הוכח בעזרת ZF כי עבור קבוצה <script type=\"math/tex\">A<\/script> אוסף כל יחסי השקילות זה קבוצה.</p>", "answer": "<p>אנו יודעים כי עבור קבוצה <script type=\"math/tex\">A<\/script> המכפלה הקרטזית <script type=\"math/tex\">A\\times A<\/script> היא קבוצה. מאקסיומת קבוצת החזקה נקבל כי <script type=\"math/tex\">\\mathcal{P}\\left( A\\times A \\right)<\/script> היא קבוצה, כאשר כל יחס הוא תת חבורה של <script type=\"math/tex\">A\\times A<\/script> ולכן שייך לקבוצת החזקה. נסתכל על התכונות הבאות:\n<script type=\"math/tex; mode=display\">\\begin{gather}\n\\varphi_{1}(x):= \\forall a \\in A\\quad  (a,a) \\in x  \\\\\n\\varphi_{2}(x):= \\forall a,b \\in A\\quad  (a,b) \\in x \\implies (b,a) \\in x \\\\\n\\varphi_{3}(x):= \\forall a,b,c \\in A\\quad (a,b) \\in x\\land(b,c)\\in x\\implies(a,c)\\in x\n\\end{gather}<\/script>\nכאשר <script type=\"math/tex\">\\varphi_{1}<\/script> מתאר רפלקסיביות, <script type=\"math/tex\">\\varphi_{2}<\/script> מתאר סימטריות ו-<script type=\"math/tex\">\\varphi_{3}<\/script> מתאר טרנזטיביות. לכן בעזרת אקסיומת ההפרדה ניקח את כל האיברים ב-<script type=\"math/tex\">\\mathcal{P}\\left( A\\times A \\right)<\/script> אשר מקיימים את <script type=\"math/tex\">\\varphi_{1}\\land \\varphi_{2}\\land \\varphi_{3}<\/script> ונקבל את קבוצת כל היחסי שקילות.</p>"}, {"question": "<p>הוכח בעזרת <script type=\"math/tex\">ZF<\/script> כי אוסף קבוצת החזקה של הממשיים <script type=\"math/tex\">\\left\\{  \\mathcal{P}(r)\\mid r \\in \\mathbb{R}  \\right\\}<\/script> הוא קבוצה(ניתן להניח <script type=\"math/tex\">\\mathbb{R}<\/script> היא קבוצה)</p>", "answer": "<p>נסמן ב-<script type=\"math/tex\">A<\/script> את מחלקת כל הקבוצות. נגדיר <script type=\"math/tex\">F:\\mathbb{R}\\to \\mathcal{P}\\left( \\mathbb{R} \\right)<\/script> ע\"י <script type=\"math/tex\">F(r)=\\mathcal{P}(r)<\/script>. הפונקציה הזו מוגדרת בגלל אקסיומת קבוצת החזקה, וזוהי פונקציה שקבוצת החזקה נקבעת ביחידות ע\"י הקבוצה שיוצרת אותה, וכעת מאקסיומת ההחלפה נקבל כי התמונה היא קבוצה.</p>"}, {"question": "<p>מהי פונקצית בחירה? מה הקשר לאקסיומת הבחירה?</p>", "answer": "<p><strong>פונקציית בחירה:</strong> בהנתן קבוצה <script type=\"math/tex\">X<\/script> של קבוצות לא ריקות,פונקצית בחירה היא פונקציה אשר לוקחת איבר מכל קבוצה ב-<script type=\"math/tex\">X<\/script>, וממפה אותה לאיבר ב-<script type=\"math/tex\">X<\/script>. כלומר עבור הקבוצה <script type=\"math/tex\">\\left\\{  B_{i}\\mid i \\in I  \\right\\}<\/script> קיימת פונקציה בחירה <script type=\"math/tex\">F:I\\to \\cup \\left\\{  B_{i}\\mid i \\in I  \\right\\}<\/script> כך ש-<script type=\"math/tex\">\\forall i \\in I\\quad f(i) \\in B_{i}<\/script>.\n<strong>אקסיומת הבחירה:</strong> לכל קבוצה לא ריקה <script type=\"math/tex\">A<\/script> קיים פונקצית בחירה <script type=\"math/tex\">f<\/script> אשר מקשר כל קבוצה <script type=\"math/tex\">a \\in A<\/script> לאיבר <script type=\"math/tex\">x \\in A<\/script>.</p>"}, {"question": "<p>מהי שרשרת? מה אומרת הלמה של צורן על שרשראות?</p>", "answer": "<p>עבור יחס סדר חלקי שרשרת של היחס סדר תהיה תת קבוצה אשר היחד עם היחס סדר מהווה יחס סדר מלא. כלומר כל שתי איברים משרשרת ניתנים להשוואה. הלמה של צורן אומרת כי אם לכל שרשרת יש חסם עליון, אז לקבוצה כולה יהיה איבר מקסימלי.</p>"}], "Test": [{"question": "<p>מה אומר אקסימת ההרחבה?</p>", "answer": "<p><strong>אקסיומת ההרחבה</strong> אם לשתי קבוצות <script type=\"math/tex\">A,B<\/script> יש את אותם איברים, אז הם שווים</p>"}]}
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) {
                document.getElementById('quiz-section').classList.add('hidden');
                document.getElementById('end-section').classList.remove('hidden');
                return;
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.Hub.Queue(["Typeset",MathJax.Hub,"question"]);
            MathJax.Hub.Queue(["Typeset",MathJax.Hub,"answer"]);
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
      </script>

<div class="content"><ul class='top-navigation'>

    <div id="subject-selection">
        <h1>Select Subjects</h1>
        <div><input type="checkbox" name="subject" value="תורת הקבוצות האקסיומטית"> תורת הקבוצות האקסיומטית</div><div><input type="checkbox" name="subject" value="Test"> Test</div>
        <br>
        <button onclick="startQuiz()">Start Quiz</button>
    </div>
    <div id="quiz-section" class="hidden">
        <h1>Quiz</h1>
        <div id="question"></div>
        <div id="answer" class="hidden"></div>
        <br>
        <button id="show-answer" onclick="showAnswer()">Show Answer</button>
        <button id="next-question" class="hidden" onclick="nextQuestion()">Next Question</button>
    </div>
    <div id="end-section" class="hidden">
        <h1>End of Quiz</h1>
        <button onclick="location.reload()">End Quiz</button>
    </div>            
    </div>
