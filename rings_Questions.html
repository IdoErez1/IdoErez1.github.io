        <title>שאלות - תורת חוגים</title>
        <style>
            .hidden { display: none; }
        </style>
      <script type="text/javascript">
        window.onload = function() {
          const subjects = {"חוגים": [{"question": "<p>מהו חוג?</p>", "answer": "<p>אוסף $\\left( R,+,\\cdot, \\right)$  כאשר:</p>\n<ol>\n<li>\n<p>הקבוצה $R$ ביחד עם חיבור יוצר חבורה חיבורית, עם איבר ניטרלי אפס. </p>\n</li>\n<li>\n<p>הקבוצה $R$ ביחד עם כפל היא אסוצייטיבית </p>\n</li>\n<li>\n<p>מכיל יחידה כפלית 1(לא תנאי הכרחי בחלק מההגדרות) </p>\n</li>\n<li>\n<p>מקיים שתי חוקי פילוג: \n$$r(a+b)=r\\cdot a+r\\cdot b\\quad (a+b)\\cdot r=a\\cdot r+b\\cdot r$$\nנשים לב כי אין בהכרח הופכי כפלי. חוג עם הופכי לכפל נקרא חוג חילוק. יש דבר כזה חוגים ללא יחידה כפלית.</p>\n</li>\n</ol>"}, {"question": "<p>ציין כמה שיותר תכונות בסיסיות של חוגים?</p>", "answer": "<p>יהיו $a,b,c \\in R$. אזי מתקיים:</p>\n<ol>\n<li>\n<p>$a 0=0a=0$ </p>\n</li>\n<li>\n<p>$a(-b)=(-a)b=-(ab)$ </p>\n</li>\n<li>\n<p>$(-a)(-b)=ab$ </p>\n</li>\n<li>\n<p>$a(b-c)=ab-ac$ וגם $(b-c)a=ba-ca$ </p>\n</li>\n<li>\n<p>$(-1)a=-a$ </p>\n</li>\n<li>\n<p>$(-1)(-1)=1$ </p>\n</li>\n</ol>"}, {"question": "<p>תגדיר הומומורפיזם של חוגים</p>", "answer": "<p>יהיו $S,R$ חוגים. הומומורפיזם של חוגים זו העתקה $\\varphi:S\\to R$ כך שמתקיים:</p>\n<ol>\n<li>\n<p>זהו הומומורפיזם של החבורה החיבוריות </p>\n</li>\n<li>\n<p>משמר כפל, כלומר $\\varphi\\left( s_{1}\\cdot s_{2} \\right)=\\varphi(s_{1})\\cdot \\varphi(s_{2})$. </p>\n</li>\n<li>\n<p>מעביר יחידה ליחידה - $\\varphi(1)=1$. \nהתמונה של הומומורפיזם היא תת חוג, והגרעין של הומומורפיזם היא אידיאל.</p>\n</li>\n</ol>"}, {"question": "<p>מה אומר משפט האיזומורפיזם הראשון של חוגים?</p>", "answer": "<p>נניח $\\phi:R\\to S$ הומומורפיזם של חוגים $R,S$. אז ההעתקה:\n$$R / \\ker \\phi \\to \\mathrm{Im}\\left( \\phi \\right)$$\nהיא איזומורפיזם בין חוגים</p>"}, {"question": "<p>מהו אידיאלי? מהם המבחנים כדי להוכיח שאידיאל?</p>", "answer": "<p><strong>הגדרה:</strong> תת חוג $I$ של $R$ נקרא אידיאל(דו צדדי) אם לכל $r\\in R$ ולכל $i \\in I$ מתקיים $ri,ir\\in I$\n<strong>טענה:</strong> מבחן האידיאל\nקבוצה לא ריקה $I$ הוא אידיאל של החוג $R$ אם:</p>\n<ol>\n<li>\n<p>אם $a,b \\in I$ גורר $a-b\\in I$ </p>\n</li>\n<li>\n<p>כאשר $i \\in I$ ו-$r \\in R$ גורר $ir,ri \\in I$ \nנשים לב כי תנאי אחד מראה כי תת חבורה חיבורית, ותנאי 2 מראה שזה אידיאל\n<strong>הערות:</strong></p>\n</li>\n<li>\n<p>החוג כולו $R$ והאידיאל הטריוויאלי $\\{ 0 \\}$ הם תמיד אידיאלים </p>\n</li>\n<li>\n<p>מסומן $I\\trianglelefteq R$. </p>\n</li>\n<li>\n<p>האידיאל יכיל את היחידה רק אם הוא החוג כולו. </p>\n</li>\n</ol>"}, {"question": "<p>מהו חוג מנה?</p>", "answer": "<p>יהי $R$ חוג, ו-$A$ תת חוג של $R$. הקבוצה:\n$$\\left\\{  r+A\\mid r\\in R  \\right\\}$$\nיוצרת תת חוג ביחד עם הפעולה $(s+A)+(t+A)=s+t+A$ ו-$(s+A)\\cdot(t+A)=st+A$ אם\"ם החוג $A$ הוא אידיאל.</p>"}, {"question": "<p>מהו מחלק אפס? מהו תחום שלמות?</p>", "answer": "<p><strong>הגדרה:</strong> איבר $a\\neq 0$ נקרא מחלק אפס של חוג $R$ אם קיים $0\\neq b \\in R$ ומקיים $a\\cdot b =0$\n<strong>הגדרה:</strong> חוג קומוטטיבי עם יחידה וללא מחלק אפס נקרא חוק שלמות.</p>"}]}
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length){
            location.reload()
            return;
            }
            if (currentQuestionIndex >= currentQuestions.length - 1) {
                document.getElementById('next-question').innerHTML = "לסיים";
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.typesetPromise(["#question"]).then(() => {
  MathJax.typesetPromise(["#answer"]);
});
            document.getElementById('question-counter').innerHTML = "שאלה "+ (currentQuestionIndex + 1) +" מתוך "+ currentQuestions.length;
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
      </script>
</head>
<body>
<ul class='top-navigation'>
        <li class="parent-page"> <a href="./rings"> 
         חזרה לספר
         </a></li></ul><div class="content">
    <div id="subject-selection">
        <h1>נושאים:</h1>
    <div class="all-checkboxes-container">
        <label class="checkbox-container">חוגים<input type="checkbox" name="subject" value="חוגים" checked="checked"> <span class="checkmark"></span></label>
        </div>
    <button class="quiz-button" onclick="startQuiz()">להתחיל</button>
    </div>
    <div id="quiz-section" class="hidden">
        <h1>שאלות</h1>
        <div class="question-answer-container">
        <div id="question-counter"></div>
        <div id="question"></div>
        <div id="answer" class="hidden"></div>
        </div>
        <button class="quiz-button" id="show-answer" onclick="showAnswer()">הצג תשובה</button>
        <button class="quiz-button" id="next-question" class="hidden" onclick="nextQuestion()">שאלה הבאה</button>
    </div>
    </div>
</body>
</html>
