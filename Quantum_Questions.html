      <script type="text/javascript">
        window.onload = function() {
          const subjects = {"הגדרות - תנע זוויתי": [{"question": "<p>מה ההגדרה של אטום המימן?</p>", "answer": "<p>האטום הפשוט ביותר. מורכב מגרעין טעון חיובית עם מסת מנוחה\n$$m_{p}\\,=\\,1.6726231\\times10^{-27}\\,\\mathrm{kg},$$\nוכן אלקטרון טעון שלילית עם מסה:\n$$m_{e}\\;=\\;9.1093897\\,\\times\\,10^{-31}\\,\\mathrm{kg}.$$</p>"}, {"question": "<p>מה ההגדרה של מכפלה פנמימת כדורית?</p>", "answer": "<p>$$\\langle f|g\\rangle=\\int d\\Omega\\,f(\\theta,\\phi)^{*}g(\\theta,\\phi)$$\nכאשר $d\\Omega=\\sin \\theta d\\theta d\\phi$.</p>"}, {"question": "<p>מה ההגדרה של הבסיס הקרטזי?</p>", "answer": "<p>נגדיר משתנים חדשים $J_{x},J_{y},J_{z}$ באופן הבא:\n$$J_{x}=J_{1} \\qquad J_{y}=J_{2} \\qquad  J_{z}=J_{3}$$</p>"}, {"question": "<p>מה ההגדרה של הבסיס הפולארי?</p>", "answer": "<p>נגדיר משתנים חדשים $J_{0},J_{+},J_{-}$ באופן הבא:\n$$J_{\\pm}=J_{x}\\pm i J_{y}\\qquad J_{0}=J_{z}$$\nכאשר האופרטורים $J_{\\pm}$ נקראים אופרטורי סולם, ואינם הרמיטים אבל כן מתקיים $J_{\\pm}^{\\dagger}=J_{\\mp}$.</p>"}, {"question": "<p>מה ההגדרה של תנע זוויתי אורביטלי?</p>", "answer": "<p>היוצר של שינוי בזווית. כלומר עבור סיבוב כללי סביב ציר $\\hat{n}$ בזווית $\\theta$ המוגדר על ידי:\n$$R(\\mathbf{\\hat{n}},\\theta)=\\mathsf{I}+\\theta\\mathbf{\\hat{n}}\\cdot\\mathsf{J}$$\nכאשר $\\theta\\ll 1$ האופרטור האוניטרי המתאים יהיה:\n$$U(R)=U(\\mathbf{\\hat{n}},\\theta)=1-{\\frac{i}{\\hbar}}\\theta\\mathbf{\\hat{n}}\\cdot\\mathbf{L}$$\n<strong>טענה</strong>\nהאופרטור התנע הזוויתי האורביטלי מקיים:\n$$\\mathbf{L}=\\mathbf{x}\\times\\mathbf{p}$$</p>"}, {"question": "<p>מה ההגדרה של אופרטור התנע בריבוע?</p>", "answer": "<p>$$\\hat{L}^{2}=\\hat{L}_{x}^{2}+\\hat{L}_{y}^{2}+\\hat{L}_{z}^{2}$$\nלעיתים נקרא אופרטור קסימיר.</p>"}, {"question": "<p>מה ההגדרה של מטריצת אלמנטי מטריצת הסיבוב?</p>", "answer": "<p>עבור סיבוב $R$ אשר מוגדר על ידי $\\hat{n}$ ו-$\\phi$ ניתן להגדיר את אלמנטי המטריצה על ידי:\n$${\\mathcal{D}}_{m^{\\prime}m}^{(j)}(R)=\\langle j,m^{\\prime}|\\exp\\left(\\frac{-i{\\bf J}\\!\\cdot\\!{\\hat{\\bf n}}\\phi}{\\hbar}\\right)|j,m\\rangle$$\nכאשר אלמנטי המטריצה לעיתים נקראות פונקציות ויגנר.</p>"}], "מבוא": [{"question": "<p>מה אומר משפט יחס פלנק?</p>", "answer": "<p>האנרגיה של פוטון קשור ע\"י:\n$$E = h \\nu = \\hbar \\omega$$\nכאשר $h$ זה קבוע פלאנק, $\\hbar=\\frac{h}{2\\pi}$ קבוע פלאנק מצומצם, $\\nu$ זה תדירות ו-$\\omega$ זה תדירות זוויתית.</p>"}, {"question": "<p>מה אומר משפט דה ברויי?</p>", "answer": "<p>גם חלקיקים חסרי מסה יכולים להתנהג כגלים, ומקיימים $p=h\\lambda=\\hbar k$</p>"}, {"question": "<p>מה ההגדרה של קומוטטור של חוגים?</p>", "answer": "<p>$$[A,B]=AB-BA$$</p>"}, {"question": "<p>מה ההגדרה של אנטי קומוטטור?</p>", "answer": "<p>$$\\{A,B\\}=AB+BA$$</p>"}, {"question": "<p>מה ההגדרה של מרחב הילברט?</p>", "answer": "<p>מרחב הילברט זה מרחב מכפלה פנימית שלם(כלומר כל סדרת קושי של איברים במרחב מתכנסת).</p>"}, {"question": "<p>מה ההגדרה של בסיס של מרחב הילברט?</p>", "answer": "<p>אוסף של ווקטורים אשר צירוף לינארי שלהם(לאו דווקא סופי) פורש את המרחב, וכל איבר יהיה בלתי תלוי לינארי ביתר האיברים.</p>"}, {"question": "<p>מה ההגדרה של מרחב הילברט רציף?</p>", "answer": "<p>מרחב הילברט כאשר הקבוצה של האיברי בסיס שלו בעוצמת הרצף.</p>"}, {"question": "<p>מה ההגדרה של פונקציית הגל?</p>", "answer": "<p>בהנתן בסיס $\\left\\{  \\ket{x}  \\right\\}$ ניתן להציג כל $\\ket{\\psi}$ במרחב הילברט ע\"י צירוף לינארי אינסופי של איברים מ-$\\left\\{  \\ket{x}  \\right\\}$. נסמן את מקדמים הנרמול של האיבר $\\ket{x}$ ב-$\\psi(x)$ ולכן מתקיים:\n$$\\left|\\psi\\right\\rangle=\\int d x\\psi\\left(x\\right)\\left|x\\right\\rangle$$</p>"}, {"question": "<p>מה ההגדרה של ווקטור עצמי?</p>", "answer": "<p>עבור אופרטור $X$, ווקטור עצמי $\\ket{x}$ של $X$ יהיה ווקטור המקיים:\n$$X\\left|x\\right\\rangle=x\\left|x\\right\\rangle$$\nעבור $x \\in \\mathbb{C}$ כלשהו.</p>"}, {"question": "<p>מה ההגדרה של אורתוגונאליות?</p>", "answer": "<p>ווקטורים $x,x'$ נקראים אורתוגונאלים אם:\n$$\\left\\langle  x|x^{\\prime} \\right\\rangle=\\begin{cases}0 &amp; \\ket{x} \\neq \\ket{x'} \\\\1 &amp; \\ket{x} =\\ket{x'}   \\end{cases}$$\nכאשר עבור ווקטורים עצמיים אורתוגונאלים נקבל כי:\n$$\\braket{ x | x' } =\\delta(x-x')  $$</p>"}, {"question": "<p>מה ההגדרה של פונקציית גל מנורמלת?</p>", "answer": "<p>$$\\int d x\\left|\\psi\\left(x\\right)\\right|^{2}=1$$</p>"}, {"question": "<p>מה ההגדרה של ספין?</p>", "answer": "<p>תכונה קוונטית חומר. ניתן למדוד ב-3 כיוונים, אשר נסמן אותם $\\sigma_{z},\\sigma_{y},\\sigma_{x}$</p>"}, {"question": "<p>מה ההגדרה של חופש פאזה?</p>", "answer": "<p>כפל של המקדמים עם מספר על המעל היחידה $z = e^{i\\theta}$ לא משנה את ההסתברות.</p>"}, {"question": "<p>מה ההגדרה של צמוד מרוכב?</p>", "answer": "<p>הצמוד של מספר מרוכב $z=a+bi$ יהיה המספר $\\overline{z}=a-bi$.</p>"}, {"question": "<p>מה ההגדרה של צמוד הרמיטי של מטריצה?</p>", "answer": "<p>הצמוד ההרימטי של מטריצה $U$ יהיה השיחלוף של הצמוד המרוכב של כל האיברים. מסומן $U^{\\dagger}$</p>"}, {"question": "<p>מה ההגדרה של מטריצה אוניטרי?</p>", "answer": "<p>מטריצה המקיימת $U U^{\\dagger}=U^{\\dagger} U=Id$.</p>"}, {"question": "<p>מה ההגדרה של מטריצה הרמיטית?</p>", "answer": "<p>מטריצה שמקיימת $U^{\\dagger}=U$.</p>"}, {"question": "<p>מה ההגדרה של מרחב הילברט?</p>", "answer": "<p>מרחב מכפלה פנימית שלם. לעיתים מסמנים ב-$\\mathcal{H}$.</p>"}, {"question": "<p>מה ההגדרה של מכפלה פנימית?</p>", "answer": "<p>תבנית ססקילינארית $\\left\\langle  \\cdot \\mid\\cdot  \\right\\rangle:\\mathbb{C}\\times \\mathbb{C}\\to \\mathbb{R}$ מוגדרת על ידי:\n$$\\left\\langle  \\vec{v},\\vec{u}  \\right\\rangle ={\\vec{v}}^{\\dagger} \\vec{u}$$</p>"}, {"question": "<p>מה ההגדרה של קאט?</p>", "answer": "<p>נקרא לאיבר(ווקטור) במרחב הילברט קאט. נסמן אותו $\\ket{\\psi}$</p>"}, {"question": "<p>מה ההגדרה של ברא?</p>", "answer": "<p>עבור קאט $\\ket{\\psi}$ נגדיר את הברא המתאים בתור $\\bra{\\psi}$ אשר מקיים $\\bra{\\psi}=\\ket{\\psi}^{\\dagger}$.</p>"}, {"question": "<p>מה ההגדרה של אופרטור לינארי?</p>", "answer": "<p>עבור מרחב הילברט $\\mathcal{H}$ אופרטור $\\hat{X}$ נקרא אופרטור לינארי אם לכל $v,u \\in \\mathcal{H}$ ו-$c \\in \\mathbb{R}$ מתקיים:\n$$\\hat{X}(v+cu)=\\hat{X}v+c\\hat{X}u$$</p>"}, {"question": "<p>מה ההגדרה של אופרטור הצמוד?</p>", "answer": "<p>יהי $\\mathcal{H}$ מרחב הילברט. עבור אופרטור $\\hat{X}$ נגדיר את $\\hat{X}^{\\dagger}$ ע\"י האופרטור היחיד שמקיים לכל $\\ket{v},\\ket{w}$:\n$$\\hat{X}\\bra{v} \\ket{w} =\\bra{v} \\hat{X}^{\\dagger}\\ket{w} $$</p>"}, {"question": "<p>מה ההגדרה של אופרטור נורמלי?</p>", "answer": "<p>אופרטור $\\hat{X}$ המקיים $\\hat{X}^{\\dagger}\\hat{X}=\\hat{X}\\hat{X}^{\\dagger}$.</p>"}, {"question": "<p>מה ההגדרה של אופרטור הרמיטי?</p>", "answer": "<p>אופרטור $\\hat{X}$ המקיים $\\hat{X}^{\\dagger}=\\hat{X}$.</p>"}, {"question": "<p>מה ההגדרה של אופרטור אנטי-הרמיטי?</p>", "answer": "<p>אופרטור $\\hat{X}$ המקיים $\\hat{X}=-\\hat{X}^{\\dagger}$</p>"}, {"question": "<p>מה ההגדרה של אופרטור אוניטרי?</p>", "answer": "<p>יהי $\\mathcal{H}$ מרחב הילברט. האופרטור $\\hat{X}$ יקרא אניטרי אם לכל $v,w \\in \\mathcal{H}$ מתקיים:\n$$\\bra{T(v)}\\ket{T(w)} =\\bra{v} \\ket{w}  $$</p>"}, {"question": "<p>מה ההגדרה של תת מרחב ווקטורי?</p>", "answer": "<p>עבור מרחב הילברט $\\mathcal{H}$ כל מרחב ווקטורי שמוכל ב-$\\mathcal{H}$ יהיה תת מרחב ווקטורי.</p>"}, {"question": "<p>מה ההגדרה של סכום ישר?</p>", "answer": "<p>שתי מרחבים נמצאים בסכום ישר אם החיתוך שלהם הוא אפס והסכום שלהם הוא המרחב כולו.</p>"}, {"question": "<p>מה ההגדרה של אופרטור הטלה?</p>", "answer": "<p>אם שתי מרחבים נמצאים בסכום ישר, ניתן להגדיר אופרטור הטלה על מרחב, שלוקח את הרכיב של הווקטור ששייך למרחב.</p>"}, {"question": "<p>מה ההגדרה של אופרטור הטלה אורתוגונאלי?</p>", "answer": "<p>יהי $V$ מרחב ווקטורי ו- $W\\leq V$ תת מרחב וקטורי עם בסיס $\\ket{1},\\dots \\ket{n}{}$. \nנגדיר אופרטור $\\Pi_{n}= \\ket{n}\\bra{n}$ אופרטור מעל המרחב $W$.</p>"}, {"question": "<p>מה ההגדרה של מרחב הניצב?</p>", "answer": "<p>עבור תת מרחב ווקטור $V$ קיים מרחב מאונך $V^\\perp$ אשר כל ווקטור ב-$V$ באונך לכל ווקטור ב-$V^\\perp$. מרחבים אלו נמצאים בסכום ישר.</p>"}, {"question": "<p>מה ההגדרה של אקספוננט של מטריצה?</p>", "answer": "<p>$$e^{X}=\\sum_{k=0}^{\\infty}{\\frac{1}{k!}}X^{k}$$</p>"}, {"question": "<p>מה ההגדרה של טור טיילור של אופרטור?</p>", "answer": "<p>ניתן לכתוב פונקציה $F\\left( \\hat{A} \\right)$ על ידי טור טיילור:\n$$F({\\hat{A}})=\\sum_{n=0}^{\\infty}{\\frac{F^{(n)}(0)}{n!}}{\\hat{A}}^{n}$$</p>"}], "סימטרייה": [{"question": "<p>מה ההגדרה של ווריאציה?</p>", "answer": "<p>$$\\delta S=S\\left( x+\\varepsilon \\eta \\right)-S(x)$$</p>"}, {"question": "<p>מה אומר משפט נטר?</p>", "answer": "<p>קיום של סימטרייה רציפה גורר חוק שימור.</p>"}, {"question": "<p>מה ההגדרה של חבורה?</p>", "answer": "<p>קבוצה $A$ עם פעולה $\\cdot:A\\times A\\to A$  אשר מקיימת:</p>\n<ol>\n<li>\n<p>קיום איבר זהות $1$ אשר מקיים: \n$$\\forall a \\in A\\quad a \\cdot 1 = 1 \\cdot a = 1$$</p>\n</li>\n<li>\n<p>לכל איבר $a \\in A$ קיים $a^{-1} \\in A$ כך ש: \n$$a \\cdot a^{-1} = a ^{-1} \\cdot a = 1$$</p>\n</li>\n<li>\n<p>אסוצייטיביות. </p>\n</li>\n</ol>"}, {"question": "<p>מה ההגדרה של חבורה אבלית?</p>", "answer": "<p>חבורה אשר קומוטטיבית.</p>"}, {"question": "<p>מה ההגדרה של הצגה של חוברה?</p>", "answer": "<p>יהי $G$ חבורה, ו-$V$ מרחב ווקטורי. הומומורפיזם $\\rho:G\\to GL(V)$ כאשר $GL(V)$ מייצג את החבורת אוטומורפיזמים של $V$(כלומר כל העתקות הלינארית ההפיכות על $V$) נקראת הצגה של החבורה $G$.</p>"}, {"question": "<p>מה ההגדרה של מימד של הצגה?</p>", "answer": "<p>עבור הצגה $R:G\\to GL_{n}\\left( \\mathbb{F}  \\right)$ המימד של ההצגה יהיה $n$. כלומר זה יהיה גודל המטריצות שבתמונה.</p>"}, {"question": "<p>מה ההגדרה של תת יצוג?</p>", "answer": "<p>יהי $R$ ייצוג על מרחב ווקטורי $V$. תת מרחב $U\\subset V$ אשר אינווריאנטי תחת כל אופרטור $R(g)$ כאשר $g\\in G$ יקרא תת ייצוג.</p>"}, {"question": "<p>מה ההגדרה של הצגה בלתי פריקה?</p>", "answer": "<p>זוהי תהיה הצגה שהתת ייצוג היחיד שלה יהיה התת יצוג הטריוויאלי והיצוג עצמו.</p>"}, {"question": "<p>מה ההגדרה של הצגה אוניטרית?</p>", "answer": "<p>הצגה $T$ שעבורה לכל $g \\in G$ נקבל $T(g)$ אוניטרית.</p>"}, {"question": "<p>מה אומר משפט האורתוגונאליות?</p>", "answer": "<p>יהי $T:G\\to GL(V)$ ו-$S:G\\to GL(V)$ הצגות בלתי פריקות של חבורה סופית $G$. נסמן ב-$T(g)_{ij}$ וב-$S(g)_{ij}$ את אלמנטי המטריצה של המטריצות המתאימות. אזי:</p>\n<ol>\n<li>\n<p>אם $S$ ו-$G$ הם לא שקולות: \n$$\\sum_{g\\in G}T^{\\dagger}(g)_{i j}S(g)_{k l}=0.$$</p>\n</li>\n<li>\n<p>אם $S$ ו-$G$ שקולות נסמן את מימד ההצגה ב-$d$ ונקבל: \n$$\\sum_{g\\in G}T^{\\dagger}(g)_{i j}T(g)_{k l}=\\frac{|G|}{d}\\delta_{i l}\\delta_{j k},$$</p>\n</li>\n</ol>"}, {"question": "<p>מה ההגדרה של סימטריה?</p>", "answer": "<p>אוטומורפיזם(טרנספורמציה המשמרת מבנה של המרחב ווקטורי) על המרחב אשר אינו משנה את חוקי הפיזיקה.</p>"}, {"question": "<p>מה אומר משפט ווגנר?</p>", "answer": "<p>אם טרנספורמציה $U$ היא טרנספורמציה סימטרית אז מתקיים אחד התנאים הבאים:</p>\n<ol>\n<li>\n<p>האופרטור $U$ יהיה אופרטור לינארי ואוניטרי: \n$$\\ket{\\psi} \\mapsto \\ket{\\psi'} =U\\ket{\\psi} \\qquad U^{\\dagger} U = Id $$</p>\n</li>\n<li>\n<p>האופרטור $U$ יהיה אופרטור אנטי אוניטרי ואנטי לינארי: \n$$\\ket{\\psi} \\mapsto \\ket{\\psi'} =U\\ket{\\psi} \\qquad \\braket{ U\\phi | U\\psi } =\\braket{ \\psi | \\phi } $$</p>\n</li>\n</ol>"}, {"question": "<p>מה ההגדרה של סימטרייה רציפה?</p>", "answer": "<p>סימטריה הניתנת להצגה על ידי אופרטור אוניטרי וקשורה ליחידה על ידי משתנה רציף. כלומר פונקציה רציפה $U_{\\varepsilon}$ אשר מקיימת $U_{\\varepsilon=0}=\\mathrm{Id}$.</p>"}, {"question": "<p>מה ההגדרה של יוצר של טרנספורמציה רציפה?</p>", "answer": "<p>אופרטור $T$ כך ש:\n$$U_{\\varepsilon}=e^{ i\\varepsilon T }$$\nכלומר זהו אופרטור אשר יוצר את החבורה של הסימטרייה.</p>"}], "הגדרות - ספין": [{"question": "<p>מה ההגדרה של בסיס לא מצומד - uncoupled basis?</p>", "answer": "<p>יהי $J_{1},J_{2}$ אופרטורי תנע זוויתי כך ש-$J_{1}\\otimes \\mathbb{1} +\\mathbb{1} \\otimes J_{2}\\equiv J_{3}$. הבסיס הלא מצומד של $J_{3}$ יהיה:\n$$\\left\\{  \\ket{j_{1},m_{1}} \\otimes \\ket{j_{2},m_{2}}   \\right\\}\\equiv \\left\\{  \\ket{j_{1}j_{2};m_{1}m_{2}}   \\right\\}$$\nכאשר $\\ket{j_{1},m_{1}}$ ו-$\\ket{j_{2},m_{2}}$ הם המצבים העצמים של $J_{1}^{2}$ ו-$J_{2}^{2}$ בהתאמה. לעיתים נקרא \"בסיס המכפלה\".</p>"}, {"question": "<p>מה ההגדרה של בסיס מצומד - coupled basis?</p>", "answer": "<p>יהי $J_{1},J_{2}$ אופרטורי תנע זוויתי כך ש-$J_{1}\\otimes \\mathbb{1} +\\mathbb{1} \\otimes J_{2}\\equiv J_{3}$. הבסיס המצומד של $J_{3}$ יהיה:\n$$\\left\\{  \\ket{JM}   \\right\\}$$\nכאשר הרבה פעמים כותבים:\n$$\\left\\{  \\ket{j_{1},j_{2};JM}   \\right\\}$$\nכדי שיהיה אפשר לעבור בצורה הפיכה בין הבסיס הלא מצומד לבסיס המצומד.</p>"}, {"question": "<p>מה ההגדרה של מקדמי קלבש גורדון?</p>", "answer": "<p>המקדמים של המעבר בסיס בין הבסיס המצומד לבסיס הלא מצומד. כלומר:\n$$\\langle j_{1}j_{2};m_{1}m_{2}|j_{1}j_{2}j m\\rangle$$\nכאשר כיוון שאנחנו מגדירים אותם כך שממשיים מתקיים:\n$$\\langle j_{1}j_{2};m_{1}m_{2}|j_{1}j_{2}j m\\rangle=\\langle j_{1}j_{2}j m|j_{1}j_{2};m_{1}m_{2}\\rangle$$</p>"}, {"question": "<p>מה ההגדרה של אופרטור סקלארי?</p>", "answer": "<p>אופרטור שלא משתנה תחת סיבובים. זה שקול ללהגיד כי האופרטור $V$  מתחלף עם התנע הזוויתי $[L_{i},V]=0$.</p>"}, {"question": "<p>מה ההגדרה של אופרטורים ווקטורים?</p>", "answer": "<p>קבוצה של שלושה אופרטורים $V_{1},V_{2},V_{3}$ אשר מקיימות:\n$$T(R)V_{i}T^{\\dagger}(R)=\\sum_{j=1}^{3}R_{j i}V_{j}$$\nנקראות שלושת אופרטורי ווקטורים, כאשר $T(R)=\\exp\\left( -i\\sum_{i=1}^{3}\\frac{\\beta_{i}J_{i}}{\\hbar} \\right)$ זה הייצוג האונטירי של אופרטור הסיבוב. כלומר זהו אופרטור שתחת סיבובים מתנהגים באותו דרך כמו ווקטור מיקום.</p>"}, {"question": "<p>מה ההגדרה של טנזורים קרטזים?</p>", "answer": "<p>זוהי הכללה של אופרטורים ווקטורים. טנזור מסדר $n$ יהיה אובייקט עם $n$ אינדקסים אשר עובר טרנספורמציית סיבוב בצורה הבאה:\n$$T_{ij \\dots n}\\mapsto R_{ii'}R_{jj'} \\dots R_{nn'} T_{i' j' \\dots n'}$$\nכאשר $R$ הם טרנספורמציית סיבוב.</p>"}, {"question": "<p>מה ההגדרה של אופרטורים ספרים?</p>", "answer": "<p>אופרטור $T_{q}^{(k)}$ אשר עוברים טרנספורמציה תחת סיבוב בצורה הבאה:\n$$T(R)T_{q}^{(k)}T^{\\dagger}(R) =\\sum_{q'=-k}^{k}D^{(k)}_{qq'}(R)T_{q'}^{(k)}$$\nכאשר $T(R)$ זה ההצגה האוניטרית של אופרטור הסיבוב $R$ ו-$D_{q'q}^{(k)}$ אלמנטי מטריצת ווגינר. זהו למעשה אוסף של $2k+1$ אופרטורים.</p>"}, {"question": "<p>מה אומר משפט ווגנר-אקרט?</p>", "answer": "<p>יהי $T_{q}^{(k)}$ טנזור ספרי. אלמנטי המטריצה של הטנזור ביחס לבסיס התנע יקיים:\n$$\\langle\\alpha^{\\prime},j^{\\prime}m^{\\prime}|T_{q}^{(k)}|\\alpha,j m\\rangle=\\langle j k;m q|j k;j^{\\prime}m^{\\prime}\\rangle\\frac{\\langle\\alpha^{\\prime},j^{\\prime}||T^{(k)}||\\alpha,j\\rangle}{\\sqrt{2j+1}}$$\nכאשר הרכיב $\\langle\\alpha^{\\prime},j^{\\prime}||T^{(k)}||\\alpha,j\\rangle$ נקרא אלמנטי המטריצה המצומצמת וזה סימון שמדגיש את זה שלא תלוי ביתר הגורמים($m,m',q$).</p>"}, {"question": "<p>מה ההגדרה של סימון 3j?</p>", "answer": "<p>$$\\begin{pmatrix}j_{1} &amp; j_{2} &amp; J \\\\m_{1} &amp; m_{2} &amp; M  \\end{pmatrix}= \\frac{(-1)^{j_{1}-j_{2}-m_{2}}}{\\sqrt{ 2J+1 }}\\left\\langle  j_{1}m_{1}j_{2}m_{2}\\mid J,-M  \\right\\rangle \\in \\mathbb{R}$$</p>"}], "הגדרות ריבוי דרגות חופש": [{"question": "<p>מה ההגדרה של מיקום בשלוש מימדים?</p>", "answer": "<p>$$\\left|\\vec{r}\\right\\rangle=\\left|x,y,z\\right\\rangle=\\left|x\\right\\rangle\\otimes\\left|y\\right\\rangle\\otimes\\left|z\\right\\rangle$$</p>"}, {"question": "<p>מה ההגדרה של תנע בשלוש מימדים?</p>", "answer": "<p>$$|{\\textbf{p}}\\rangle=|p_{x},p_{y},p_{z}\\rangle=|p_{x}\\rangle\\otimes|p_{y}\\rangle\\otimes|p_{z}\\rangle$$</p>"}, {"question": "<p>מה ההגדרה של פונקציית גל תלת מימדית?</p>", "answer": "<p>$$\\psi\\left(\\vec{r}\\right)=\\left\\langle \\vec{r}|\\psi \\right\\rangle  \\qquad \\psi\\left( \\vec{p} \\right)=\\left\\langle  \\vec{p}|\\psi  \\right\\rangle $$</p>"}, {"question": "<p>מה ההגדרה של אופרטור הצפיפות הסתברות והזרם הסתברות בתלת מימד?</p>", "answer": "<p>$$P=-i\\hbar \\bar{\\nabla} \\qquad j\\left( \\vec{r},t \\right)={\\frac{\\hbar}{2i m}}\\left(\\overline{{{\\psi}}}\\nabla\\psi-\\psi\\nabla\\overline{{{\\psi}}}\\right)={\\frac{\\hbar}{m}}\\mathrm{Im}\\left(\\overline{{{\\psi}}}\\nabla\\psi\\right)$$</p>"}, {"question": "<p>מה ההגדרה של מכפלה טנזורית של מרחבי הילברט?</p>", "answer": "<p>מרחבי הילברט $\\mathcal{H}_{A},\\mathcal{H}_{B}$ בלתי תלויות, ניתן להגדר מרחב חדש $\\mathcal{H}=\\mathcal{H}_{A}\\times \\mathcal{H}_{B}$ כאשר מימד המרחב החדש יהיה כפל מרחבי הילברט.</p>"}, {"question": "<p>מה ההגדרה של מצב מכפלה?</p>", "answer": "<p>אם $\\ket{\\psi}_{A}\\in \\mathcal{H}_{A}$ ו-$\\ket{\\psi}_{B}\\in \\mathcal{H}_{B}$ נגדיר את המצב מכפלה שלהם בתור האיבר\n$$\\ket{\\psi} _{A}\\otimes \\ket{\\psi} _{B} \\in \\mathcal{H}_{A}\\times \\mathcal{H}_{B}$$\nכאשר הפעולה שמחברת ביניהם נקראת המכפלה הטנזורית בין המצבים</p>"}, {"question": "<p>מה ההגדרה של מכפלה פנימית של מצבי מכפלה?</p>", "answer": "<p>נגדיר:\n$$\\left(\\left\\langle\\psi^{\\prime}\\right|_{A}\\otimes\\left\\langle\\phi^{\\prime}\\right|_{B}\\right)\\left(\\left|\\psi\\right\\rangle_{A}\\otimes\\left|\\phi\\right\\rangle_{B}\\right)=\\left\\langle\\psi^{\\prime}|\\psi\\right\\rangle\\left\\langle\\phi^{\\prime}|\\phi\\right\\rangle$$</p>"}, {"question": "<p>מה אומר משפט היסוד החמישי?</p>", "answer": "<p>מרחב הילברט של מערכת קוונטית המוכבת שתי מערכות $A,B$ בעלות מרחב הילברט $\\mathcal{H}_{A},\\mathcal{H}_{B}$ בהתאמה נתון ע\"י מרחב המכפלה הטנזורי $\\mathcal{H}=\\mathcal{H}_{A}\\times \\mathcal{H}_{B}$.</p>"}, {"question": "<p>מה ההגדרה של מכפלה טנזורית של אופרטור?</p>", "answer": "<p>יהי $O_{A}$ אופרטור שפועל על $\\mathcal{H}_{A}$ ויהי $O_{B}$ אופרטור שפועל על $\\mathcal{H}_{B}$. נגדיר $O=O_{A}\\otimes O_{B}$ בתור האופרטור שפועל על מרחב המכפלה $\\mathcal{H}=\\mathcal{H}_{A}\\times \\mathcal{H}_{B}$ בצורה הבאה:\n$$\\left({ O}_{A}\\otimes{ O}_{B}\\right)\\left(\\left|\\psi\\right\\rangle_{A}\\otimes\\left|\\phi\\right\\rangle_{B}\\right)=\\left({\\cal O}_{A}\\left|\\psi\\right\\rangle_{A}\\right)\\otimes\\left({\\cal O}_{B}\\left|\\phi\\right\\rangle_{B}\\right)$$\nכלומר מצב כללי המוגדר ע\"י $\\left|\\Psi\\right\\rangle=\\sum_{i=1}^{d_{A}}\\sum_{j=1}^{d_{B}}\\Psi_{i j}\\left|e_{i}\\right\\rangle_{A}\\otimes\\left|f_{j}\\right\\rangle_{B}$ מקיים:\n$${ O}\\left|\\Psi\\right\\rangle=\\sum_{i=1}^{d_{A}}\\sum_{j=1}^{d_{B}}\\Psi_{i j}\\left({ O}_{A}\\left|e_{i}\\right\\rangle_{A}\\right)\\otimes\\left({ O}_{B}\\left|f_{j}\\right\\rangle_{B}\\right)$$</p>"}, {"question": "<p>מה ההגדרה של צבר של מצבים קוונטים?</p>", "answer": "<p>מערכת שבה יש לנו אוסף של מצבים קוונטים כאשר יש לנו הסתברות(קלאסית) שונה להיות בכל מצב קוונטי.</p>"}, {"question": "<p>מה ההגדרה של אופרטור הצפיפות?</p>", "answer": "<p>עבור צבר של מצבים קוונטים $\\left\\{  \\ket{\\psi_{\\mu}}  \\right\\}$ כאשר ההסתברות להיות במצב קוונטי $\\ket{\\psi_{\\mu}}$ יהיה $p_{\\mu}$ נגדיר את מטריצת הצפיפות להיות:\n$$\\rho=\\sum_{\\mu=1}^{N}p_{\\mu}\\left|\\psi_{\\mu}\\right\\rangle\\left\\langle\\psi_{\\mu}\\right|$$</p>"}, {"question": "<p>מה ההגדרה של עקבה של אופרטור?</p>", "answer": "<p>נגדיר את העקבה של אופרטור בצורה הבאה:\n$${\\mathrm{Tr}}\\left[Q\\right]=\\sum_{n}\\left\\langle n\\right|Q\\left|n\\right\\rangle$$\nכאשר נשים לב כי כאשר האופרטור הוא אופרטור שנוצר ממכפלה טנזורית העקבה תחזיר אופרטור.</p>"}, {"question": "<p>מה ההגדרה של עקבה חלקית ומטריצת צפיפות מצומצמת?</p>", "answer": "<p>יהי $\\mathcal{H}_{A},\\mathcal{H}_{B}$ מרחבי הילברט בלתי תלויים עם מימדים $d_{A},d_{B}$ ואיברי בסיס $\\{\\left|e_{i}\\right\\rangle_{A}\\}_{i=1}^{d_{A}},\\left\\{\\left|f_{j}\\right\\rangle_{B}\\right\\}_{j=1}^{d_{B}}$ כך ש-$\\mathcal{H}=\\mathcal{H}_{A}\\times \\mathcal{H}_{B}$. \n$$\\rho_{A}=\\sum_{j}\\left\\langle f_{j}\\right|_{B}\\rho\\left|f_{j}\\right\\rangle_{B}\\equiv\\mathrm{Tr}_{B}\\left[\\rho\\right]$$</p>"}, {"question": "<p>מה ההגדרה של מצב טהור?</p>", "answer": "<p>כאשר בצבר שלנו כל האובייקטים עם מצב קוונטי יחיד $\\ket{\\psi}$. במקרה זה ניתן לכתוב $\\rho=\\ket{\\psi}\\bra{\\psi}$.</p>"}, {"question": "<p>מה ההגדרה של מצב מכפלה?</p>", "answer": "<p>יהיו $\\mathcal{H}_{A},\\mathcal{H}_{B}$ מרחבים הילברט. מצב $\\ket{\\Psi}\\in \\mathcal{H}_{A}\\times \\mathcal{H}_{B}$ נקרא מצב מכפלה אם קיימים $\\ket{\\psi}_{A}\\in A,\\ket{\\psi}_{B}\\in B$ כך שמתקיים:\n$$\\ket{\\Psi} =\\ket{\\psi} _{A}\\otimes \\ket{\\psi} _{B}$$</p>"}, {"question": "<p>מה ההגדרה של מצב שזור?</p>", "answer": "<p>מצב שאינו מצב מכפלה. כלומר עבור $\\mathcal{H}_{A},\\mathcal{H}_{B}$ מרחבי הילברט. מצב $\\ket{\\Psi}\\in \\mathcal{H}_{A}\\times \\mathcal{H}_{B}$ נקרא מצב שזור אם לא קיימים $\\ket{\\psi}_{A}\\in A,\\ket{\\psi}_{B}\\in B$ כך שמתקיים:\n$$\\ket{\\Psi} =\\ket{\\psi} _{A}\\otimes \\ket{\\psi} _{B}$$</p>"}, {"question": "<p>מה ההגדרה של שזירה?</p>", "answer": "<p>שזירה בין שתי מערכות אומרת לנו עד כמה אי ידיעת מצבה של מערכת אחת מונעת מאיתנו לדעת את מצבה של השנייה.</p>"}, {"question": "<p>מה ההגדרה של אנטרופיית שאנון?</p>", "answer": "<p>דרך לכמת את כמות האי ידיעה במערכת. אם הסתבריות נתונות ע\"י $\\{ p_{i} \\}$ אנטרופיית שאנון מוגדרת:\n$$S=-\\sum_{i}p_{i}\\ln p_{i}$$</p>"}], "יסודות הפיסיקה הקוונטית": [{"question": "<p>מהם חמשת האקסיומות של מערכות סגורות קוונטיות?</p>", "answer": "<ol>\n<li>\n<p>מצב קוונטי הוא ווקטור מנורמל במרחב הילברט. </p>\n</li>\n<li>\n<p>גדלים פיזיקלים מיוצגים ע\"י אופרטורים לינארים הרמיטים. </p>\n</li>\n<li>\n<p>לאחר מדידה, הגודל הפיזיקלי קורס לאחד המצבים העצמיים שלו בצורה לא דיטרמניסטית ולא הפיכה, כאשר ההסתברות להיות במצב עצמי כלשהו נקבע ע\"י כלל בורן. </p>\n</li>\n<li>\n<p>מערכת מתקדמת בזמן לפי משוואת שרדינגר. </p>\n</li>\n<li>\n<p>מרחב הילברט של מערכת קוונטית המוכבת שתי מערכות $A,B$ בעלות מרחב הילברט $\\mathcal{H}_{A},\\mathcal{H}_{B}$ בהתאמה נתון ע\"י מרחב המכפלה הטנזורי $\\mathcal{H}=\\mathcal{H}_{A}\\times \\mathcal{H}_{B}$. </p>\n</li>\n</ol>"}, {"question": "<p>מהו אופרטור הקידום בזמן? איך מגיעים ממנו למשוואת שרדינגר?</p>", "answer": "<p>זהו אופרטור אוניטרי אשר מבצע קידום בזמן. מוגדר על ידי:\n$$U\\left(t-t_{0}\\right)=e^{-i H\\left(t-t_{0}\\right)/\\hbar}$$\nאם נגזור את שתי האגפים לפי זמן נקבל:\n$$\\frac{\\partial}{\\partial t}\\left|\\psi\\left(t\\right)\\right\\rangle=-\\frac{i H}{\\hbar}e^{-i H\\left(t-t_{0}\\right)/\\hbar}\\left|\\psi\\left(t_{0}\\right)\\right\\rangle=-\\frac{i H}{\\hbar}\\left|\\psi\\left(t\\right)\\right\\rangle$$</p>"}, {"question": "<p>איך מוגדר אי הוודואות של אופרטור? מה עקרון אי הוודאות ומשפט אהרנפסט אומרים על האי וודואות?</p>", "answer": "<p>אי הוודאות יהיה למעשה הסטיית תקן, ומוגדר על ידי:\n$$\\triangle A = \\sqrt{\\left\\langle\\psi\\right|\\left(A-\\left\\langle A\\right\\rangle\\right)^{2}\\left|\\psi\\right\\rangle}=\\sqrt{ \\langle A^{2} \\rangle-\\langle A \\rangle ^{2}  }$$\nעקרון אי הוודאות מתייחס למכפלה של אי וודואיות של שתי אופרטורים ואומר כי:\n$$\\triangle A \\triangle B \\geq \\frac{1}{2}\\left\\lvert  \\langle [A,B] \\rangle   \\right\\rvert$$\nכלומר יש חסם תחתון על מכפלה של האי הוודואות אשר תלוי ביחסי חילוף ביניהם.\nמשפט אהרנפסט מתייחס לאיך שהאי וודואות משתנה בזמן ואומר כי:\n$$\\frac{d\\left&lt;Q\\right&gt;}{d t}=\\frac{i}{\\hbar}\\left&lt;[H,Q]\\right&gt;+\\left&lt;\\frac{\\partial Q}{\\partial t}\\right&gt;$$</p>"}, {"question": "<p>איך ניתן להציג מצב תנע בבסיס המיקום? איך זה קשור להתמרת פורייה?</p>", "answer": "<p>מתקיים:\n$$\\langle x|p\\rangle=\\frac{1}{\\sqrt{2\\pi\\hbar}}e^{i p x/\\hbar}$$\nכאשר אם נרצה לקבל את הפונקציית גל בבסיס המיקום נדרש לבצע אינטגרל על ערך זה:\n$$\\psi(x)=\\langle x|\\psi\\rangle=\\int\\!\\!d p\\;\\langle x|p\\rangle\\langle p|\\psi\\rangle=\\int\\!\\!d p\\;{\\frac{e^{i x p/\\hbar}\\tilde{\\psi}(p)}{\\sqrt{2\\pi\\hbar}}}$$\nכאשר זה בדיוק התמרת פורייה עבור המשתנה $k=\\frac{p}{\\hbar}$.</p>"}, {"question": "<p>מהם החוקים לביצוע קוונטיזציה של מערכת קלאסית למערכת קוונטית בעזרת הקוונטיזציה הקנונית הראשונה</p>", "answer": "<ol>\n<li>\n<p>מיקום $x$ יהפוך לאופרטור $X$. </p>\n</li>\n<li>\n<p>התנע $p$ יהפוך לאופרטור $P$. </p>\n</li>\n<li>\n<p>האופרטורים אינם חילופיים, ומקיימים את יחס החילוף $[X,P]=i\\hbar$. </p>\n</li>\n<li>\n<p>כל פונקציה שלהם תהפוך לפונקציה של האופרטור, כולל ההמילטוניאן $H$, כאשר אם מקבלים אופרטור לא הרמיטי, מבצעים סימטריזציה באמצעות האנטי קומוטטור. </p>\n</li>\n</ol>"}, {"question": "", "answer": ""}], "הגדרות - פתרונות מיחדות של שרדינגר": [{"question": "<p>מה ההגדרה של פוטנציאל הרמוני?</p>", "answer": "<p>פוטנציאל מהצורה:\n$$V(x)={\\frac{1}{2}}m\\omega^{2}X^{2}$$</p>"}, {"question": "<p>מה ההגדרה של אוסצילטור הרמוני קוונטי?</p>", "answer": "<p>מערכת שבה יש פוטנציאל הרמוני, כלומר מערכת שההמילטוניאן שלה יהיה:\n$$H={\\frac{p^{2}}{2m}}+{\\frac{m\\omega^{2}x^{2}}{2}}$$</p>"}, {"question": "<p>מה ההגדרה של אופרטורי העלה והורדה?</p>", "answer": "<p>$$a=\\left( \\hat{X}+i\\hat{P} \\right)=\\sqrt{\\frac{m\\omega}{2\\hbar}}\\left(x+\\frac{i p}{m\\omega}\\right)\\quad a^{\\dagger}=\\left( \\hat{X}-i\\hat{P} \\right)=\\sqrt{\\frac{m\\omega}{2\\hbar}}\\left(x-\\frac{i p}{m\\omega}\\right)$$\nלעיתים אופרטור הורדה $a$ נקרא אופרטור השמדה ואופרטור העלה $a^{\\dagger}$ נקרא אופרטור יצירה.</p>"}, {"question": "<p>מה ההגדרה של אופרטור המספר?</p>", "answer": "<p>$$N=a^{\\dagger}a=\\left(\\frac{m\\omega}{2\\hbar}\\right)\\left(x^{2}+\\frac{p^{2}}{m^{2}\\omega^{2}}\\right)+\\left(\\frac{i}{2\\hbar}\\right)[x,p]=\\frac{H}{\\hbar \\omega}-\\frac{1}{2}$$</p>"}, {"question": "<p>מה ההגדרה של מצב קוהרנטי?</p>", "answer": "<p>זהו מצב קוונטי $\\ket{\\alpha}$ שמוגדר בתור המצב עצמי הייחודי של אופרטור ההשמדה $a$. נשים לב כי כיוון ש-$a$ לא הרמיטי, המצב הקוהרנטי ולא בהכרח ממשי, וקיים לו אמפליטודה ופאזה מרוכבת.</p>"}, {"question": "<p>מה ההגדרה של חלקיק חופשי?</p>", "answer": "<p>חלקיק שבו הפוטנציאל הוא אפס. כלומר ההמילטוניאן מקיים:\n$$\\mathcal{H}= \\frac{P^{2}}{2m}$$</p>"}, {"question": "<p>מה ההגדרה של פוטנציאל דלתא?</p>", "answer": "<p>עבור קבוע ממשי $\\alpha$ פוטנציאל דלתא יהיה פוטנציאל מהצורה:\n$$V(x)=-\\alpha \\delta(x)$$\nולכן משוואת שרדינגר תהיה\n$$-\\;\\frac{\\hbar^{2}}{2m}\\frac{d^{2}\\psi}{d x^{2}}-\\alpha\\delta(x)\\;\\psi=E\\psi$$</p>"}, {"question": "<p>מה ההגדרה של פוטנציאל מדרגה?</p>", "answer": "<p>פוטנציאל מהצורה:\n$$V(x)=\\left\\{{0\\quad x\\leq0}\\atop{U\\quad x&gt;0}\\right.$$\nכאשר $U&gt;0$ זה קבוע.</p>"}, {"question": "<p>מה ההגדרה של נרמול?</p>", "answer": "<p>אנו דורשים שסך ההסתברות שחלקיק נמצא איפשהו יהיה 1:\n$$\\int_{-\\infty}^{+\\infty}|\\Psi(x,t)|^{2}\\;d x=1$$</p>"}, {"question": "<p>מה ההגדרה של מצב קשור?</p>", "answer": "<p>כאשר האנרגיה של החלקיק קטן מהפוטנציאל באיסוף, כלומר כאשר $E&lt;V\\left( -\\infty \\right),V\\left( \\infty \\right)$. במצב זה החלקיק תקוע בתוך איזור ולא יכול להתפזר לאינסוף.</p>"}, {"question": "<p>מה ההגדרה של מצב חופשי/מצב פיזור?</p>", "answer": "<p>כאשר האנרגיה של החלקיק גדולה מהוטנציאל באינסוף, כלומר $E&gt;V\\left( -\\infty \\right),V\\left( \\infty \\right)$. במקרה זה נקבל כי תמיד קיים הסתברות שהחלקיק יברח לאינסוף.</p>"}, {"question": "<p>מה ההגדרה של צפיפות הסתברות?</p>", "answer": "<p>נסמן את צפיפות ההסתברות ב-$x$ בזמן $t$ ע\"י:\n$$\\rho\\left(x,t\\right)\\equiv\\left|\\psi\\left(x,t\\right)\\right|^{2}$$</p>"}, {"question": "<p>מה ההגדרה של זרם הסתברות?</p>", "answer": "<p>$$j\\left(x\\right)=\\frac\\hbar{2i m}\\left(\\overline{{{\\psi}}}\\frac{\\partial\\psi}{\\partial x}-\\psi\\frac{\\partial\\overline{{{\\psi}}}}{\\partial x}\\right)=\\frac\\hbar m\\mathrm{Im}\\left(\\overline{{{\\psi}}}\\frac{\\partial\\psi}{\\partial x}\\right)$$</p>"}, {"question": "<p>מה ההגדרה של בור בפוטנציאל אינסופי?</p>", "answer": "<p>מערכת עם פוטנציאל מהצורה:\n$$V(x)=\\left\\{{\\begin{array}{l l}{{0}}&amp;{{{0\\leq x\\leq a}}}\\\\ {{\\infty,}}&amp;{{\\mathrm{otherwise}}}\\end{array}}\\right.$$</p>"}, {"question": "<p>מה ההגדרה של בור בפוטנציאל סופי?</p>", "answer": "<p>מערכת עם פוטנציאל מהצורה:\n$$V(x)=\\left\\{\\begin{array}{l l}{{-V_{0},}}&amp;{{-a\\le x\\le a,}}\\\\ {{0,}}&amp;{{\\vert x\\vert&gt;a,}}\\end{array}\\right.$$\nכאשר $V_{0}$ קבוע חיובי.</p>"}], "הגדרות - יסודות הקוונטים": [{"question": "<p>מה ההגדרה של המילטוניאן?</p>", "answer": "<p>נקרא לאופרטור של האנרגיה ההמילטוניאן, ונסמנו ב-$H$.</p>"}, {"question": "<p>מה ההגדרה של תמונת הייזנברג?</p>", "answer": "<p>האופרטורים משתנים בזמן והמצבים קוונטים קבועים בזמן.</p>"}, {"question": "<p>מה ההגדרה של תמונת שרדינגר?</p>", "answer": "<p>האופרטורים קבועים בזמן והמצבים הקוונטים משתנים בזמן.</p>"}, {"question": "<p>מה ההגדרה של גודל פיזיקלי?</p>", "answer": "<p>נקרא לגדלים כמו, תנע מהירות, מיקום, אנרגיה וספין גדלים פיזיקליים.</p>"}, {"question": "<p>מה ההגדרה של מצב קוונטי?</p>", "answer": "<p>מצב קוונטי זה אובייקט מתמטי שמתאר את הידע שלנו על מערכת קוונטית. ממנו ניתן לחלץ את המידע על הגדלים הפיזיקלים בכל רגע של זמן.</p>"}, {"question": "<p>מה אומר משפט אופי המצב הקוונטי?</p>", "answer": "<p>מצב קוונטי הוא ווקטור מנורמל במרחב הילברט.</p>"}, {"question": "<p>מה אומר משפט אופי הגדלים הפיזיקלים?</p>", "answer": "<p>גדלים פיזיקלים הם אופרטורים הרמיטים.</p>"}, {"question": "<p>מה אומר משפט מדידה של גודל פיזיקלי?</p>", "answer": "<p>מדידה של גודל פיזיקלי של מצב קוונטי שקולה להפעלה של אחד מהאופרטורי ההטלה על מצביו העצמיים של הגודל הפיזיקלי.</p>"}, {"question": "<p>מה ההגדרה של אי וודאות של אופרטור?</p>", "answer": "<p>$$\\triangle A = \\sqrt{\\left\\langle\\psi\\right|\\left(A-\\left\\langle A\\right\\rangle\\right)^{2}\\left|\\psi\\right\\rangle}$$</p>"}, {"question": "<p>מה אומר משפט אי הוודאות?</p>", "answer": "<p>$$\\triangle A \\triangle B \\geq \\frac{1}{2}\\left\\lvert  \\langle [A,B] \\rangle   \\right\\rvert $$</p>"}, {"question": "<p>מה אומר משפט מדידה?</p>", "answer": "<p>לאחר מדידה, הגודל הפיזיקלי קורס לאחד המצבים העצמיים שלו בצורה לא דיטרמניסטית ולא הפיכה, כאשר ההסתברות להיות במצב עצמי כלשהו נקבע ע\"י כלל בורן.</p>"}, {"question": "<p>מה ההגדרה של קוונטיזציה קנונית ראשונה?</p>", "answer": "<p>תהליך להעביר משוואות קלאסיות למשוואות גל קוונטיות. מעביר את המשתנים לאופרטורים הרמיטים הבאים:\n$$x\\mapsto \\hat{X}\\quad p\\mapsto \\hat{P}\\quad \\mathcal{H}\\to \\hat{H}\\quad $$</p>"}, {"question": "<p>מה ההגדרה של עקרון ההתאמה?</p>", "answer": "<p>עקרון שקבוע שהקוונטיציה הקוונטית היא הכללה של הפיזיקה הקלאסית, ובקנה מידה גדול נצפה לקבל את המשוואות הקלסיות המוכרות.</p>"}, {"question": "<p>מה ההגדרה של אופרטור המיקום?</p>", "answer": "<p>המיקום הוא גודל מדיד, לכן ניתן לתאר אותו ע\"י אופרטור הרמיטי $X$. כיוון שהערכים האפשריים של $X$ הם רציפים, הע\"ע של האופרטור $X$ הם רציפים.</p>"}, {"question": "<p>מה ההגדרה של אופרטור הזזה?</p>", "answer": "<p>אופרטור $T$ המקיים:\n$$T(a)\\ket{x} = \\ket{x+a}$$</p>"}, {"question": "<p>מה ההגדרה של אופרטור התנע?</p>", "answer": "<p>התנע הוא גודל מדיד לכן ניתן לתאר אותו ע\"י אופרטור אוניטרי $P$.</p>"}, {"question": "<p>מה ההגדרה של אופרטור המיקום?</p>", "answer": "<p>המיקום הוא גודל מדיד, לכן ניתן לתאר אותו ע\"י אופרטור הרמיטי $X$. כיוון שהערכים האפשריים של $X$ הם רציפים, הע\"ע של האופרטור $X$ הם רציפים.</p>"}, {"question": "<p>מה ההגדרה של אופרטור הזזה במיקום?</p>", "answer": "<p>אופרטור $T$ המקיים:\n$$T(a)\\ket{x} = \\ket{x+a}$$</p>"}, {"question": "<p>מה ההגדרה של אופרטור התנע?</p>", "answer": "<p>התנע הוא גודל מדיד לכן ניתן לתאר אותו ע\"י אופרטור הרמיטי $P$.</p>"}]}
          console.log(subjects);
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length){
            location.reload()
            return;
            }
            if (currentQuestionIndex >= currentQuestions.length - 1) {
                document.getElementById('next-question').innerHTML = "לסיים";
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.typesetPromise(["#question"]).then(() => {
  MathJax.typesetPromise(["#answer"]);
});
            document.getElementById('question-counter').innerHTML = "שאלה "+ (currentQuestionIndex + 1) +" מתוך "+ currentQuestions.length;
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
