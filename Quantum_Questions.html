      <script type="text/javascript">
        window.onload = function() {
          const subjects = {"סימטרייה": [{"question": "<p>מהי הצגה של חבורה?</p>", "answer": ""}], "יסודות הפיסיקה הקוונטית": [{"question": "<p>מהם חמשת האקסיומות של מערכות סגורות קוונטיות?</p>", "answer": "<ol>\n<li>\n<p>מצב קוונטי הוא ווקטור מנורמל במרחב הילברט. </p>\n</li>\n<li>\n<p>גדלים פיזיקלים מיוצגים ע\"י אופרטורים לינארים הרמיטים. </p>\n</li>\n<li>\n<p>לאחר מדידה, הגודל הפיזיקלי קורס לאחד המצבים העצמיים שלו בצורה לא דיטרמניסטית ולא הפיכה, כאשר ההסתברות להיות במצב עצמי כלשהו נקבע ע\"י כלל בורן. </p>\n</li>\n<li>\n<p>מערכת מתקדמת בזמן לפי משוואת שרדינגר. </p>\n</li>\n<li>\n<p>מרחב הילברט של מערכת קוונטית המוכבת שתי מערכות $A,B$ בעלות מרחב הילברט $\\mathcal{H}_{A},\\mathcal{H}_{B}$ בהתאמה נתון ע\"י מרחב המכפלה הטנזורי $\\mathcal{H}=\\mathcal{H}_{A}\\times \\mathcal{H}_{B}$. </p>\n</li>\n</ol>"}, {"question": "<p>מהו אופרטור הקידום בזמן? איך מגיעים ממנו למשוואת שרדינגר?</p>", "answer": "<p>זהו אופרטור אוניטרי אשר מבצע קידום בזמן. מוגדר על ידי:\n$$U\\left(t-t_{0}\\right)=e^{-i H\\left(t-t_{0}\\right)/\\hbar}$$\nאם נגזור את שתי האגפים לפי זמן נקבל:\n$$\\frac{\\partial}{\\partial t}\\left|\\psi\\left(t\\right)\\right\\rangle=-\\frac{i H}{\\hbar}e^{-i H\\left(t-t_{0}\\right)/\\hbar}\\left|\\psi\\left(t_{0}\\right)\\right\\rangle=-\\frac{i H}{\\hbar}\\left|\\psi\\left(t\\right)\\right\\rangle$$</p>"}, {"question": "<p>איך מוגדר אי הוודואות של אופרטור? מה עקרון אי הוודאות ומשפט אהרנפסט אומרים על האי וודואות?</p>", "answer": "<p>אי הוודאות יהיה למעשה הסטיית תקן, ומוגדר על ידי:\n$$\\triangle A = \\sqrt{\\left\\langle\\psi\\right|\\left(A-\\left\\langle A\\right\\rangle\\right)^{2}\\left|\\psi\\right\\rangle}=\\sqrt{ \\langle A^{2} \\rangle-\\langle A \\rangle ^{2}  }$$\nעקרון אי הוודאות מתייחס למכפלה של אי וודואיות של שתי אופרטורים ואומר כי:\n$$\\triangle A \\triangle B \\geq \\frac{1}{2}\\left\\lvert  \\langle [A,B] \\rangle   \\right\\rvert$$\nכלומר יש חסם תחתון על מכפלה של האי הוודואות אשר תלוי ביחסי חילוף ביניהם.\nמשפט אהרנפסט מתייחס לאיך שהאי וודואות משתנה בזמן ואומר כי:\n$$\\frac{d\\left&lt;Q\\right&gt;}{d t}=\\frac{i}{\\hbar}\\left&lt;[H,Q]\\right&gt;+\\left&lt;\\frac{\\partial Q}{\\partial t}\\right&gt;$$</p>"}, {"question": "<p>איך ניתן להציג מצב תנע בבסיס המיקום? איך זה קשור להתמרת פורייה?</p>", "answer": "<p>מתקיים:\n$$\\langle x|p\\rangle=\\frac{1}{\\sqrt{2\\pi\\hbar}}e^{i p x/\\hbar}$$\nכאשר אם נרצה לקבל את הפונקציית גל בבסיס המיקום נדרש לבצע אינטגרל על ערך זה:\n$$\\psi(x)=\\langle x|\\psi\\rangle=\\int\\!\\!d p\\;\\langle x|p\\rangle\\langle p|\\psi\\rangle=\\int\\!\\!d p\\;{\\frac{e^{i x p/\\hbar}\\tilde{\\psi}(p)}{\\sqrt{2\\pi\\hbar}}}$$\nכאשר זה בדיוק התמרת פורייה עבור המשתנה $k=\\frac{p}{\\hbar}$.</p>"}, {"question": "<p>מהם החוקים לביצוע קוונטיזציה של מערכת קלאסית למערכת קוונטית בעזרת הקוונטיזציה הקנונית הראשונה</p>", "answer": "<ol>\n<li>\n<p>מיקום $x$ יהפוך לאופרטור $X$. </p>\n</li>\n<li>\n<p>התנע $p$ יהפוך לאופרטור $P$. </p>\n</li>\n<li>\n<p>האופרטורים אינם חילופיים, ומקיימים את יחס החילוף $[X,P]=i\\hbar$. </p>\n</li>\n<li>\n<p>כל פונקציה שלהם תהפוך לפונקציה של האופרטור, כולל ההמילטוניאן $H$, כאשר אם מקבלים אופרטור לא הרמיטי, מבצעים סימטריזציה באמצעות האנטי קומוטטור. </p>\n</li>\n</ol>"}, {"question": "", "answer": ""}]}
          console.log(subjects);
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length){
            location.reload()
            return;
            }
            if (currentQuestionIndex >= currentQuestions.length - 1) {
                document.getElementById('next-question').innerHTML = "לסיים";
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.typesetPromise(["#question"]).then(() => {
  MathJax.typesetPromise(["#answer"]);
});
            document.getElementById('question-counter').innerHTML = "שאלה "+ (currentQuestionIndex + 1) +" מתוך "+ currentQuestions.length;
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
      </script>
