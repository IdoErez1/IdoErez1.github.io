      <script type="text/javascript">
        window.onload = function() {
          const subjects = {"אינטגרליים רב מימדיים": [{"question": "<p>מהי תיבה? איך מגדירים את הנפח שלו ואת הרוחב שלו?</p>", "answer": "<p>תיבה היא קבוצה מהצורה:\n<script type=\"math/tex; mode=display\">A=[a_{1},b_{1}]\\times[a_{2},b_{2}]\\times\\dots\\times[a_{k},b_{k}],<\/script>\nכאשר הנפח שלו מוגדר:\n<script type=\"math/tex; mode=display\">V(A)=\\prod_{i=1}^{k}(b_{i}-a_{i}).<\/script>\nכאשר הרוחב של <script type=\"math/tex\">A<\/script>:\n<script type=\"math/tex; mode=display\">\\max_{1\\leq i\\leq k}(b_{i}-a_{i})<\/script>\n</p>"}, {"question": "<p>מהי חלוקה של תיבה?</p>", "answer": "<p>תהא <script type=\"math/tex\">A=[a_{1},b_{1}]\\times\\dots \\times[a_{k},b_{k}]<\/script> תיבה. חלוקה <script type=\"math/tex\">P<\/script> של <script type=\"math/tex\">A<\/script> היא <script type=\"math/tex\">P=P_{1}\\times P_{2}\\times\\dots \\times P_{k}<\/script>\nכאשר <script type=\"math/tex\">P_{j}<\/script> היא חלוקה של הקטע <script type=\"math/tex\">[a_{j},b_{j}]<\/script>. כלומר:\n<script type=\"math/tex; mode=display\">P_{j}=\\left\\{  t_{j}^0,\\dots,t_{j}^{m_{j}}  \\right\\}<\/script>\nכאשר <script type=\"math/tex; mode=display\">a_{j}=t_{j}^{0}<t_{j}^{1}<\\cdots<t_{j}^{m_{j}}=b_{j}.<\/script> חלוקה כזו משרה חלוקה של התיבה <script type=\"math/tex\">A<\/script> לתיבות:\n<script type=\"math/tex; mode=display\">C_{i_{1},\\dots,i_{k}}=[t_{1}^{i_{1}-1},t_{1}^{i_{1}}]\\times\\cdots\\times[t_{k}^{i_{k}-1},t_{k}^{i_{k}}].<\/script>\nכאשר הנפח המקורי <script type=\"math/tex\">A<\/script> מקיים:\n<script type=\"math/tex; mode=display\">V(A)=\\sum_{i_{1},...,i_{k}}V(C_{i_{1},...,i_{k}}).<\/script>\n</p>"}, {"question": "<p>מהו סכום תחתון? מהו סכום עליון?</p>", "answer": "<div class=\"definition\"> (סכום תחתון)<p>בהנתן פונקציה <script type=\"math/tex\">f<\/script> וחלוקה <script type=\"math/tex\">P=A_{1}\\times\\dots \\times A_{r}<\/script>. נגדיר <script type=\"math/tex\">m_{i}=\\inf_{x \\in A_{i}}f(x)<\/script>. הסכום התחתון של <script type=\"math/tex\">f<\/script> ביחס ל-<script type=\"math/tex\">P<\/script> יהיה:\n<script type=\"math/tex; mode=display\">s(f,P)=\\sum_{i=1}^{r}m_{i}\\,V(A_{i})<\/script>\n\nבהנתן פונקציה <script type=\"math/tex\">f<\/script> וחלוקה <script type=\"math/tex\">P=A_{1}\\times\\dots \\times A_{r}<\/script>. נגדיר <script type=\"math/tex\">M_{i}=\\sup_{x \\in A_{i}}f(x)<\/script>. הסכום התחתון של <script type=\"math/tex\">f<\/script> ביחס ל-<script type=\"math/tex\">P<\/script> יהיה:\n<script type=\"math/tex; mode=display\">S(f,P)=\\sum_{i=1}^{r}M_{i}\\,V(A_{i})<\/script>\n</p>\n</div>"}, {"question": "<p>מהו עידון של חלוקה? מה אנחנו יודעים על היחס של הסכומים העליונים והתחתונים של העידון?</p>", "answer": "<p>חלוקה <script type=\"math/tex\">P'<\/script> המקיימת <script type=\"math/tex\">P\\subseteq P'<\/script> נקראת עידון.\nאם <script type=\"math/tex\">P'<\/script> עידון של חלוקה מתקיים:\n<script type=\"math/tex; mode=display\">s(f,P)\\leq s(f,P^{\\prime})\\leq S\\left(f,P^{\\prime}\\right)\\leq S\\left(f,P\\right).<\/script>\n</p>"}, {"question": "<p>מהו אינטגרל עליון? מהו אינטגרל תחתון?</p>", "answer": "<div class=\"definition\"> (אינטגרל תחתון)<p>\n<script type=\"math/tex; mode=display\">\\underline{\\int}_{A}f(x) \\;\\mathrm{d}x=\\operatorname*{sup}\\left\\{s(f,P):\\,a l l\\,p a r t i t i o n s\\,P\\right\\}.<\/script>\n<script type=\"math/tex; mode=display\">{\\overline{{\\int}_{A}}}f(x)\\,\\mathrm{d} x=\\operatorname*{inf}\\left\\{S(f,P):\\,a l l\\,p a r t i t i o n s\\,P\\right\\}.<\/script>\n</p>\n</div>"}, {"question": "<p>איך מוגדר אינטגרביליות לפי רימן לפונקציות חסומות?</p>", "answer": "<p>פונקציה שהאינטגרל העליון שווה לאינטגרל התחתון נקראת אינטגרבילית רימן, כלומר אם:\n<script type=\"math/tex; mode=display\">\\underline{\\int_{A}} f(x)\\;\\mathrm{d}x=\\overline{\\int}_{A}f(x)\\mathrm{d}x<\/script>\nובמקרה זה נקרא לביטוי זה האינטגרל ונסמן:\n<script type=\"math/tex; mode=display\">\\int_{A}f(x)\\,d x\\quad \\text{או}\\quad\\int_{A}f\\left( x_{1},\\ldots,x_{k} \\right)\\,d x_{1}d x_{2}\\ldots d x_{k}.<\/script>\n</p>"}, {"question": "<p>ציין כמה שיותר דברים שגוררים אינטגרביליות.</p>", "answer": "<ol>\n<li>\n<p>רציפות </p>\n</li>\n<li>\n<p>נקודות האי רציפות בעלות מידה אפס. </p>\n</li>\n</ol>"}, {"question": "<p>איך מוכיחים רציפות גורר אינטגרביליות?</p>", "answer": "<p>כיוון ש-<script type=\"math/tex\">A<\/script> קומפקטית, פונקציה <script type=\"math/tex\">f<\/script> היא חסומה ורציפה במידה שווה ב-<script type=\"math/tex\">A<\/script>.\nיהי <script type=\"math/tex\">\\varepsilon>0<\/script>. מרציפות במידה שווה נקבל <script type=\"math/tex\">\\delta>0<\/script> כך ש:\n<script type=\"math/tex; mode=display\">\\|x-y\\|\\leq\\delta\\implies|f(x)-f(y)|\\leq{\\frac{\\varepsilon}{V(A)}}.<\/script>\nיהי <script type=\"math/tex\">P<\/script> חלוקה של <script type=\"math/tex\">A<\/script> כך שקוטר החלוקה של כל תת תיבא קטן מ-<script type=\"math/tex\">\\delta<\/script>. לכן:\n<script type=\"math/tex; mode=display\">S\\left(f,P\\right)-s(f,P)=\\sum_{i}(M_{i}-m_{i})\\,V(A_{i})\\leq \\sum_{i}\\delta V(A)=\\varepsilon<\/script>\nוכעת נקבל:\n<script type=\"math/tex; mode=display\">{\\overline{{\\int_{A}}}}f\\,d x-\\underline{\\int}_{A}f\\,d x\\leq\\varepsilon<\/script>\nולכן אינטגרבילי.</p>"}, {"question": "<p>מהי קבוצה ממידה אפס?</p>", "answer": "<p>קבוצה <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k<\/script> נקראת ממידה אפס אם לכל <script type=\"math/tex\">\\varepsilon>0<\/script> קיימים אוסף בן מנייה של תיבות <script type=\"math/tex\">(B_{i})_{i\\in\\mathbb{N}}<\/script>  כך ש-<script type=\"math/tex\">A\\subseteq \\bigcup_{i}B_{i}<\/script> ו-<script type=\"math/tex\">\\sum_{i}V(B_{i})<\\varepsilon<\/script>.\nכלומר בצורה פשוטה, ניתן לכסות את הקבוצה ע\"י תיבות, וניתן להקטין את התיבות כך שהנפח יקטן ככל שנרצה.</p>"}, {"question": "<p>מה אומר משפט לבג-ויטאלי על אינטגרביליות ומידה אפס?</p>", "answer": "<p>יהי <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k<\/script> תיבה כך ש-<script type=\"math/tex\">f:A\\to\\mathbb{R}<\/script> פונקציה חסומה. <script type=\"math/tex\">f<\/script> תהיה אינטגרבילית אם\"ם נקודות האי רציפות הם ממידה אפס.\n<strong>הערה</strong>\nזה אומר כי אם קבוצה היא לא ממידה אפס, אז מכילה נקודות רציפות.\nניסוח שקול למשפט לבג:\nעבור <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k<\/script> קבוצה פתוחה, פונקציה <script type=\"math/tex\">f:A\\to\\mathbb{R}<\/script> חסומה היא אינטגרבילית אם\"ם <script type=\"math/tex\">F_{\\frac{1}{n}}<\/script> ממידה אפס לכל <script type=\"math/tex\">n<\/script>.</p>"}, {"question": "<p>מהו נפח של קבוצה? מה זה קבוצה בעלת נפח.</p>", "answer": "<p>הנפח של קבוצה <script type=\"math/tex\">S<\/script> תהיה:\n<script type=\"math/tex; mode=display\">V(S)=\\int_{A}\\!\\chi_{S}(x)\\,d x<\/script>\nכאשר <script type=\"math/tex\">\\chi_{S}(x)<\/script> הפונקציה המציינת - 1 אם <script type=\"math/tex\">x \\in S<\/script> ו-0 אחרת. אם האינטגרל הזה מוגדר הקבוצה נקראת בעלת נפח.</p>"}, {"question": "<p>מהו תנאי שקול ללהיות בעלת נפח? איך מוכיחים אותו?</p>", "answer": "<p>קבוצה <script type=\"math/tex\">A<\/script> בעלת נפח אם\"ם <script type=\"math/tex\">\\partial A<\/script> ממידה אפס.\nנזכור כי <script type=\"math/tex\">1_{A}<\/script> אינטגרבילית אם\"ם קבוצת נקודות האי רציפות הם ממידה אפס. נקודות האי רציפות של <script type=\"math/tex\">1_{A}<\/script> הן בדיוק הערכים שבהן מחליפה בין 0 ל-1, כלומר השפה של <script type=\"math/tex\">A<\/script>. לכן <script type=\"math/tex\">A<\/script> בעלת נפח אם\"ם <script type=\"math/tex\">\\partial A<\/script> ממידה אפס.</p>"}, {"question": "<p>מהי הטענה על גרפים של פונקציה ומידה אפס?</p>", "answer": "<p>תהי <script type=\"math/tex\">S\\subseteq \\mathbb{R}^k<\/script> קבוצה קומפקטית, ו-<script type=\"math/tex\">f\\in C\\left( S;\\mathbb{R} \\right)<\/script>(גזיר ברציפות ב-<script type=\"math/tex\">S<\/script> ורציף ב-<script type=\"math/tex\">\\mathbb{R}<\/script>), אזי הגרף של <script type=\"math/tex\">f<\/script>:\n<script type=\"math/tex; mode=display\">\\left\\{\\left(x,f\\left(x\\right)\\right):x\\in S\\right\\}\\subset\\mathbb{R}^{k+1}<\/script>\nהוא ממידה 0 ב-<script type=\"math/tex\">\\mathbb{R}^{k+1}<\/script>.</p>"}, {"question": "<p>ציין שלושה פונקציות אשר כאשר מקבלות קבוצה ממידה אפס מחזירות קבוצה ממידה אפס.</p>", "answer": "<ol>\n<li>\n<p>תהי <script type=\"math/tex\">f:\\mathbb{R}^k\\to\\mathbb{R}^k<\/script> פונקציה לינארית. אם <script type=\"math/tex\">N\\subseteq \\mathbb{R}^k<\/script> ממידה 0 אזי <script type=\"math/tex\">f(N)<\/script> ממידה אפס. </p>\n</li>\n<li>\n<p>תהי <script type=\"math/tex\">f:\\mathbb{R}^k\\to\\mathbb{R}^k<\/script> פונקציה ליפשיצית. אם <script type=\"math/tex\">N\\subseteq \\mathbb{R}^k<\/script> ממידה אפס, אזי <script type=\"math/tex\">f(N)<\/script> ממידה אפס. </p>\n</li>\n<li>\n<p>תהי <script type=\"math/tex\">f:\\mathbb{R}^k\\to\\mathbb{R}^k<\/script> פונקציה גזירה ברציפות. אם <script type=\"math/tex\">K\\subseteq \\mathbb{R}^n<\/script> קבוצה קומפקטית ממידה אפס, <script type=\"math/tex\">f(K)<\/script> תהיה ממידה אפס. </p>\n</li>\n</ol>"}, {"question": "<p>בהנתן קבוצה <script type=\"math/tex\">A<\/script> מה הקשר בין האינטגרביליות של <script type=\"math/tex\">A^\\circ, \\overline{A},A<\/script>?</p>", "answer": "<p>קבוצה <script type=\"math/tex\">A\\subseteq \\mathbb{R}^n<\/script> בעלת נפח ו-<script type=\"math/tex\">f:\\bar{A}\\to \\mathbb{R}<\/script> חסומה. אזי <script type=\"math/tex\">f<\/script> אינטגרבילית על <script type=\"math/tex\">\\bar{A}<\/script> אם\"ם <script type=\"math/tex\">f<\/script> אינטגרבילית על <script type=\"math/tex\">A<\/script> אם\"ם <script type=\"math/tex\">f<\/script> אינטגרבילית על <script type=\"math/tex\">A^\\circ<\/script> ומתקיים:\n<script type=\"math/tex; mode=display\">\\int_{A^\\circ }f(x)=\\int_{A}f(x)=\\int_{\\bar{A}}f(x)<\/script>\n</p>"}, {"question": "<p>מה אומר משפט פוביני?</p>", "answer": "<p>יהיו <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k,B\\subseteq \\mathbb{R}^m<\/script> תיבות סגורות ו-<script type=\"math/tex\">f:A\\times B\\to\\mathbb{R}<\/script> פונקציה אינטגרבילית. לכל <script type=\"math/tex\">x  \\in A<\/script> ו-<script type=\"math/tex\">y\\in B<\/script> נגדיר:\n<script type=\"math/tex; mode=display\">f_{x}(y)\\equiv f(x,y)\\quad f_{y}(x)\\equiv f(x,y)<\/script>\nאם לכל <script type=\"math/tex\">x \\in A,y \\in B<\/script> האינטגרלים<script type=\"math/tex; mode=display\">\\int_{B}f_{x}(y)d y,\\;\\int_{A}f_{y}(x)d x<\/script>\nקיימים אז:\n<script type=\"math/tex; mode=display\">\\int_{A\\times B}f(x,y)d x d y=\\int_{A}\\left( \\int_{B}f_{x}(y)d y \\right)d x=\\int_{A}\\left( \\int_{B}f_{y}(x)d x \\right)d y<\/script>\n</p>"}, {"question": "<p>זה מאפשר לנו לבצע אינטגרציה לכל משתנה בנפרד, ולהחליף סדר אינטגרציה.</p>\n<p>מה אומר משפט חילוף משתנה הרב מימדי?</p>", "answer": "<p>תהא <script type=\"math/tex\">U\\subseteq \\mathbb{R}^k<\/script> פתוחה, <script type=\"math/tex\">g\\in C^1\\left( U,\\mathbb{R} \\right)<\/script> חח\"ע, <script type=\"math/tex\">0\\neq J(g(x))=\\det(Dg)_{x}<\/script> לכל <script type=\"math/tex\">x \\in U<\/script>.\nתהא <script type=\"math/tex\">\\mathcal{U}<\/script> פונקציית בעלת נפח וקומפקטית. אזי <script type=\"math/tex\">f:A\\to\\mathbb{R}<\/script> אינטגרבילית כך ש-<script type=\"math/tex\">f\\circ g<\/script> אינטגרבילית. מתקיים:\n<script type=\"math/tex; mode=display\">\\int_{A} f(x)dx=\\int_{g^{-1}(A)}\\left( f\\circ g \\right)(y)|Jg(y)|dy<\/script>\n<strong>הערות</strong></p>\n<ol>\n<li>\n<p>אם <script type=\"math/tex\">f<\/script> רציפה, אז <script type=\"math/tex\">f<\/script> אינטגרבילית, <script type=\"math/tex\">f\\circ g<\/script> אינטגרבלית </p>\n</li>\n<li>\n<p>בפרט נובע אם <script type=\"math/tex\">A<\/script> מבעלת נפח אז <script type=\"math/tex\">g^{-1}(A)<\/script> בעלת נפח </p>\n</li>\n<li>\n<p>ממשפט ההעתקה הפתוחה, <script type=\"math/tex\">g(U)=V<\/script> היא פתוח. כלומר בעצם <script type=\"math/tex\">g:U\\to V<\/script> חח\"ע ועל ו- \n<strong>משפט זה נכון גם עבור קבוצה פתוחה:</strong>\nתהא <script type=\"math/tex\">U\\subseteq \\mathbb{R}^k<\/script> פתוחה, <script type=\"math/tex\">g\\in C^1\\left( U,\\mathbb{R}^k \\right)<\/script> חד-חד ערכית כך ש-<script type=\"math/tex\">Jg(x)\\neq_{0}<\/script> ב-<script type=\"math/tex\">U<\/script>. אזי לכל <script type=\"math/tex\">f:U\\to \\mathbb{R}<\/script> אינטגרבילית כך ש-<script type=\"math/tex\">f\\circ g<\/script> אינטגרבילית, מתקיים:\n<script type=\"math/tex; mode=display\">\\int_{U}f(x)d x=\\int_{g^{-1}(U)}f\\circ g|J g(y)|d y<\/script>\n</p>\n</li>\n</ol>"}, {"question": "<p>איך מוגדר אינטגרל לא אמיתי של פונקציה חיובית? איך מוגדר עבור פונקציה כללית?</p>", "answer": "<div class=\"definition\"> (אינטגרל לא אמיתי של פונקציה חיובית)<p>תהא <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k<\/script> קבוצה עם שפה ממידה אפס ותהא <script type=\"math/tex\">f:A\\to\\left[ 0,\\infty \\right]<\/script> פונקציה שקבוצת נקודות האי רציפות שלה ממידה אפס. נאמר ש-<script type=\"math/tex\">f<\/script> אינטגרבילית על <script type=\"math/tex\">A<\/script> אם:\n<script type=\"math/tex; mode=display\">c=\\operatorname*{sup}\\left\\lbrace\\int_{K}f:K\\in U\\quad {\\text{compact and has volume }}\\right\\rbrace <\/script>\nסופי. ובמקרה זה האינטגרל שווה ל-<script type=\"math/tex\">c<\/script>.\n\nעבור פונקציה <script type=\"math/tex\">f:\\mathbb{R}\\to A<\/script> כללית, נגדיר <script type=\"math/tex\">f_{+}=\\max\\{ f,0 \\}<\/script> ו-<script type=\"math/tex\">f_{-}=\\max\\{ -f,0 \\}<\/script> כאשר הפונקציה אינטגרבילית אם\"ם <script type=\"math/tex\">f_{-},f_{+}<\/script> אינטגרביליות, והאינטגרל יהיה שווה ל:\n<script type=\"math/tex; mode=display\">\\int_{A}f=\\int_{A}f_{+}-\\int_{A}f_{-}<\/script>\n</p>\n</div>"}, {"question": "<p>מהי סידרת מיצוי? מהי הטענה המרכזית לגביהם?</p>", "answer": "<p>נאמר כי <script type=\"math/tex\">A_{n}\\subset A<\/script> סדרה ממצה אם <script type=\"math/tex\">A_{1}\\subset A_{2} \\subset \\dots \\subset A<\/script> ולכל קבוצה <script type=\"math/tex\">B\\subset A<\/script> קומפקטית, נקבל <script type=\"math/tex\">B \\subset A_{n}<\/script> החל ממקום מסוים.\n<strong>טענה</strong>\nיהי <script type=\"math/tex\">(A_{n})<\/script> סדרה ממצה. אם <script type=\"math/tex\">f:A\\to \\mathbb{R}<\/script> אינטגרבילי במובן אינטגרל לא אמיתי, אז:\n<script type=\"math/tex; mode=display\">\\lim_{ n \\to \\infty } \\int_{A_{n}}f(x)\\;\\mathrm{d}x=\\int_{A} \\;f(x)\\;\\mathrm{d}x<\/script>\n<strong>טענה</strong>\nפונקציה <script type=\"math/tex\">f<\/script> אינטגרבילית על תחום <script type=\"math/tex\">A<\/script> אם\"ם קיים מיצוי קומפקטי <script type=\"math/tex\">D_{n}<\/script> של <script type=\"math/tex\">A<\/script> כך ש-\n<script type=\"math/tex; mode=display\">\\operatorname*{lim}_{n\\to\\infty}\\int_{D_{n}}|f|=L\\in\\mathbb{R}<\/script>\n</p>"}, {"question": "", "answer": ""}], "נגזרת רב מימדית": [{"question": "<p>הגדר דיפרנציאביליות עבור פונקציה <script type=\"math/tex\">f:\\mathbb{R}^m\\to \\mathbb{R}^n<\/script>\n</p>", "answer": "<p>פונקציה <script type=\"math/tex\">f:\\mathbb{R}^k\\to\\mathbb{R}^m<\/script> נקראת גזירה/דיפרציאבלית ב-<script type=\"math/tex\">a<\/script> אם קיימת העתקה הלינארית <script type=\"math/tex\">T:\\mathbb{R}^k\\to\\mathbb{R}^m<\/script> המקיימת:\n<script type=\"math/tex; mode=display\">\\operatorname*{lim}_{v\\to0}{\\frac{f(a+v)-f(a)-T(v)}{||v||}}=0_{\\mathbb{R}^m}<\/script>\n</p>"}, {"question": "<p>ציין כמה שיותר תכונות של פונקציית הנגזרת</p>", "answer": "<ol>\n<li>\n<p>אם פונקציה היא גזירה בנקודה, היא גם רציפה בה. </p>\n</li>\n<li>\n<p>הפונקציה היא יחידה </p>\n</li>\n<li>\n<p>הנגזרת בנקודה היא העתקה לינארית. </p>\n</li>\n</ol>"}, {"question": "<p>מה מייצג הנורמה האופרטורית של הנגזרת?</p>", "answer": "<p>הנורמה האופרטורית זה הערך המקסימלי שווקטור עם נורמה 1 יכול להמתח עליה.</p>"}, {"question": "<p>מה אומר תנאי מספיק לדיפרנציאביליות?</p>", "answer": "<p>אם <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k<\/script> קבוצה פתוחה ו-<script type=\"math/tex\">f:A\\to\\mathbb{R}^m<\/script>, אז אם כל ה-<script type=\"math/tex\">k<\/script> נגזרות הכיווניות של <script type=\"math/tex\">f<\/script> קיימות בסביבה של <script type=\"math/tex\">x \\in\\mathbb{R}^k<\/script> וגם רציפות ב-<script type=\"math/tex\">x<\/script>, אז <script type=\"math/tex\">f<\/script> גזיר ב-<script type=\"math/tex\">x<\/script>.</p>"}, {"question": "<p>הגדר פונקציה גזירה ברציפות</p>", "answer": "<p>אם <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k<\/script> קבוצה פתוחה ו-<script type=\"math/tex\">f:A\\to\\mathbb{R}^m<\/script> פונקציה גזירה ב-<script type=\"math/tex\">A<\/script>. פונקציה <script type=\"math/tex\">f<\/script> היא גזירה ברציפות ב-<script type=\"math/tex\">x<\/script> אם ההעתקה <script type=\"math/tex\">Df:A\\to \\mathrm{Hom}\\left( \\mathbb{R}^k,\\mathbb{R}^m \\right)<\/script> רציף ב-<script type=\"math/tex\">x<\/script>. פונקציה היא גזירה ברציפות אם בכל נקודה היא גזירה ברציפות.\nנזכור כי העתקה לינארית היא רציפה אם\"ם היא חסומה, לכן כדי להראות שפונקציה גזירה נדרש להראות שחסום בכל נקודה, כלומר נדרש שכל הנגזרות הכיווניות יהיו רציפות(אם נגזרת כיוונית כלשהי לא רציפה בנקודה אז לא חסומה)</p>"}, {"question": "<p>מה אומר כלל השרשרת?</p>", "answer": "<p>אם <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k<\/script> ו-<script type=\"math/tex\">B\\subseteq \\mathbb{R}^m<\/script> תחומים פתוחים ו-<script type=\"math/tex\">f:A\\to B,g:B\\to\\mathbb{R}^n<\/script>, כאשר <script type=\"math/tex\">f<\/script> גזירה ב-<script type=\"math/tex\">x \\in A<\/script> ו-<script type=\"math/tex\">g<\/script> גזיר ב-<script type=\"math/tex\">f(x)\\in B<\/script> אז <script type=\"math/tex\">g\\circ f<\/script> גזיר ב-<script type=\"math/tex\">x<\/script> והנגזרת נתונה ע\"י:\n<script type=\"math/tex; mode=display\">\\underbrace{(D(g\\circ f))_{x}}_{\\mathbb{R}^{k}\\to\\mathbb{R}^{n}}=\\underbrace{(D g)_{f(x)}}_{\\mathbb{R}^{m}\\to\\mathbb{R}^{n}}\\circ\\underbrace{(D f)_{x}}_{\\mathbb{R}^{k}\\to\\mathbb{R}^{m}}<\/script>\n</p>"}, {"question": "<p>איך מחשבים נגזרת של מכפלה פנימית?</p>", "answer": "<p>בהנתן פונקציות גזירות <script type=\"math/tex\">f:\\mathbb{R}^m\\to \\mathbb{R}^n<\/script> ו-<script type=\"math/tex\">g:\\mathbb{R}^k\\to\\mathbb{R}^n<\/script>, נקבל:\n<script type=\"math/tex; mode=display\">D(\\langle f,g\\rangle)_{(\\underline{{a}},\\underline{{b}})}(\\underline{{v}}_{1},\\underline{{v}}_{2})=\\langle g(\\underline{{b}}),D f_{\\underline{{a}}}(\\underline{{v}}_{1})\\rangle+\\langle f({\\underline{{a}}}),D g_{\\underline{{b}}}(\\underline{{v}}_{2})\\rangle.<\/script>\n</p>"}, {"question": "<p>אם הפונקציה <script type=\"math/tex\">f<\/script> הפיכה מה הביטוי לנגזרת של הפונקציה ההופכית? איך מפתחים את הביטוי?</p>", "answer": "<p>תהי <script type=\"math/tex\">f:\\mathbb{R}^k\\to\\mathbb{R}^k<\/script> פונקציה הפיכה. יהי <script type=\"math/tex\">a\\in \\mathbb{R}^k<\/script> כך ש-<script type=\"math/tex\">f<\/script> גזירה ב-<script type=\"math/tex\">a<\/script>, ו-<script type=\"math/tex\">f^{-1}<\/script> גזירה ב-<script type=\"math/tex\">b=f(a)<\/script>. מתקיים:\n<script type=\"math/tex; mode=display\">\\left(D f\\right)_{a}^{-1}=\\left(D\\left(f^{-1}\\right)\\right)_{b}<\/script>\n<strong>הוכחה</strong>\nאנו יודעים כי <script type=\"math/tex\">f\\circ f^{-1}=Id<\/script> ולכן מכלל השרשרת נקבל:\n<script type=\"math/tex; mode=display\">(Df^{-1})_{f(a)}\\circ Df_{a}=D(Id)_{a}=Id<\/script>\nכאשר השתמשנו בזה ש-<script type=\"math/tex\">D(Id)_{a}=Id<\/script>(נובע ישירות מההגדרה) וכעת כיוון שזהו כפל מטריצות ניתן להכפיל במטריצה ההופכית ולקבל:\n<script type=\"math/tex; mode=display\">D(f^{-1})_{f(a)}=(D f_{a})^{-1}<\/script>\n</p>"}, {"question": "<p>מה אומר משפט הערך הממוצע הרב מימדי?</p>", "answer": "<p>יהי <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k<\/script> קבוצה פתוחה, <script type=\"math/tex\">a,b\\in A<\/script> כך שהקטע המחבר ביניהם הוא:\n<script type=\"math/tex; mode=display\">[a,b]\\equiv\\left\\{ a+t(b-a)\\mid t\\in[0,1] \\right\\}\\subset A.<\/script>\nאם <script type=\"math/tex\">f:A\\to\\mathbb{R}<\/script> גזירה, קיים <script type=\"math/tex\">\\theta \\in(0,1)<\/script> כך ש:\n<script type=\"math/tex; mode=display\">f(b)-f(a)=(D f)_{a+\\theta(b-a)}(b-a).<\/script>\n</p>"}, {"question": "<p>מהו הגרדיאנט</p>", "answer": "<p>מוגדר עבור פונקציה סקלרית <script type=\"math/tex\">f:\\mathbb{R}^k\\to\\mathbb{R}<\/script>. הווקטור היחיד שמקיים <script type=\"math/tex\">Df_{x}(v)=\\left\\langle  \\bar{\\nabla}f, v  \\right\\rangle<\/script> לכל <script type=\"math/tex\">v \\in \\mathbb{R}^k<\/script>.</p>"}, {"question": "<p>מה אומר משפט ערך הממוצע עבור פונקציות סקלאריות רב מימדיות</p>", "answer": "<p>יהי <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k<\/script> קבוצה פתוחה, <script type=\"math/tex\">a,b\\in A<\/script> כך שהקטע המחבר ביניהם הוא:\n<script type=\"math/tex; mode=display\">[a,b]\\equiv\\left\\{ a+t(b-a)\\mid t\\in[0,1] \\right\\}\\subset A.<\/script>\nאם <script type=\"math/tex\">f:A\\to\\mathbb{R}<\/script> גזירה, קיים <script type=\"math/tex\">\\theta \\in(0,1)<\/script> כך ש:\n<script type=\"math/tex; mode=display\">f(b)-f(a)=(D f)_{a+\\theta(b-a)}(b-a).<\/script>\n</p>"}, {"question": "<p>מהי נקודה קריטית?</p>", "answer": "<p>נקודה שמאפסת את הנגזרת. כלומר נקודה <script type=\"math/tex\">x<\/script> המקיימת <script type=\"math/tex\">(Df)_{x}=0<\/script>.</p>"}, {"question": "<p>אם יש לי נקודה קריטית, מה אנחנו יודעים על הנגזרת השנייה? מה התנאי על הנגזרת השנייה עדי שנוכל להשתמש בזה?</p>", "answer": "<p>יהי <script type=\"math/tex\">f:A\\to \\mathbb{R}<\/script> כאשר <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k<\/script> פתוחה, וגזירה פעמיים ברציפות. תהי <script type=\"math/tex\">A<\/script> נקודה קריטית, אזי אם <script type=\"math/tex\">D^2f<\/script> רציפה ב-<script type=\"math/tex\">x<\/script>, מתקיים:</p>\n<ol>\n<li>\n<p>אם <script type=\"math/tex\">(D^2f)_{x}<\/script> חיובית בהחלט אז <script type=\"math/tex\">x<\/script> נקודת מינימום. </p>\n</li>\n<li>\n<p>אם <script type=\"math/tex\">x<\/script> נקודת מינימום אז <script type=\"math/tex\">(D^2f)_{x}<\/script> חיובית למחצה. </p>\n</li>\n<li>\n<p>אם <script type=\"math/tex\">(D^2f)_{x}<\/script> שלילית בהחלט אז <script type=\"math/tex\">x<\/script> נקודת מקסימום. </p>\n</li>\n<li>\n<p>אם <script type=\"math/tex\">x<\/script> נקודת מקסימום אז <script type=\"math/tex\">(D^2f)_{x}<\/script> שלילית למחצה. </p>\n</li>\n</ol>"}, {"question": "<p>מהם התנאים שאיתם ניתן לסווג את נקודות הקיצון בעזרת מבחן הנגזרת השנייה?</p>", "answer": "<ol>\n<li>\n<p>הנגזרת השנייה גזירה ברציפות. כלומר כל הנגזרות החלקיות קיימות ורציפות בנקודה. </p>\n</li>\n<li>\n<p>אין ערך עצמי אפס. </p>\n</li>\n</ol>"}, {"question": "<p>מה ההגדרה של גזיר פעמיים?</p>", "answer": "<p>\n<script type=\"math/tex; mode=display\"> \\lim\\limits_{ v \\to0}\\frac{(Df)_{x+ v }-(Df)_x-(D^2f)_x\\left(  v  \\right)}{\\| v \\|_{\\mathbb{R}^k}}=0_{\\mathrm{Hom}\\left( \\mathbb{R}^k,\\mathbb{R}^m \\right)}<\/script>\n</p>"}, {"question": "<p>מהי העתקה פתוחה?</p>", "answer": "<p>יהיו <script type=\"math/tex\">(X,d_{x}),(Y,d_{Y})<\/script> מרחבים מטרים. העתקה <script type=\"math/tex\">f:X\\to Y<\/script> נקראת העתקה פתוחה\nאם <script type=\"math/tex\">A\\subseteq X<\/script> פתוח ב-<script type=\"math/tex\">X<\/script> גורר <script type=\"math/tex\">f(A)<\/script> פתוח ב-<script type=\"math/tex\">Y<\/script>.</p>"}, {"question": "<p>מה אומר משפט ההעתקה הפתוחה?</p>", "answer": "<p>יהי <script type=\"math/tex\">m\\leq k<\/script>, <script type=\"math/tex\">A\\subseteq \\mathbb{R}^k<\/script> קבוצה פתוחה, ו-<script type=\"math/tex\">f\\in C^1\\left( A;\\mathbb{R}^m \\right)<\/script> כך ש-<script type=\"math/tex\">(Df)_{x}<\/script> מדרגה מלאה לכל <script type=\"math/tex\">x \\in A<\/script>. אזי <script type=\"math/tex\">f<\/script> העתקה פתוחה.</p>"}, {"question": "<p>מה אומר משפט הפונקציה ההפוכה?</p>", "answer": "<p>תהי <script type=\"math/tex\">U\\subseteq \\mathbb{R}^n<\/script> ו-<script type=\"math/tex\">f:U\\to\\mathbb{R}^n<\/script> פונקציה גזירה ותהי <script type=\"math/tex\">a\\in U<\/script> כך ש-<script type=\"math/tex\">\\det(Df(a))\\neq 0<\/script> אז:</p>\n<ol>\n<li>\n<p>קיימת סביבה <script type=\"math/tex\">V\\subseteq U<\/script> של <script type=\"math/tex\">a<\/script> וסביבה <script type=\"math/tex\">W<\/script> של <script type=\"math/tex\">f(a)<\/script>\n</p>\n</li>\n<li>\n<p>קיימת פונקציה <script type=\"math/tex\">f:W\\to V<\/script> כך ש: \n<script type=\"math/tex; mode=display\">\\forall x \\in V\\quad g(f(x))=x\\qquad \\forall y\\in W\\quad f(g(y))=y<\/script>\n</p>\n</li>\n<li>\n<p>הפונקציה <script type=\"math/tex\">g<\/script> גזירה ומקיימת: \n<script type=\"math/tex; mode=display\">Dg(f(a))=[Df(a)]^{-1}<\/script>\n</p>\n</li>\n</ol>"}, {"question": "<p>מה אומר משפט קלרו על הנגזרות השניות?</p>", "answer": "<p>אם הנגזרות השנייה רציפה, אז הנגזרת השנייה תבנית בילינארית סימטרית. במקרה הפרטי של פונקציה <script type=\"math/tex\">f:\\mathbb{R}^2 \\to \\mathbb{R}<\/script> נקבל <script type=\"math/tex\">f_{xy}<\/script> ו-<script type=\"math/tex\">f_{yx}<\/script> רציפות אז <script type=\"math/tex\">f_{xy}=f_{yx}<\/script>.</p>"}, {"question": "<p>מה אומר משפט כופלי לגרנג'?</p>", "answer": "<p>תהי <script type=\"math/tex\">B\\subseteq \\mathbb{R}^k<\/script> פתוחה. <script type=\"math/tex\">n+1\\leq k<\/script>.\n<script type=\"math/tex; mode=display\">\\begin{array}{c}{{f,g_{1},\\ldots,g_{n}\\in C^{1}{\\bigl(}B;\\mathbb{R}{\\bigr)},}}\\\\ {{{}}}\\\\ {{A=\\left\\{x\\in B:\\ g_{1}{\\bigl(}x{\\bigr)}=\\cdots=g_{n}{\\bigl(}x{\\bigr)}=0\\right\\}.}}\\end{array}<\/script>\nנגדיר <script type=\"math/tex\">F:B\\to\\mathbb{R}^{n+1}<\/script> ע\"י:\n<script type=\"math/tex; mode=display\">F(x)=\\left(\\begin{array}{c}{{g_{1}\\left(x\\right)}}\\\\ {{\\vdots}}\\\\ {{g_{n}\\left(x\\right)}}\\\\ {{f(x)}}\\end{array}\\right).<\/script>\nכעת, אם <script type=\"math/tex\">x_{0}\\in A<\/script> קיצון מקומי של <script type=\"math/tex\">f|_{A}<\/script> אזי <script type=\"math/tex\">(DF)_{x_{0}}<\/script> הוא לא מדרגה מלאה(כלומר מדרגה קטנה מ-<script type=\"math/tex\">n+1<\/script>). כלומר <script type=\"math/tex\">(Dg_{1})_{x_{0}},\\dots,(Dg_{n})_{x_{0}},(Df)_{x_{0}}<\/script> הם תלויים לינארית, וקיימים <script type=\"math/tex\">\\lambda_{1},\\dots,\\lambda_{n}<\/script> כך ש:\n<script type=\"math/tex; mode=display\">\\left(D f\\right)_{x_{0}}=\\sum_{i=1}^{n}\\lambda_{i}\\left(D g_{i}\\right)_{x_{0}}<\/script>\n</p>"}, {"question": "<p>איך מוכיחים את משפט כופלי לגרנג'?</p>", "answer": "<p>נניח בלי הגבלת הכלליות <script type=\"math/tex\">x_{0}<\/script> היא נקודת מקסימום מקומית. כלומר קיימת סביבה <script type=\"math/tex\">U\\subseteq B<\/script> של <script type=\"math/tex\">x_{0}<\/script> כך ש:\n<script type=\"math/tex; mode=display\">f(x_{0})=\\max _{x \\in A \\cap U} f(x)<\/script>\nאנחנו רוצים להוכיח שהדרגה של <script type=\"math/tex\">(DF(x))_{x_{0}}<\/script> קטנה מ-<script type=\"math/tex\">n+1<\/script>. נניח בשלילה שמדרגה <script type=\"math/tex\">n+1<\/script>. לכן ממשפט ההעתקה הפתוחה קיים סביבה פתוחה <script type=\"math/tex\">U\\subseteq B<\/script> של <script type=\"math/tex\">x_{0}<\/script> כך ש:\n<script type=\"math/tex; mode=display\">F(x_{0})=(0,\\ldots,0,f(x_{0}))^{T}<\/script>\nתהיה נקודה פנימית של <script type=\"math/tex\">F(U)<\/script> ב-<script type=\"math/tex\">\\mathbb{R}^{n+1}<\/script>. במקרה זה קיים <script type=\"math/tex\">\\varepsilon>0<\/script> כך ש-<script type=\"math/tex\">\\left( 0,\\dots,0,f(x_{0})+\\varepsilon \\right)^T \\in F(U)<\/script>. כלומר קיים <script type=\"math/tex\">x_{+}\\in U<\/script> כך ש-<script type=\"math/tex\">F(x_{+})=\\left( 0,\\dots,0,f(x_{0})+\\varepsilon \\right)^T<\/script>. מזה נקבל ש <script type=\"math/tex\">x_{+}\\in U \\cap A<\/script> וגם <script type=\"math/tex\">f(x_{+})=f(x_{0})+\\varepsilon<\/script>, בסתירה לכך ש-<script type=\"math/tex\">x_{0}<\/script> מקסימום מקומי.</p>"}], "מרחבים מטרים": [{"question": "<p>הגדרה של מטריקה</p>", "answer": "<p>עבור קבוצה לא ריקה <script type=\"math/tex\">X<\/script> פונקציה <script type=\"math/tex\">d:X\\times X\\to \\mathbb{R}<\/script> נקראת מטריקה אם מקיימת:</p>\n<ol>\n<li>\n<p>סימטרייה - <script type=\"math/tex\">d(x,y)=d(y,x)<\/script>\n</p>\n</li>\n<li>\n<p>חיוביות - <script type=\"math/tex\">d(x,y)\\geq 0<\/script> כאשר יש שיוויון אם\"ם <script type=\"math/tex\">x=y<\/script>. </p>\n</li>\n<li>\n<p>אי שיוויון המשולש. לכל <script type=\"math/tex\">x,y,z\\in X<\/script> מתקיים: \n<script type=\"math/tex; mode=display\">d(x,z)\\leq d(x,y)+d(y,z)<\/script>\n</p>\n</li>\n</ol>"}, {"question": "<p>מרחב נורמי</p>", "answer": "<p>מרחב וקטורי <script type=\"math/tex\">X<\/script> אשר מעל <script type=\"math/tex\">\\mathbb{R}<\/script> או <script type=\"math/tex\">\\mathbb{C}<\/script> נקרא מרחב נורמי אם קיים נורמה <script type=\"math/tex\">||\\cdot||:X\\to \\mathbb{R}<\/script> המקיימת:</p>\n<ol>\n<li>\n<p>חיוביות - <script type=\"math/tex\">||x||\\geq 0<\/script> כאשר יש שיוויון אם\"ם <script type=\"math/tex\">x=0<\/script>. </p>\n</li>\n<li>\n<p>הומוגניות - לכל <script type=\"math/tex\">x \\in X<\/script> ו-<script type=\"math/tex\">a\\in \\mathbb{R}<\/script> מתקיים <script type=\"math/tex\">||ax||=a||x||<\/script>. </p>\n</li>\n<li>\n<p>אי שיוויון המשולש - <script type=\"math/tex\">||x+y||\\leq||x||+||y||<\/script>. </p>\n</li>\n</ol>"}, {"question": "<p>3 הגדרות שקולות לפונקציות רציפות </p>", "answer": "<ol>\n<li>\n<p>פונקציה <script type=\"math/tex\">f:X\\to Y<\/script> נקראת רציפה ב-<script type=\"math/tex\">x \\in X<\/script> אם לכל <script type=\"math/tex\">\\varepsilon>0<\/script> קיים <script type=\"math/tex\">\\delta>0<\/script> כך שלכל <script type=\"math/tex\">z\\in B_{\\delta}(x)<\/script> מתקיים <script type=\"math/tex\">f(z)\\in B_{\\varepsilon}(f(x))<\/script>. </p>\n</li>\n<li>\n<p>פונקציה <script type=\"math/tex\">f:(X,d)\\to\\left( Y,\\rho \\right)<\/script> רציפה אם לכל סדרה <script type=\"math/tex\">x_{n}\\in X<\/script> מתקיים: \n<script type=\"math/tex; mode=display\">\\operatorname*{lim}_{n\\to\\infty}x_{n}=a\\implies\\operatorname*{lim}_{n\\to\\infty}f(x_{n})=f(a)<\/script>\n</p>\n</li>\n<li>\n<p>יהיו <script type=\"math/tex\">(X,d),\\left( Y,\\rho \\right)<\/script> מרחבים מטרים. תהי פונקציה <script type=\"math/tex\">f:(X,d)\\to\\left( Y,\\rho \\right)<\/script>. מתקיים \n- פונקציה <script type=\"math/tex\">f<\/script> רציפה אם\"ם לכל <script type=\"math/tex\">U\\subseteq Y<\/script> פתוחה, <script type=\"math/tex\">f^{-1}(U)\\subseteq X<\/script> פתוחה.\n- פונקציה <script type=\"math/tex\">f<\/script> רציפה אם\"ם לכל <script type=\"math/tex\">U\\subseteq Y<\/script> סגורה, <script type=\"math/tex\">f^{-1}(U)\\subseteq X<\/script> סגורה.</p>\n</li>\n</ol>"}, {"question": "<p>נקודה פנימית</p>", "answer": "<p>יהי <script type=\"math/tex\">A\\subseteq X<\/script>, <script type=\"math/tex\">a\\in A<\/script> אזי <script type=\"math/tex\">a<\/script> נקראת נקודה פנימית ב-<script type=\"math/tex\">A<\/script> אם קיים <script type=\"math/tex\">r>0<\/script> כך ש-<script type=\"math/tex\">\\mathcal{B}_{r}(a)\\subseteq A<\/script>.</p>"}, {"question": "<p>נקודה חיצונית</p>", "answer": "<p>נקודה <script type=\"math/tex\">x \\in X<\/script> נקראת נקודה חיצונית ל-<script type=\"math/tex\">A<\/script> אם קיים <script type=\"math/tex\">r>0<\/script> כך ש-<script type=\"math/tex\">\\mathcal{B}_{r}(x)\\subseteq A^c<\/script>.</p>"}, {"question": "<p>קבוצה פתוחה</p>", "answer": "<p>קבוצה שבה כל נקודה היא פנימית או הקבוצה ריקה.</p>"}, {"question": "<p>איחוד כלשהו(גם אינסופי) של קבוצות פתוחות הוא:</p>", "answer": "<p>קבוצה פתוחה</p>"}, {"question": "<p>חיתוך כלשהו(גם אינסופי) של קבוצות סגורות הוא</p>", "answer": "<p>קבוצה סגורה</p>"}, {"question": "<p>פנים של קבוצה</p>", "answer": "<p>איחוד של כל התתי הקבוצות הפתוחות:\n$$A^\\circ=\\bigcup\\left{ U\\mid \\text{ <script type=\"math/tex\">U<\/script> is open and }U\\subset A \\right}$$\nזוהי קבוצה פתוחה כיוון שאיחוד כלשהו של קבוצות פתוחות היא קבוצה פתוחה</p>"}, {"question": "<p>סגור של קבוצה</p>", "answer": "<p>חיתוך של כל הקבוצות הסגורות שמכילות את <script type=\"math/tex\">A<\/script>:\n<script type=\"math/tex; mode=display\">\\overline{A}=\\bigcap\\left\\{ C\\mid \\text{C is closed and }A\\subset C \\right\\}<\/script>\nזהו קבוצה סגורה כיוון שחיתוך כלשהו של קבוצות סגורות תהיה תמיד קבוצה סגורה. באופן שקול זה אוסף כל נקודת הגבול של הקבוצה.</p>"}, {"question": "<p>שפה של קבוצה</p>", "answer": "<p>מה שנמצא בסגור ולא בפנים:\n<script type=\"math/tex; mode=display\">\\partial A=\\overline{A}\\smallsetminus A^{\\circ}<\/script>\nלחלופין ניתן לחשוב על זה כקבוצה שבה כל כדור מכילה נקודה בפנים של <script type=\"math/tex\">A<\/script> וגם נקודה שאינה בפנים של <script type=\"math/tex\">A<\/script>(כלומר ב-<script type=\"math/tex\">A^c<\/script>).</p>"}, {"question": "<p>ציין כמה שיותר תכונות של הפנים, סגור והשפה של קבוצה</p>", "answer": "<ol>\n<li>\n<p>הפנים של קבוצה היא אוסף כל הנקודות הפנימיות שלה </p>\n</li>\n<li>\n<p>הסגור של קבוצה היא אוסף כך הנקודות שלא חיצוניות </p>\n</li>\n<li>\n<p>הפנים של קבוצה פתוחה שווה לקבוצה </p>\n</li>\n<li>\n<p>הסגור של קבוצה סגורה שווה לקבוצה </p>\n</li>\n<li>\n<p>מתקיים <script type=\"math/tex\">A^{\\circ}\\subset A\\subset\\overline{A}<\/script>\n</p>\n</li>\n<li>\n<p>מתקיים <script type=\"math/tex\">(A^{\\circ})^{\\circ}=A^{\\circ}\\quad \\quad\\overline{\\overline{A}}=\\overline{A}.<\/script>\n</p>\n</li>\n<li>\n<p>מתקיים: <script type=\"math/tex\">\\bigl(A^\\circ\\bigr)^c=\\overline{A^c}\\quad\\quad\\bigl(A^c\\bigr)^\\circ=\\bigl(\\overline{A}\\bigr)^c<\/script>\n</p>\n</li>\n<li>\n<p>הסגור זה אוסף כל נקודות הגבול של קבוצה </p>\n</li>\n<li>\n<p>השפה היא קבוצה סגורה </p>\n</li>\n<li>\n<p>קבוצה סגורה פחות קבוצה פתוחה היא סוגרה </p>\n</li>\n<li>\n<p>קבוצה פתוחה פחות קבוצה סגורה היא פתוחה </p>\n</li>\n<li>\n<p>השפה של קבוצה היא קבוצה סגורה </p>\n</li>\n</ol>"}, {"question": "<p>קבוצה סגורה פחות קבוצה פתוחה היא:</p>", "answer": "<p>סוגרה</p>"}, {"question": "<p>השפה של קבוצה תהיה קבוצה</p>", "answer": "<p>סגורה</p>"}, {"question": "<p>קבוצה פתוחה פחות קבוצה סגורה היא תהיה:</p>", "answer": "<p>פתוחה</p>"}, {"question": "<p>מהי קבוצה צפופה</p>", "answer": "<p>קבוצה <script type=\"math/tex\">A\\subseteq X<\/script> תקרא צפופה אם לכל <script type=\"math/tex\">x \\in X<\/script> ולכל <script type=\"math/tex\">\\varepsilon>0<\/script> קיימים <script type=\"math/tex\">a\\in A<\/script> כך ש-<script type=\"math/tex\">d(a,x)<\\varepsilon<\/script>, כלומר ניתן להתקרב לכל נקודה ב-<script type=\"math/tex\">X<\/script> בעזרת נקודות מ-<script type=\"math/tex\">A<\/script>.\nבאופן שקול:\nקבוצה <script type=\"math/tex\">A\\subseteq X<\/script> תקרא צפופה אם <script type=\"math/tex\">\\overline{A}=X<\/script>.</p>"}, {"question": "<p>במרחב נורמי מתקיים</p>\n<ol>\n<li>\n<p>הסגור של כדור פתוח הוא{{ כדור סגור - <script type=\"math/tex\">{{\\bar{B}_{r}\\left(x\\right)=\\hat{B}_{r}\\left(x\\right)\\,}}<\/script>}} </p>\n</li>\n<li>\n<p>הפנים של כדור סגור הוא {{כדור פתוח - <script type=\"math/tex\">\\left(\\hat{B}_{r}\\left(x\\right)\\right)^{\\circ}=B_{r}\\left(x\\right)<\/script>}} </p>\n</li>\n<li>\n<p>השפה של כדור סגור שווה לשפה של {{הכדור הפתוח - <script type=\"math/tex\">\\partial B_{r}\\left(x\\right)=\\partial\\hat{B}_{r}\\left(x\\right)=S_{r}\\left(x\\right)<\/script>}} </p>\n</li>\n</ol>\n<p>מהי קומפקטיות סדרתית?</p>", "answer": "<p>מרחב מטרי <script type=\"math/tex\">(X,d)<\/script> יקרא קומפקטי אם לכל סדרה יש תת סדרה מתכנסת לאיבר בקבוצה.</p>"}, {"question": "<p>ציין כמה שיותר תכונות על מרחבים קומפקטים</p>", "answer": "<ol>\n<li>\n<p>סגורות וחסומות </p>\n</li>\n<li>\n<p>תת מרחב סגור וחסום של מרחב מטרי קומפקטי הוא קומפקטי </p>\n</li>\n<li>\n<p>איחוד סופי של קבוצות קומפקטיות הוא קומפקטי </p>\n</li>\n</ol>"}, {"question": "<p>ציין כמה שיותר תכונות של פונקציות רציפות ממרחב קומפקטי</p>", "answer": "<ol>\n<li>\n<p>כל פונקציה רציפה ממרחב מטרי קומפקטי משיגה מינימום ומקסימום </p>\n</li>\n<li>\n<p>פונקציות רציפות הפועלות על תתי מרחבים מטרים קומפקטים הולכות לתתי מרחבים קומפקטים. כלומר אם <script type=\"math/tex\">K\\subseteq X<\/script> קומפקטי ו-<script type=\"math/tex\">f:X\\to Y<\/script> אז <script type=\"math/tex\">f(K)<\/script> קומפקטי. </p>\n</li>\n</ol>"}, {"question": "<p>מהי רציפות במידה שווה</p>", "answer": "<p>יהיו <script type=\"math/tex\">(X,d), \\left( Y,\\rho \\right)<\/script> מרחבים מטרים. פונקציה <script type=\"math/tex\">f:(X,d)\\to \\left( Y,\\rho \\right)<\/script> נקרא רציף במידה שווה אם לכל <script type=\"math/tex\">\\varepsilon>0<\/script> קיים <script type=\"math/tex\">\\delta>0<\/script> כך שלכל <script type=\"math/tex\">x,y\\in X<\/script> מתקיים:\n<script type=\"math/tex; mode=display\">d(x,y)<\\delta\\implies \\rho(f(x),f(y))<\\varepsilon<\/script>\n</p>"}, {"question": "<p>מה הדרישות כדי שרציפות יגרור רציפות במידה שווה</p>", "answer": "<p>נדרישה העיקרית היא קומפקטיות. המשפט אומר: יהיו <script type=\"math/tex\">(X,d),\\left( Y,\\rho \\right)<\/script> מרחבים מטרים כאשר <script type=\"math/tex\">(X,d)<\/script>  קומפקטי, אז אם <script type=\"math/tex\">f: X\\to Y<\/script> רציף אז רציף במידה שווה</p>"}, {"question": "<p>מהי פונקציה לפשיצית? ומה האיפיון החשוב עבור פונקציות אלו?</p>", "answer": "<p>פונקציה <script type=\"math/tex\">f:X_{d}\\to Y_{\\rho}<\/script> כך שקיים <script type=\"math/tex\">L\\geq0<\/script> כך ש-<script type=\"math/tex\">\\rho(f(x),f(y))\\leq Ld(x,y)<\/script>. <script type=\"math/tex\">L<\/script> נקרא קבוע לפישיץ של <script type=\"math/tex\">f<\/script>. מהתנאי אוטומטית נובע רציפות. פונקציה שקילות היא ליפשיצית.</p>"}, {"question": "<p>קבוצה <script type=\"math/tex\">V<\/script> במרחב נורמי אשר סגורה וחסומה תהיה:</p>", "answer": "<p>קומפקטית</p>"}, {"question": "<p>מהי סדרת קושי</p>", "answer": "<p>סדרה שבה האיברים מתקרבים אחד לשני יותר ויותר. כלומר עבור <script type=\"math/tex\">(X,d)<\/script> מרחב מטרי, הסדרה <script type=\"math/tex\">\\{ x_n\\}_{n=0}^{\\infty}<\/script>  נקראת סדרת קושי אם לכל <script type=\"math/tex\">\\varepsilon>0<\/script> קיים <script type=\"math/tex\">N<\/script> כך שלכל <script type=\"math/tex\">n,m>N<\/script> מתקיים <script type=\"math/tex\">d(x_{n},x_{m})<\\varepsilon<\/script> .</p>"}, {"question": "<p>מרחב מטרי שלם</p>", "answer": "<p>מקיים שכל סדרת קושי מתכנס לאיבר במרחב מטרי.</p>"}, {"question": "<p>מה מהם מרחבים מטרים שקולים?</p>", "answer": "<p>מרחבים מטרים <script type=\"math/tex\">X<\/script> ו-<script type=\"math/tex\">Y<\/script> נקראים שקולים אם קיימת פונקציה <script type=\"math/tex\">f:X\\to Y<\/script> חחע ועל וקיים <script type=\"math/tex\">0<C_{1},C_{2}<\/script> כך ש:\n<script type=\"math/tex; mode=display\">\nC_{1}d(x_{1},x_{2})\\leq \\rho(f(x_{1}),f(x_{2}))\\leq C_{2}d(x_{1},x_{2})\n<\/script>\n</p>"}, {"question": "<p>הראה כי הקטעים <script type=\"math/tex\">(0,1),\\left( 0,\\infty \\right)<\/script> עם המטריקה המושרת מהמטריקה הסטנדרטית אינם שקולים</p>", "answer": "<p>נניח בשלילה כי יש שקילות. לכן קיים פונקציה <script type=\"math/tex\">f:(0,1)\\to\\left( 0,\\infty \\right)<\/script> המקיימת עבור <script type=\"math/tex\">C_{1},C_{2}>0<\/script>:\n<script type=\"math/tex; mode=display\">C_{1}|x-y|\\leq|f(x)-f(y)|\\leq C_{2}|x-y|<\/script>\nכאשר נשים לב כי <script type=\"math/tex\">|x-y|<1<\/script> ולכן <script type=\"math/tex\">|f(x)-f(y)|<C_{2}<\/script>. לכל <script type=\"math/tex\">x,y\\in(0,1)<\/script>. אך <script type=\"math/tex\">f<\/script> צריכה להיות על, ובפרט צריכים להיות <script type=\"math/tex\">s,t\\in(0,1)<\/script> כך ש-<script type=\"math/tex\">f(t)=2C_{2}+1,f(s)=1<\/script> ולכן עבור ערכים אלו מהשקילות מתקיים:\n<script type=\"math/tex; mode=display\">|f(s)-f(t)|=|2C_{2}+1-1|=2C_{2}>C_{2}<\/script>\nבסתירה לזה ש-<script type=\"math/tex\">|f(x)-f(y)|<C_{2}<\/script>.</p>"}, {"question": "<p>מהם מטריקות שקולות?</p>", "answer": "<p>אם יש שתי מטריקות <script type=\"math/tex\">d,\\rho<\/script> על אותו מרחב מטרי <script type=\"math/tex\">X<\/script>, אז נקרא למטריקות שקולות אם המרחבים המטרים שקולים ביחיד עם פונקציית הזהות. כלומר:\n<script type=\"math/tex; mode=display\">C_{1}d(x_{1},x_{2})\\leq \\rho(x_{1},x_{2})\\leq C_{2}d(x_{1},x_{2})<\/script>\nהיתרון העיקרי במטריקות שקולות זה שזה משמר רציפות/התכנסות. אם סדרה מסויימת מתכנסת תחת מטריקה אחת, היא תתכנסת גם תחת המטריקה השנייה.</p>"}, {"question": "<p>מה אומר משפט ההעתקה המכווצת?</p>", "answer": "<p>יהא <script type=\"math/tex\">(X,d)<\/script> מרחב מטרי שלם. ותהא <script type=\"math/tex\">f:X\\to X<\/script> מכווצת, כלומר קיים <script type=\"math/tex\">0\\leq \\lambda<1<\/script> כך שלכל <script type=\"math/tex\">x,y<\/script>:\n<script type=\"math/tex; mode=display\">d(f(x),f(y))\\leq \\lambda d(x,y)<\/script>\n אזי יש ל-<script type=\"math/tex\">f<\/script> נקודת שבת יחידה. כלומר יש <script type=\"math/tex\">x \\in X<\/script> יחיד כך ש-<script type=\"math/tex\">f(x)=x<\/script>.</p>"}, {"question": "<p>מהם השלבים העיקריים בהוכחה של משפט ההעתקה המכווצת?</p>", "answer": "<ol>\n<li>\n<p>מגדירים סדרה בצורה רקורסיבית מהצורה <script type=\"math/tex\">x_{n+1}=f(x_{n})<\/script>. </p>\n</li>\n<li>\n<p>מראים כי <script type=\"math/tex\">d(f(x_{n+1}),f(x_{n}))\\leq \\lambda d(x_{n},x_{n-1})<\/script> ולכן מאינדוקציה <script type=\"math/tex\">d(f(x_{n+1}),f(x_{n}))\\leq \\lambda^nd(x_{1},x_{0})<\/script>. </p>\n</li>\n<li>\n<p>מראים מאי שיוויון המשולש: \n<script type=\"math/tex; mode=display\">{{d(x_{n},x_{m})\\leq\\displaystyle\\sum_{k=m}^{n-1}d(x_{k+1},x_{k})\\leq\\displaystyle\\sum_{k=m}^{n-1}\\lambda^{k}d(x_{1},x_{0})}}{{\\leq\\displaystyle\\sum_{k=N}^{\\infty}\\lambda^{k}d(x_{1},x_{0})=\\displaystyle\\frac{\\lambda^{N}}{1-\\lambda}d(x_{1},x_{0}).}}<\/script>\n</p>\n</li>\n<li>\n<p>נשים כי כיוון שהערך מימין שואף ל-0 המרחק בין שתי איברים בסדרה שואף ל-0. ולכן זהו סדרת קושי. </p>\n</li>\n<li>\n<p>משלמות סדרה זו היא סדרה מתכנסת, ונסמן את הגבול ב-<script type=\"math/tex\">x<\/script>. </p>\n</li>\n<li>\n<p>נשים לב כי <script type=\"math/tex\">f<\/script> פונקציה רציפה בתור פונקציה ליפשיצית, וכן המטריקה היא תמיד רציפה, ולכן <script type=\"math/tex\">d(x_{n},x_{m})<\/script> פונקציה רציפה, לכן מאפיון היינה: \n<script type=\"math/tex; mode=display\">d(x_{n},f(x_{n}))\\xrightarrow{n\\to \\infty}d(x,f(x))=0\\implies f(x)=x<\/script>\n</p>\n</li>\n<li>\n<p>כדי להראות יחידות נניח בשלילה שיש שתי נקודות שבת <script type=\"math/tex\">x,y<\/script> ונקבל: \n<script type=\"math/tex; mode=display\">d(x,y)=d(f(x),f(y))\\leq\\lambda\\,d(x,y)\\implies d(x,y)\\left( 1-\\lambda \\right)\\leq 0<\/script>\n</p>\n</li>\n</ol>"}, {"question": "<p>איך מוצאים נורמה אופרטורית כשנתון מטריצה?</p>", "answer": "<p>אנחנו מחפשים את <script type=\"math/tex\">\\max_{||v||=1}\\lVert Av \\rVert<\/script>. מתקיים:\n<script type=\"math/tex; mode=display\">\\lVert Av \\rVert ^2=\\langle Av, Av \\rangle =\\langle A^*Av, v \\rangle <\/script>\nכאשר <script type=\"math/tex\">A^*A<\/script> אופרטור צמוד לעצמו/הרמיטי. כעת מאי שיוויון קושי שוורץ נקבל:\n<script type=\"math/tex; mode=display\">\\langle A^*Av, v \\rangle\\leq \\sqrt{ \\lVert A^*Av \\rVert \\lVert v \\rVert } <\/script>\nכאשר אנחנו רוצים למצוא את הערך המקסימלי. כאשר <script type=\"math/tex\">\\lVert v \\rVert=1<\/script>. נזכור כי באי שיוויון קושי שוורץ יש שיוויון אם\"ם תלויים לינארים. כלומר אם <script type=\"math/tex\">A^*Av=\\lambda v<\/script>. זוהי בעיית ערכים עצמיים. כאשר נמצא את הערך עצמי המקסימלי <script type=\"math/tex\">\\lambda<\/script> נקבל כי:\n<script type=\"math/tex; mode=display\">\\max_{||v||=1}\\lVert Av \\rVert=\\sqrt{ \\lVert A^*Av \\rVert \\lVert v \\rVert  }=\\sqrt{ \\lVert A^*Av \\rVert } =\\sqrt{ \\left\\lVert  \\lambda v  \\right\\rVert } =\\sqrt{ \\lambda \\lVert v \\rVert } =\\sqrt{ \\lambda }<\/script>\n</p>"}, {"question": "<p>מהי ההגדרה הטופולוגית לקומפקטיות?</p>", "answer": "<p>יהי <script type=\"math/tex\">(X,d)<\/script> מרחב מטרי, אז <script type=\"math/tex\">A\\subseteq X<\/script> קומפקטי אם\"ם לכל אוסף של קבוצות פתוחות <script type=\"math/tex\">\\left\\{  U_{\\alpha}  \\right\\}_{\\alpha \\in I}<\/script> כך ש-<script type=\"math/tex\">A\\subseteq \\bigcup_{\\alpha \\in I}U_{\\alpha}<\/script> קיים אוסף סופי של <script type=\"math/tex\">U_{\\alpha_{1}},\\dots,U_{\\alpha_{m}}<\/script> כך ש-<script type=\"math/tex\">A\\subseteq \\bigcup_{i=1}^mU_{\\alpha_{i}}<\/script>.</p>"}, {"question": "", "answer": ""}]}
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length){
            location.reload()
            return;
            }
            if (currentQuestionIndex >= currentQuestions.length - 1) {
                document.getElementById('next-question').innerHTML = "לסיים";
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.Hub.Queue(["Typeset",MathJax.Hub,"question"]);
            MathJax.Hub.Queue(["Typeset",MathJax.Hub,"answer"]);
            document.getElementById('question-counter').innerHTML = "שאלה "+ (currentQuestionIndex + 1) +" מתוך "+ currentQuestions.length;
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
      </script>
</head>
