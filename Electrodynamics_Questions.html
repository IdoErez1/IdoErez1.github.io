
<!DOCTYPE html>

<head>

            <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/MathJax.js?config=TeX-AMS_HTML-full"></script>
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            TeX: {
                extensions: ['AMSmath.js', 'AMSsymbols.js', 'cancel.js']
            },

        <title>שאלות - חשמל אנליטי</title>
        <style>
            .hidden { display: none; }
        </style>
      <script type="text/javascript">
        window.onload = function() {
          const subjects = {"שדות חשמליים של מערכות פשוטות": [], "מגנטיות ומגנטיות בחומר": [{"question": "<p>עבור ספרה עם מגנטיזיציה קבועה, מה יהיה צפיפות המטען המשטחית והנפחית הפיקטיבים?</p>", "answer": "<p>\n<script type=\"math/tex; mode=display\">\\rho^* =0\\qquad\\sigma^{*}=M_{0}\\cdot \\hat{r}=M_{0}r\\cos\\left( \\theta \\right)<\/script>\n</p>"}, {"question": "<p>משוואות מקסוואל עבור מגנטוסטטיקה</p>", "answer": "<p>\n<script type=\"math/tex; mode=display\">\\bar{\\nabla} \\cdot \\vec{B}=0\\qquad \\bar{\\nabla} \\times \\vec{B} = \\frac{4\\pi}{c}\\vec{J}<\/script>\n</p>"}, {"question": "<p>מהו השדה המגנטי של סלנואיד המסתובב במהירות <script type=\"math/tex\">\\omega(t)<\/script>?</p>", "answer": "<p>בחוץ נקבל כי <script type=\"math/tex\">\\vec{B}_{out}=0<\/script> כאשר בפנים נקבל מלולאת אמפר:\n<script type=\"math/tex; mode=display\">\\vec{B}_{in}=\\frac{4\\pi}{c}\\omega(t)R\\sigma \\hat{z}<\/script>\n</p>"}, {"question": "<p>מהם משוואות מקסוואל של השדה החשמלי?</p>", "answer": "<p>\n<script type=\"math/tex; mode=display\">\\bar{\\nabla} \\cdot \\vec{E}=4\\pi \\rho \\qquad  \\bar{\\nabla} \\times \\vec{E}=-\\frac{1}{c}\\frac{\\partial \\vec{B}}{\\partial t} <\/script>\n</p>"}, {"question": "<p>איך מחשבים את ההספק בעזרת וקטור פוינטינג?</p>", "answer": "<p>\n<script type=\"math/tex; mode=display\">P_{EM}=\\int \\vec{S} d\\Sigma<\/script>\n</p>"}]}
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length){
            location.reload()
            return;
            }
            if (currentQuestionIndex >= currentQuestions.length - 1) {
                document.getElementById('next-question').innerHTML = "לסיים";
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.Hub.Queue(["Typeset",MathJax.Hub,"question"]);
            MathJax.Hub.Queue(["Typeset",MathJax.Hub,"answer"]);
            document.getElementById('question-counter').innerHTML = "שאלה "+ (currentQuestionIndex + 1) +" מתוך "+ currentQuestions.length;
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
      </script>
</head>
<body>
<ul class='top-navigation'>
        <li class="parent-page"> <a href="./Electrodynamics"> 
         חזרה לספר
         </a></li></ul><div class="content">
    <div id="subject-selection">
        <h1>נושאים:</h1>
    <div class="all-checkboxes-container">
        <label class="checkbox-container">שדות חשמליים של מערכות פשוטות<input type="checkbox" name="subject" value="שדות חשמליים של מערכות פשוטות" checked="checked"> <span class="checkmark"></span></label><label class="checkbox-container">מגנטיות ומגנטיות בחומר<input type="checkbox" name="subject" value="מגנטיות ומגנטיות בחומר" checked="checked"> <span class="checkmark"></span></label>
        </div>
    <button class="quiz-button" onclick="startQuiz()">להתחיל</button>
    </div>
    <div id="quiz-section" class="hidden">
        <h1>שאלות</h1>
        <div class="question-answer-container">
        <div id="question-counter"></div>
        <div id="question"></div>
        <div id="answer" class="hidden"></div>
        </div>
        <button class="quiz-button" id="show-answer" onclick="showAnswer()">Show Answer</button>
        <button class="quiz-button" id="next-question" class="hidden" onclick="nextQuestion()">Next Question</button>
    </div>
    </div>
</body>
</html>
