      <script type="text/javascript">
        window.onload = function() {
          const subjects = {"תורת הקבוצות האקסיומטית": [{"question": "<p>מה אומר אקסימת ההרחבה?</p>", "answer": "<p><strong>אקסיומת ההרחבה:</strong> אם לשתי קבוצות <script type=\"math/tex\">A,B<\/script> יש את אותם איברים, אז הם שווים</p>"}, {"question": "<p>מה אומר אקסיומת הקבוצה הריקה?</p>", "answer": "<p><strong>אקסיומת הקבוצה הריקה:</strong> קיים קבוצה ללא איברים, אשר נסמן ב-<script type=\"math/tex\">\\varnothing<\/script>.</p>"}, {"question": "<p>מה אומר אקסיומת הזוג הלא סדור?</p>", "answer": "<p><strong>אקסיומת הזוג הלא סדור:</strong> עבור קבוצות <script type=\"math/tex\">A,B<\/script> קיים קבוצה <script type=\"math/tex\">\\{ A,B \\}<\/script> המכיל את האיברים <script type=\"math/tex\">A,B<\/script> כאיברים היחידים שלו. בפרט קיים קבוצה שמכיל את <script type=\"math/tex\">A<\/script> בלבד.</p>"}, {"question": "<p>מה אומר אקסיומת קבוצת החזקה?</p>", "answer": "<p><strong>אקסיומת קבוצות החזקה:</strong> לכל קבוצה <script type=\"math/tex\">A<\/script> קיים קבוצה <script type=\"math/tex\">\\mathcal{P}(A)<\/script> שכל איבריו הם תתי הקבוצות של <script type=\"math/tex\">A<\/script>.</p>"}, {"question": "<p>מה אומר אקסיומת האיחוד?</p>", "answer": "<p><strong>אקסיומת האיחוד:</strong> לכל קבוצה <script type=\"math/tex\">A<\/script>, קיים קבוצה אשר נסמן ב-<script type=\"math/tex\">\\cup A<\/script> אשר נקראת האיחוד של <script type=\"math/tex\">A<\/script>, והאיברים שלה הם כל האיברים של <script type=\"math/tex\">A<\/script>.</p>"}, {"question": "<p>מה אומר אקסיומת האינסוף?</p>", "answer": "<p><strong>אקסיומת האינסוף:</strong> קיים קבוצה אינסופית, בפרט קיים קבוצה <script type=\"math/tex\">Z<\/script> שמכילה את <script type=\"math/tex\">\\varnothing<\/script> ומתקיימת אם <script type=\"math/tex\">A \\in Z<\/script> אז <script type=\"math/tex\">\\cup \\left\\{  A,\\{ A \\}  \\right\\}\\in Z<\/script>.</p>"}, {"question": "<p>מה אומר אקסיומת ההפרדה?</p>", "answer": "<p><strong>אקסיומת ההפרדה:</strong> לכל קבוצה <script type=\"math/tex\">A<\/script> עם תכונה נתונה, קיימת קבוצה שמכילה את האיברים של <script type=\"math/tex\">A<\/script>\n<strong>אקסיומת (סכמת) ההפרדה:</strong> לכל תכונה <script type=\"math/tex\">p(x)<\/script> וקבוצה <script type=\"math/tex\">A<\/script> קיימת קבוצה <script type=\"math/tex\">\\left\\{  x \\in A \\mid p(x)  \\right\\}<\/script>.</p>"}, {"question": "<p>מה אומר אקסיומת(סכמת) ההחלפה?</p>", "answer": "<p><strong>אקסיומת (סכמת) ההחלפה:</strong> לכל פונקציה מוגדרת היטב עם תחום <script type=\"math/tex\">A<\/script> קיים קבוצה שכל איבריה הם הערכים כל הערכים של הפונקציה.</p>"}, {"question": "<p>מה אומר אקסיומת היסוד?</p>", "answer": "<p><strong>אקסיומת היסוד:</strong> לכל קבוצה לא ריקה <script type=\"math/tex\">A<\/script> קיים איבר מינימלי תחת היחס <script type=\"math/tex\">\\in<\/script>.</p>"}, {"question": "<p>הוכח בעזרת ZF כי לכל קבוצה <script type=\"math/tex\">A<\/script> גם <script type=\"math/tex\">A\\cup \\{ A \\}<\/script> היא קבוצה.</p>", "answer": "<p>ראשית מאקסיומת הזוג הלא סדור נקבל כי <script type=\"math/tex\">\\{ A,A \\}<\/script> היא קבוצה. כאשר מאקסיומת ההיקפיות נקבל כי:\n<script type=\"math/tex; mode=display\">\\left( x \\in \\{ A,A \\}\\iff x = A \\iff x \\in \\{  A \\}\\right)\\implies\\left( \\{ A,A \\}=\\{ A \\} \\right)<\/script>\nולכן קיים היחידון <script type=\"math/tex\">A<\/script>. כעת מאקסיומת הזוג הלא סדור נקבל כי <script type=\"math/tex\">\\left\\{  A,\\{ A \\}  \\right\\}<\/script> היא קבוצה וכעת מאקסיומת האיחוד <script type=\"math/tex\">\\cup \\left\\{  A,\\{ A \\}  \\right\\}<\/script> היא קבוצה. כאשר מתקיים:\n<script type=\"math/tex; mode=display\">\\cup \\left\\{  A,\\{ A \\}  \\right\\}=\\left\\{  x\\mid x \\in A \\lor x \\in \\{  A \\}  \\right\\}=\\left\\{  x \\mid x \\in A\\cup \\{ A \\}  \\right\\}=A\\cup \\{  A \\}<\/script>\n</p>"}, {"question": "<p>הוכח בעזרת ZF כי עבור קבוצות <script type=\"math/tex\">A,B<\/script> קיימת הקבוצה של המכפלה הקרטזית <script type=\"math/tex\">A\\times B<\/script>.</p>", "answer": "<p>מאקסיומת הזוג הלא סדור נקבל כי <script type=\"math/tex\">\\{ A,B \\}<\/script> קבוצה ומאקסיומת האיחוד נקבל כי <script type=\"math/tex\">A\\cup B<\/script> היא קבוצה. כעת מאקסיומת קבוצת החזקה נקבל כי <script type=\"math/tex\">\\mathcal{P}\\left( A\\cup B \\right)<\/script> קבוצה וכעת יש לנו את הקבוצה של כל האיברים מהצורה <script type=\"math/tex\">\\{ a \\},\\{ b \\},\\{ a,b \\}<\/script> עבור <script type=\"math/tex\">a\\in A,b \\in B<\/script>. ניקח את קבוצת החזקה <script type=\"math/tex\">\\mathcal{P}\\left( \\mathcal{P}\\left( A\\cup B \\right) \\right)<\/script> ובעזרת אקסיומת ההפרדה נדרוש שיהיה מהצורה <script type=\"math/tex\">\\left\\{  \\{ a \\},\\{ a,b \\}  \\right\\}<\/script>.</p>"}, {"question": "<p>הוכח בעזרת ZF כי עבור קבוצה <script type=\"math/tex\">A<\/script> אוסף כל יחסי השקילות זה קבוצה.</p>", "answer": "<p>אנו יודעים כי עבור קבוצה <script type=\"math/tex\">A<\/script> המכפלה הקרטזית <script type=\"math/tex\">A\\times A<\/script> היא קבוצה. מאקסיומת קבוצת החזקה נקבל כי <script type=\"math/tex\">\\mathcal{P}\\left( A\\times A \\right)<\/script> היא קבוצה, כאשר כל יחס הוא תת חבורה של <script type=\"math/tex\">A\\times A<\/script> ולכן שייך לקבוצת החזקה. נסתכל על התכונות הבאות:\n<script type=\"math/tex; mode=display\">\\begin{gather}\n\\varphi_{1}(x):= \\forall a \\in A\\quad  (a,a) \\in x  \\\\\n\\varphi_{2}(x):= \\forall a,b \\in A\\quad  (a,b) \\in x \\implies (b,a) \\in x \\\\\n\\varphi_{3}(x):= \\forall a,b,c \\in A\\quad (a,b) \\in x\\land(b,c)\\in x\\implies(a,c)\\in x\n\\end{gather}<\/script>\nכאשר <script type=\"math/tex\">\\varphi_{1}<\/script> מתאר רפלקסיביות, <script type=\"math/tex\">\\varphi_{2}<\/script> מתאר סימטריות ו-<script type=\"math/tex\">\\varphi_{3}<\/script> מתאר טרנזטיביות. לכן בעזרת אקסיומת ההפרדה ניקח את כל האיברים ב-<script type=\"math/tex\">\\mathcal{P}\\left( A\\times A \\right)<\/script> אשר מקיימים את <script type=\"math/tex\">\\varphi_{1}\\land \\varphi_{2}\\land \\varphi_{3}<\/script> ונקבל את קבוצת כל היחסי שקילות.</p>"}, {"question": "<p>הוכח בעזרת <script type=\"math/tex\">ZF<\/script> כי אוסף קבוצת החזקה של הממשיים <script type=\"math/tex\">\\left\\{  \\mathcal{P}(r)\\mid r \\in \\mathbb{R}  \\right\\}<\/script> הוא קבוצה(ניתן להניח <script type=\"math/tex\">\\mathbb{R}<\/script> היא קבוצה)</p>", "answer": "<p>נסמן ב-<script type=\"math/tex\">A<\/script> את מחלקת כל הקבוצות. נגדיר <script type=\"math/tex\">F:\\mathbb{R}\\to \\mathcal{P}\\left( \\mathbb{R} \\right)<\/script> ע\"י <script type=\"math/tex\">F(r)=\\mathcal{P}(r)<\/script>. הפונקציה הזו מוגדרת בגלל אקסיומת קבוצת החזקה, וזוהי פונקציה שקבוצת החזקה נקבעת ביחידות ע\"י הקבוצה שיוצרת אותה, וכעת מאקסיומת ההחלפה נקבל כי התמונה היא קבוצה.</p>"}, {"question": "<p>מהי פונקצית בחירה? מה הקשר לאקסיומת הבחירה?</p>", "answer": "<p><strong>פונקציית בחירה:</strong> בהנתן קבוצה <script type=\"math/tex\">X<\/script> של קבוצות לא ריקות,פונקצית בחירה היא פונקציה אשר לוקחת איבר מכל קבוצה ב-<script type=\"math/tex\">X<\/script>, וממפה אותה לאיבר ב-<script type=\"math/tex\">X<\/script>. כלומר עבור הקבוצה <script type=\"math/tex\">\\left\\{  B_{i}\\mid i \\in I  \\right\\}<\/script> קיימת פונקציה בחירה <script type=\"math/tex\">F:I\\to \\cup \\left\\{  B_{i}\\mid i \\in I  \\right\\}<\/script> כך ש-<script type=\"math/tex\">\\forall i \\in I\\quad f(i) \\in B_{i}<\/script>.\n<strong>אקסיומת הבחירה:</strong> לכל קבוצה לא ריקה <script type=\"math/tex\">A<\/script> קיים פונקצית בחירה <script type=\"math/tex\">f<\/script> אשר מקשר כל קבוצה <script type=\"math/tex\">a \\in A<\/script> לאיבר <script type=\"math/tex\">x \\in A<\/script>.</p>"}, {"question": "<p>מהי שרשרת? מה אומרת הלמה של צורן על שרשראות?</p>", "answer": "<p>עבור יחס סדר חלקי שרשרת של היחס סדר תהיה תת קבוצה אשר היחד עם היחס סדר מהווה יחס סדר מלא. כלומר כל שתי איברים משרשרת ניתנים להשוואה. הלמה של צורן אומרת כי אם לכל שרשרת יש חסם עליון, אז לקבוצה כולה יהיה איבר מקסימלי.</p>"}], "תורת הקבוצות הנאייבית": [{"question": "<p>מהו יחס?</p>", "answer": "<p>יחס בין <script type=\"math/tex\">A<\/script> ל-<script type=\"math/tex\">B<\/script> הוא תת קבוצה <script type=\"math/tex\">R\\subseteq A\\times B<\/script>.</p>"}, {"question": "<p>מהו יחס רפלקסיבי?</p>", "answer": "<p>יחס <script type=\"math/tex\">R<\/script> על <script type=\"math/tex\">A<\/script> יקרא רפלסקסיבי אם לכל <script type=\"math/tex\">x \\in A<\/script> מתקיים <script type=\"math/tex\">xRx<\/script>. או בשפה פורמלית:\n<script type=\"math/tex; mode=display\">\\varphi(x)=\\forall x \\in A\\quad xRx<\/script>\n</p>"}, {"question": "<p>מהו יחס סימטרי?\nאם לכל <script type=\"math/tex\">x,y \\in A<\/script> מתקיים אם <script type=\"math/tex\">xRy<\/script> אז <script type=\"math/tex\">yRx<\/script>.\n<script type=\"math/tex; mode=display\">\\varphi_{1}(x)=\\forall x,y \\in A\\quad xRy\\implies yRx<\/script>\n</p>\n<p>מהו יחס טרנזיטיבי?\nאם לכל <script type=\"math/tex\">x,y,z \\in A<\/script> אם <script type=\"math/tex\">xRy<\/script> ו-<script type=\"math/tex\">yRz<\/script> אז מתקיים <script type=\"math/tex\">xRz<\/script>. או בשפה פורמלית:\n<script type=\"math/tex; mode=display\">\\varphi(x)=\\forall x,y,z \\in A\\quad xRy\\land yRz\\implies xRz<\/script>\n</p>\n<p>מהו יחס שקילות?</p>", "answer": "<p>יחס סימטרי, רפלקסיבי וטרנזטיבי</p>"}, {"question": "<p>מהו מחלקת שקילות? מהו אוסף של כל המחלקות שקילות?</p>", "answer": "<p>מחלקת שקילות זה קבוצה של כל האיברים שהם נמצאים היחס שקילות ביחד אחד עם השני:\n<script type=\"math/tex; mode=display\">[a]_{E}=\\{b\\in A\\mid a E b\\}<\/script>\nהאוסף של כל הקבוצות האלה נקרא אוסף מחלקות השקילות: <script type=\"math/tex; mode=display\">A/E=\\{[a]_{E}\\mid a\\in A\\}<\/script>\n</p>"}, {"question": "<p>מהי חלוקה של קבוצה?</p>", "answer": "<p>אם <script type=\"math/tex\">A<\/script> קבוצה לא ריקה, <script type=\"math/tex\">P\\subseteq \\mathcal{P}(A)<\/script> תקרא חלוקה אם <script type=\"math/tex\">\\varnothing \\not\\in P<\/script>, איברי <script type=\"math/tex\">P<\/script> זרים בזוגות(כלומר אם <script type=\"math/tex\">x,y \\in P<\/script>) אז <script type=\"math/tex\">x \\cap y = \\varnothing<\/script>. ו-<script type=\"math/tex\">\\cup_{X \\in P} X=A<\/script>. כלומר אוסף של תתי קבוצות זרות אשר האיחוד שלהם זה הקבוצה כולה.</p>"}, {"question": "<p>מהי פעולה על מחלקת שקילות? מתי היא מוגדרת היטב?</p>", "answer": "<p>יחס <script type=\"math/tex\">*<\/script> הפועל על קבוצה <script type=\"math/tex\">X<\/script> יהיה מוגדר על המחלקת שקילות <script type=\"math/tex\">X / E<\/script> אם מתקיים:\n<script type=\"math/tex; mode=display\">\\forall (x_{1},x_{2})\\in E\\quad \\forall(y_{1},y_{2})\\in E\\quad (x_{1}*y_{1},x_{2}*y_{2})\\in E<\/script>\nכלומר לכל 2 איברים שנמצאים באותה מחלקת שקילות המכפלה שלהם גם תהיה באותה מחלקת שקילות.</p>"}, {"question": "<p>מהי פונקציה?</p>", "answer": "<p>פונקציה <script type=\"math/tex\">F:A\\to B<\/script> הוא יחס <script type=\"math/tex\">F\\subseteq A\\times B<\/script> המקיים כי:\n<script type=\"math/tex; mode=display\">\\forall a \\in A\\quad \\exists! b\\in B\\quad \\langle a, b \\rangle \\in F<\/script>\nכאשר נזכור כי <script type=\"math/tex\">\\exists!<\/script> אומר קיים ויחיד.</p>"}, {"question": "<p>מה ההגדרה של תחום וטווח?</p>", "answer": "<p>יהי <script type=\"math/tex\">R\\subseteq A\\times B<\/script> יחס. נגדיר את התחום של <script type=\"math/tex\">R<\/script>:\n<script type=\"math/tex; mode=display\">\\operatorname{dom}\\left(R\\right)=\\left\\{a\\in A\\mid\\exists b\\in B\\quad\\left\\langle a,b\\right\\rangle\\in R\\right\\}<\/script>\nיהי <script type=\"math/tex\">R\\subseteq A\\times B<\/script> יחס. נגדיר את הטווח של <script type=\"math/tex\">R<\/script>:\n<script type=\"math/tex; mode=display\">\\operatorname{rng}\\left(R\\right)=\\left\\{b\\in B\\mid\\exists a\\in A\\quad\\langle a,b\\rangle\\in R\\right\\}<\/script>\nאם <script type=\"math/tex\">R\\subseteq A\\times B<\/script> היא פונקציה מ-<script type=\"math/tex\">A<\/script> ל-<script type=\"math/tex\">B<\/script>, אז <script type=\"math/tex\">\\mathrm{dom}(R)=A<\/script> ו-<script type=\"math/tex\">\\mathrm{rng}(R)\\subseteq B<\/script>.</p>"}, {"question": "<p>מהו ההגדרה של הרכבה של יחסים?</p>", "answer": "<p>נניח <script type=\"math/tex\">A,B,C<\/script> קבוצות, <script type=\"math/tex\">R\\subseteq A\\times B<\/script> ו-<script type=\"math/tex\">S\\subseteq B\\times C<\/script>. נגדיר יחס <script type=\"math/tex\">S\\circ R\\subseteq A\\times C<\/script> ע\"י:\n<script type=\"math/tex; mode=display\">S\\circ R = \\left\\{  \\langle a, c \\rangle \\mid a\\in A\\quad c\\in C \\quad \\exists b \\in B\\quad \\langle a, b \\rangle \\in R\\quad \\langle b, c \\rangle \\in S \\right\\}<\/script>\n</p>"}, {"question": "<p>מהו יחס סדר חלקי?</p>", "answer": "<p>יחס <script type=\"math/tex\">\\leq<\/script> על קבוצה <script type=\"math/tex\">S<\/script> יקרא יחס סדר חלקי אם מקיים:</p>\n<ol>\n<li>\n<p>רפלקיביות - לכל <script type=\"math/tex\">a \\in S<\/script> מתקיים <script type=\"math/tex\">a \\leq a<\/script>. </p>\n</li>\n<li>\n<p>אנטי סימטרייה - לכל <script type=\"math/tex\">a,b \\in S<\/script> אם <script type=\"math/tex\">a\\leq b<\/script> וגם <script type=\"math/tex\">b\\leq a<\/script> אז <script type=\"math/tex\">a=b<\/script>. </p>\n</li>\n<li>\n<p>טרנזטיביות - לכל <script type=\"math/tex\">a,b,c \\in S<\/script> אם <script type=\"math/tex\">a\\leq b<\/script> וגם <script type=\"math/tex\">b\\leq c<\/script> אז <script type=\"math/tex\">a\\leq c<\/script>. </p>\n</li>\n</ol>"}, {"question": "<p>מהו יחס סדר חלקי חד?</p>", "answer": "<p>יחס &gt; על קבוצה <script type=\"math/tex\">S<\/script> יקרא סדר חלקי חד אם מקיים:</p>\n<ol>\n<li>\n<p>אירפלקסיבי - לכל <script type=\"math/tex\">a \\in S<\/script> לא מתקיים <script type=\"math/tex\">a< a<\/script>. </p>\n</li>\n<li>\n<p>אסימטרי - לכל <script type=\"math/tex\">a,b \\in S<\/script> אם <script type=\"math/tex\">a< b<\/script> אז לא מתקיים <script type=\"math/tex\">b < a<\/script>. </p>\n</li>\n<li>\n<p>טרנזטיבי - לכל <script type=\"math/tex\">a,b,c<\/script> אם <script type=\"math/tex\">a<b<\/script> וגם <script type=\"math/tex\">b<c<\/script> אז <script type=\"math/tex\">a< c<\/script>. </p>\n</li>\n</ol>"}, {"question": "<p>מהו התנאי כדי שקבוצה סדורה חלקית תהיה מבוססת היטב?</p>", "answer": "<p>תהי <script type=\"math/tex\">\\left\\langle  A,\\leq  \\right\\rangle<\/script> קבוצה סדורה חלקית. נאמר ש-<script type=\"math/tex\">A<\/script> מבוססת היטב עם היחס <script type=\"math/tex\">\\leq<\/script> אם לכל תת קבוצה לא ריקה <script type=\"math/tex\">\\varnothing \\neq B \\subseteq A<\/script> יש איבר מינימלי ב-<script type=\"math/tex\">B<\/script>.</p>"}, {"question": "<p>מהו שיכון של סדרים?</p>", "answer": "<p>אם <script type=\"math/tex\">\\left\\langle  A,\\leq_{A}  \\right\\rangle<\/script> ו-<script type=\"math/tex\">\\left\\langle  B,\\leq_{B}  \\right\\rangle<\/script> הם קבוצות סדרות חלקית, אז שיכון הוא פונקציה <script type=\"math/tex\">F:A\\to B<\/script> כך ש:\n<script type=\"math/tex; mode=display\">F(a)\\leq_{A}F(a')\\iff a \\leq_{A}a'<\/script>\n</p>"}], "סודרים ומונים": [{"question": "<p>מהי קבוצה טרנזטיבית?</p>", "answer": "<p>קבוצה <script type=\"math/tex\">A<\/script> נקראת טרנזטיבית אם לכל <script type=\"math/tex\">x \\in A<\/script> מתקיים <script type=\"math/tex\">x \\subseteq A<\/script>. כלומר כל איבר ב-<script type=\"math/tex\">A<\/script> הוא גם תת קבוצה של <script type=\"math/tex\">A<\/script>.</p>"}, {"question": "<p>מהו סודר?</p>", "answer": "<p>קבוצה טרנזטיבית מסודרת היטב(כלומר מבוססת היטב וקווית)ץ</p>"}, {"question": "<p>מהו סודר גבולי?</p>", "answer": "<p>סודר <script type=\"math/tex\">\\alpha<\/script> הוא גבולי אם הוא לא אפס ואין סודר אחר שהוא העוקב שלו. בצורה פורמלית, <script type=\"math/tex\">\\alpha<\/script> הוא סודר גבולי אם <script type=\"math/tex\">\\alpha \\neq 0<\/script> ולכל <script type=\"math/tex\">\\beta < \\alpha<\/script> קיים <script type=\"math/tex\">\\gamma<\/script> כך ש-<script type=\"math/tex\">\\beta<\\gamma<\\alpha<\/script>.</p>"}, {"question": "<p>מדוע <script type=\"math/tex\">|\\omega|^{2}=|\\omega|<\/script>?</p>", "answer": "<p>נראה בעזרת קנטור שרדר ברנשטיין. בכיוון הראשון, נמצא פונקציה חח\"ע <script type=\"math/tex\">\\mathbb{N}\\to \\mathbb{N} \\times \\mathbb{N}<\/script>. הפונקציה תהיה פשוט <script type=\"math/tex\">f(n)=\\langle n,0 \\rangle<\/script> וזה יהיה חח\"ע כי:\n<script type=\"math/tex; mode=display\">f(n)=f(m)\\implies \\langle n,0 \\rangle =\\langle m,0 \\rangle \\implies n=m<\/script>\nבכיוון השני נדרש למצוא פונקציה חח\"ע <script type=\"math/tex\">\\mathbb{N}\\times \\mathbb{N}\\to \\mathbb{N}<\/script>. נשתמש בפירוק לראשוניים. מתקיים:\n<script type=\"math/tex; mode=display\">f\\left( \\langle a,b \\rangle  \\right)=2^{a}\\cdot 3^{b}<\/script>\nכאשר מיחידות הפירוק לראשוניים נקבל כי זה יהיה פונקציה חח\"ע. לחלופין ניתן להשתמש בהתאמה של קנטור:\n<script type=\"math/tex; mode=display\">\\pi(m,n)= \\frac{(m+n)(m+n+1)}{2}+n<\/script>\nפונקציה חח\"ע ועל.</p>"}, {"question": "<p>לכל מונה <script type=\"math/tex\">\\kappa \\geq \\omega<\/script> תראה כי <script type=\"math/tex\">|\\kappa|^2=|\\kappa|<\/script>.</p>", "answer": "<p>נראה באינדוקציה על סודרים שאם <script type=\"math/tex\">\\alpha \\geq \\omega<\/script> מתקיים <script type=\"math/tex\">|\\alpha|^{2}=|\\alpha|<\/script>.</p>"}]}
          let selectedSubjects = [];
          let currentQuestions = [];
          let currentQuestionIndex = 0;

          window.startQuiz = function() {
            selectedSubjects = Array.from(document.querySelectorAll('input[name="subject"]:checked')).map(cb => cb.value);
            if (selectedSubjects.length === 0) {
                alert("Please select at least one subject.");
                return;
            }
            currentQuestions = [];
            selectedSubjects.forEach(subject => {
                currentQuestions = currentQuestions.concat(subjects[subject]);
            });
            shuffle(currentQuestions);
            document.getElementById('subject-selection').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            showQuestion();
          }

          function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length){
            location.reload()
            return;
            }
            if (currentQuestionIndex >= currentQuestions.length - 1) {
                document.getElementById('next-question').innerHTML = "לסיים";
            }
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerHTML = q.question;
            document.getElementById('answer').innerHTML = q.answer;
            document.getElementById('answer').classList.add('hidden');
            document.getElementById('show-answer').classList.remove('hidden');
            document.getElementById('next-question').classList.add('hidden');
            MathJax.Hub.Queue(["Typeset",MathJax.Hub,"question"]);
            MathJax.Hub.Queue(["Typeset",MathJax.Hub,"answer"]);
            document.getElementById('question-counter').innerHTML = "שאלה "+ (currentQuestionIndex + 1) +" מתוך "+ currentQuestions.length;
          }

          window.showAnswer = function() {
            document.getElementById('answer').classList.remove('hidden');
            document.getElementById('show-answer').classList.add('hidden');
            document.getElementById('next-question').classList.remove('hidden');
          }

          window.nextQuestion = function() {
            currentQuestionIndex++;
            showQuestion();
          }

          function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
          }
        };
      </script>

        </div>
    <button class="quiz-button" onclick="startQuiz()">להתחיל</button>
