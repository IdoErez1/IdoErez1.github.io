<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link rel="stylesheet" href='../styles/main_style.css'>
        <title>Pyscrpt Test</title>
        <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

          <style>
        #math-input {
            width: 100%;
            font-size: 1.5em;
            margin-bottom: 20px;
            direction: ltr;
        }
        #solve-btn {
            padding: 10px 20px;
            font-size: 1em;
        }
        #solution {
            margin-top: 20px;
            font-size: 1.5em;
            color: green;
        } 
        #display{
            display: block;
            margin: auto;
            text-align: center;
            direction: ltr;
        }
        #loader {
  border: 16px solid #f3f3f3; /* Light grey */
  border-top: 16px solid #3498db; /* Blue */
  border-radius: 50%;
  width: 120px;
  height: 120px;
  animation: spin 2s linear infinite;
  position: absolute;
  top: 50%;
  left: 49%;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
} 
    </style>    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/service-worker.js').then(function(registration) {
        console.log('ServiceWorker registration successful with scope: ', registration.scope);
      }, function(err) {
        console.log('ServiceWorker registration failed: ', err);
      });
    });
  }
</script>
        </head>

    <body>
        <div id="loader"></div> 
        <div class="content">
        <math-field id="math-input">x^2+3x=1</math-field>
        <button id="solve-btn" py-click="process_latex">text</button>
        <math-field read-only id="display"></math-field>
    </div>
    <script src="https://unpkg.com/mathlive"></script>
    <script>
      window.addEventListener('DOMContentLoaded', 
        () => MathLive.renderMathInDocument()
      );
    </script>        
        <script type="py" src="./solve_equation.py" config="./pyscript.toml" async></script>
    </body>
</html>
